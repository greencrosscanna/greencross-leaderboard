<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Green Cross — Performance</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <link rel="shortcut icon" href="apple-touch-icon.png">

  <!-- Design tokens (must be first) -->
  <link rel="stylesheet" href="src/tokens.css?v=62a176a">

  <!-- Shared primitives -->
  <link rel="stylesheet" href="src/primitives.css?v=62a176a">

  <!-- View-specific styles (load all; each is small) -->
  <link rel="stylesheet" href="src/director/director.css?v=62a176a">
  <link rel="stylesheet" href="src/kiosk/kiosk.css?v=ticker5">
  <link rel="stylesheet" href="src/leaderboard/leaderboard.css?v=62a176a">
</head>
<body>

<!-- Router renders into this container -->
<main id="app">
  <!-- Initial paint: login screen rendered immediately by JS below,
       before any async data. This prevents a flash of empty background. -->
</main>

<!-- Toast container (always present, outside router scope) -->
<div class="toast-container" id="toastContainer"></div>

<!-- ── Foundation layer (load order matters) ──────────────── -->
<script src="src/utils.js?v=62a176a"></script>
<script src="src/auth.js?v=62a176a"></script>
<script src="src/api.js?v=62a176a"></script>
<script src="src/router.js?v=62a176a"></script>

<!-- ── View modules ───────────────────────────────────────── -->
<script src="src/director/director.js?v=62a176a"></script>
<script src="src/kiosk/kiosk.js?v=ticker5"></script>
<script src="src/leaderboard/leaderboard.js?v=62a176a"></script>

<!-- ── Login view (inline — no separate file needed) ──────── -->
<script>
GC.views.renderLogin = function() {
  var app = document.getElementById('app');
  if (!app) return;

  app.innerHTML = [
    '<div class="login-screen">',
    '  <div class="login-card">',
    '    <div class="login-logo">',
    '      <span class="gc-logo"><span class="green">GREEN</span>CROSS</span>',
    '    </div>',
    '    <div class="login-tagline">Sales Performance</div>',
    '    <label class="login-label" for="loginUser">Username</label>',
    '    <input class="login-input" type="text" id="loginUser" placeholder="your username" autocomplete="username" autocapitalize="none">',
    '    <label class="login-label" for="loginPass">Password</label>',
    '    <input class="login-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">',
    '    <button class="login-submit" id="loginBtn">Sign in</button>',
    '    <div class="login-error" id="loginError"></div>',
    '    <div class="login-hint">',
    '      Login: <code>sky / gcadmin</code> → Director &nbsp;|&nbsp; manager usernames: dean, tj, scott, tyson, mariana, chris / gc123',
    '    </div>',
    '  </div>',
    '</div>',
  ].join('\n');

  // Wire login form
  var userInput = document.getElementById('loginUser');
  var passInput = document.getElementById('loginPass');
  var loginBtn  = document.getElementById('loginBtn');
  var errorEl   = document.getElementById('loginError');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
  }
  function clearError() {
    errorEl.classList.remove('visible');
  }

  function doLogin() {
    clearError();
    var user = (userInput.value || '').trim();
    var pass = passInput.value || '';
    if (!user || !pass) { showError('Please enter your username and password.'); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';

    GC.api.login(user, pass)
      .then(function(result) {
        if (!result.ok) {
          showError(result.error || 'Invalid username or password.');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign in';
          return;
        }
        // Save session and route home
        GC.auth.save(result);
        GC.router.navigate(GC.auth.homeRoute());
      })
      .catch(function(err) {
        showError('Sign-in failed. Please try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
      });
  }

  loginBtn.addEventListener('click', doLogin);
  passInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') passInput.focus();
  });

  // Auto-focus username
  setTimeout(function() { userInput.focus(); }, 50);
};

// renderKiosk is registered by src/kiosk/kiosk.js (loaded above)

// renderLeaderboard is registered by src/leaderboard/leaderboard.js (loaded above)
</script>

<!-- ── Boot ────────────────────────────────────────────────── -->
<script>
// Kick off the router once the DOM is ready.
// All GC.views.render* functions must be registered before this.
document.addEventListener('DOMContentLoaded', function() {
  GC.router.init();
});
</script>

</body>
</html>
