          var t = tag.dataset.tag;
          if (_tagFilter === t) {
            _tagFilter = null;
            tag.classList.remove('active', 'active-red');
          } else {
            filterRow.querySelectorAll('.pill[data-tag]').forEach(function(p) {
              p.classList.remove('active','active-red');
            });
            _tagFilter = t;
            tag.classList.add(t === 'flag' ? 'active-red' : 'active');
          }
          refreshStaffTable();
        }
      });
    }

    // Store table row → navigate to store kiosk
    var storeTable = document.getElementById('storeTable');
    if (storeTable) {
      storeTable.addEventListener('click', function(ev) {
        var row = ev.target.closest('tr[data-slug]');
        if (row) {
          GC.router.navigate('#/store/' + row.dataset.slug);
        }
      });
    }

    // Alert CTAs
    var appEl = document.getElementById('app');
    if (appEl) {
      appEl.addEventListener('click', function(ev) {
        var cta = ev.target.closest('.alert-cta[data-target]');
        if (cta) {
          var target = cta.dataset.target;
          if (target.startsWith('store:')) {
            GC.router.navigate('#/store/' + target.split(':')[1]);
          } else if (target === 'discount-watch') {
            // Scroll to discount watch panel
            var panel = document.querySelector('.watch-list');
            if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
          } else if (target.startsWith('external:')) {
            GC.toast('Open ' + target.split(':')[1] + ' app', 'info');
          } else {
            GC.toast('Feature coming in v1.1', 'info');
          }
        }

        // Status strip store click
        var ssStore = ev.target.closest('.ss-store[data-slug]');
        if (ssStore) {
          GC.router.navigate('#/store/' + ssStore.dataset.slug);
        }

        // View full leaderboard link
        if (ev.target.id === 'viewFullLeaderboard') {
          GC.router.navigate('#/leaderboard');
        }

        // Staff period tab toggle
        var periodTab = ev.target.closest('.staff-period-tab[data-staff-period]');
        if (periodTab && _data) {
          var newPeriod = periodTab.getAttribute('data-staff-period');
          if (newPeriod === _staffPeriod) return;
          _staffPeriod = newPeriod;
          syncPeriodTabs();
          if (newPeriod === 'mtd') {
            // Restore MTD — data already in _data; reset staff to original MTD set
            if (_data.staff && _data.staff.staff) {
              var tbody = document.getElementById('staffTableBody');
              var thead = document.getElementById('staffTableHead');
              if (tbody) refreshStaffTable();
            }
          } else {
            // Switch to PP — fetch if not cached
            periodTab.textContent = 'Loading…';
            GC.api.fetchDirectorStaff('pp')
              .then(function(ppData) {
                _staffPpData = ppData.staff || [];
                if (ppData.dateRange) {
                  _staffPpRange = GC.fmtDateRange(ppData.dateRange.from, ppData.dateRange.to);
                }
                updateStaffTable(_staffPpData);
                syncPeriodTabs(); // restore correct labels after updateStaffTable
              })
              .catch(function(err) {
                _staffPeriod = 'mtd';
                syncPeriodTabs();
                console.warn('[director] PP staff fetch failed:', err);
              });
          }
        }

        // Staff table column-header sort
        var sortTh = ev.target.closest('th[data-ststaff-sort]');
        if (sortTh && _data) {
          var key = sortTh.getAttribute('data-ststaff-sort');
          if (_staffSortKey === key) {
            _staffSortDir = _staffSortDir * -1;
          } else {
            _staffSortKey = key;
            _staffSortDir = -1;
          }
          // Re-render thead arrows + resort tbody
          var thead = document.getElementById('staffTableHead');
          if (thead) {
            thead.innerHTML = '<tr>'
              + stTh('Rank',       'rank',         'width:60px')
              + stTh('Staff',      'name')
              + stTh('Store',      'storeName')
              + stTh('Role',       'roleLabel')
              + stTh('Sales',      'sales')
              + stTh('Txns',       'transactions')
              + stTh('AOV',        'avgOrderValue')
              + stTh('UPT',        'avgUPT')
              + stTh('Discount',   'discountRate')
              + stTh('Trend · 30d','trendPct')
              + '</tr>';
          }
          refreshStaffTable();
        }

        // Store leaderboard period tab toggle
        var storePeriodTab = ev.target.closest('.store-period-tab[data-store-period]');
        if (storePeriodTab && _data) {
          var newStorePeriod = storePeriodTab.getAttribute('data-store-period');
          if (newStorePeriod === _storePeriod) return;
          _storePeriod = newStorePeriod;
          syncStorePeriodTabs();
          // Update heading text immediately
          var storeHeading = document.querySelector('#storeTable')?.previousElementSibling?.querySelector('h2');
          if (newStorePeriod === 'mtd') {
            // Restore cached MTD data
            if (_storeMtdData && _data.stores) {
              _data.stores.stores = _storeMtdData;
              refreshStoreTable();
            }
          } else {
            // Fetch PP store data
            storePeriodTab.textContent = 'Loading…';
            GC.api.fetchDirectorStores('pp')
              .then(function(ppData) {
                var ppStores = ppData.stores || [];
                if (ppData.dateRange) {
                  _storePpRange = GC.fmtDateRange(ppData.dateRange.from, ppData.dateRange.to);
                }
                // Merge 30d trend from MTD data (trend is independent of period)
                var trendMap = {};
                if (_storeMtdData) {
                  _storeMtdData.forEach(function(s) { trendMap[s.slug] = { trend30d: s.trend30d, trendPct: s.trendPct }; });
                }
                ppStores = ppStores.map(function(s) {
                  var t = trendMap[s.slug];
                  return t ? Object.assign({}, s, t) : s;
                });
                _storePpStores = ppStores; // cache for re-apply after background refresh
                if (_data.stores) _data.stores.stores = ppStores;
                refreshStoreTable();
                syncStorePeriodTabs();
              })
              .catch(function(err) {
                _storePeriod = 'mtd';
                syncStorePeriodTabs();
                console.warn('[director] PP stores fetch failed:', err);
              });
          }
        }

        // Store table column-header sort
        var storeSortTh = ev.target.closest('th[data-ststore-sort]');
        if (storeSortTh && _data) {
          var key = storeSortTh.getAttribute('data-ststore-sort');
          if (_storeSortKey === key) {
            _storeSortDir = _storeSortDir * -1;
          } else {
            _storeSortKey = key;
            _storeSortDir = -1;
          }
          refreshStoreTable();
        }
      });
    }
  }

  // Public API of the director module
  // ── Update just the staff table with pay-period data ─────
  function updateStaffTable(staff) {
    if (!staff || !staff.length) return;

    // The standalone directorstaff endpoint doesn't fetch 30d trend data.
    // Trend is a rolling window independent of the period, so pull it from
    // the MTD response already in _data and merge it into each PP row.
    var trendMap = {};
    if (_data && _data.staff && _data.staff.staff) {
      _data.staff.staff.forEach(function(s) {
        trendMap[s.id] = { trend30d: s.trend30d, trendPct: s.trendPct };
      });
    }
    staff = staff.map(function(s) {
      var t = trendMap[s.id];
      return t ? Object.assign({}, s, { trend30d: t.trend30d, trendPct: t.trendPct }) : s;
    });

    // Merge into _data so pill filters keep working
    if (_data) _data.staff = { staff: staff };

    var tbody = document.getElementById('staffTableBody');
    if (!tbody) return;

    var filtered = applyStaffFilters(staff);
    var maxSales = filtered.length ? filtered[0].sales : 1;
    var total    = staff.length;
    var avgAov   = avgOf(filtered, 'avgOrderValue');

    tbody.innerHTML = filtered.map(function(s) {
      var isNew  = GC.isNewHire(s.hireDate);
      var tags   = s.tags.slice();
      var sTips  = (s.tagTooltips || []).slice();
      if (isNew && tags.indexOf('new') === -1) { tags.push('new'); sTips.push('Recently hired'); }
      return '<tr data-employee="' + e(s.id) + '">'
        + '<td>' + rankPillHtml(s.rank, total) + '</td>'
        + '<td><div class="who">'
          + avatarHtml(s.initials, null, s.name, s.nameKey)
          + '<div><div class="who-name">' + e(s.name) + tagsHtml(tags, null, sTips) + '</div>'
          + '<div class="who-sub">' + e(s.hoursWorked) + 'h this PP</div>'
          + '</div></div></td>'
        + '<td><div class="store-cell">' + storeDotHtml(s.storeSlug) + '<span>' + e(s.storeName) + '</span></div></td>'
        + '<td>' + e(s.roleLabel) + '</td>'
        + '<td class="num">' + e(GC.fmtCurrency(s.sales)) + '</td>'
        + '<td class="num">' + e(GC.fmtNum(s.transactions)) + '</td>'
        + '<td class="num' + aovClass(s.avgOrderValue, avgAov) + '">' + e(GC.fmtCurrency(s.avgOrderValue)) + '</td>'
        + '<td class="num' + (s.avgUPT >= 2.6 ? ' v-green' : '') + '">' + e(GC.fmtDecimal(s.avgUPT)) + '</td>'
        + '<td>' + discountCell(s.discountRate) + '</td>'
        + '<td>' + sparklineSvg(s.trend30d, s.trendPct) + '</td>'
        + '</tr>';
    }).join('');

    // Update the "Across N active staff" count
    var meta = document.querySelector('#staffTable + * .sh-meta, .section-head .sh-meta');
    // Find the sh-meta next to the Pay Period heading
    var heads = document.querySelectorAll('.section-head');
    heads.forEach(function(h) {
      if (h.querySelector('h2') && h.querySelector('h2').textContent.indexOf('Pay Period') !== -1) {
        var m = h.querySelector('.sh-meta');
        if (m) m.textContent = 'Across ' + total + ' active staff';
      }
    });

    animateStaffSparklines();
  }

  // ── Historical: store card grid ────────────────────────────
  function renderHistoricalStoreGrid(histStores) {
    return '<div class="hist-store-grid">'
      + histStores.map(function(st) {
          var pace    = st.goal > 0 ? (st.revenue - st.goal) / st.goal : 0;
          var paceStr = (pace >= 0 ? '+' : '−') + Math.abs(Math.round(pace * 100)) + '%';
          var paceCls = pace >= 0.005 ? 'up' : pace <= -0.005 ? 'down' : 'flat';
          var store   = GC.STORES[st.slug] || {};
          return '<div class="hist-store-card">'
            + '<div class="hsc-name">'
            +   '<span class="ss-dot" style="background:' + e(store.color || 'var(--green)') + '"></span>'
            +   e(st.name)
            + '</div>'
            + '<div class="hsc-revenue">' + e(GC.fmtCurrency(st.revenue)) + '</div>'
            + '<div class="hsc-goal">goal ' + e(GC.fmtCurrency(st.goal)) + '</div>'
            + '<div class="hsc-pace ' + paceCls + '">' + e(paceStr) + ' vs goal</div>'
            + '<div class="hsc-stats">'
            +   '<span>' + e(String(st.transactions)) + ' txns</span>'
            +   '<span>AOV ' + e(GC.fmtCurrency(st.avgOrderValue)) + '</span>'
            + '</div>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  // ── Historical: employee breakdown ─────────────────────────
  function renderHistoricalEmployees(histStores) {
    var anyEmployees = histStores.some(function(st) { return (st.onShift || []).length > 0; });
    if (!anyEmployees) return '';

    var storeBlocks = histStores.map(function(st) {
      var emps = (st.onShift || []).filter(function(emp) { return emp.sales > 0 || emp.transactions > 0; });
      if (!emps.length) return '';
      emps.sort(function(a, b) { return (b.sales || 0) - (a.sales || 0); });
      var store = GC.STORES[st.slug] || {};
      return '<div class="hist-emp-store">'
        + '<div class="hist-emp-store-name">'
        +   '<span class="ss-dot" style="background:' + e(store.color || 'var(--green)') + ';width:8px;height:8px"></span>'
        +   e(st.name)
        + '</div>'
        + emps.map(function(emp) {
            return '<div class="hist-emp-row">'
              + '<span class="hist-emp-name">' + e(emp.name || emp.displayName || '—') + '</span>'
              + '<span class="hist-emp-sales">' + e(GC.fmtCurrency(emp.sales || 0)) + '</span>'
              + '<span class="hist-emp-txns">' + e(String(emp.transactions || 0)) + ' txns</span>'
              + '</div>';
          }).join('')
        + '</div>';
    }).join('');

    return '<div class="hist-emp-section">'
      + '<h3>Employee Performance</h3>'
      + '<div class="hist-emp-grid">' + storeBlocks + '</div>'
      + '</div>';
  }

  // ── Historical: aggregate today object for summary cards ────
  function buildHistTodayObj(histStores) {
    var totalRevenue = 0, totalGoal = 0, totalTxns = 0;
    var hourlyMap = {};
    histStores.forEach(function(st) {
      totalRevenue += st.revenue || 0;
      totalGoal    += st.goal    || 0;
      totalTxns    += st.transactions || 0;
      (st.hourly || []).forEach(function(h) {
        if (!hourlyMap[h.hour]) hourlyMap[h.hour] = { hour: h.hour, revenue: 0, transactions: 0 };
        hourlyMap[h.hour].revenue      += h.revenue      || 0;
        hourlyMap[h.hour].transactions += h.transactions || 0;
      });
    });
    var hourly = Object.keys(hourlyMap).sort(function(a, b) { return a - b; })
      .map(function(h) { return hourlyMap[h]; });
    var pace = totalGoal > 0 ? (totalRevenue - totalGoal) / totalGoal : 0;
    return {
      revenue: totalRevenue, goal: totalGoal,
      pctToGoal: totalGoal > 0 ? totalRevenue / totalGoal : 0,
      toGo: Math.max(0, totalGoal - totalRevenue),
      pace: pace, projectedRevenue: totalRevenue, projectedPace: pace,
      hourly: hourly, hourlyTargets: null,
      timeRemainingLabel: 'Closed',
      transactions: totalTxns
    };
  }

  // ── Historical: build status-strip-compatible store list ────
  function buildHistStores(histStores) {
    return histStores.map(function(st) {
      var pace = st.goal > 0 ? (st.revenue - st.goal) / st.goal : 0;
      var store = GC.STORES[st.slug] || {};
      return {
        slug: st.slug, name: st.name,
        color: store.color || 'var(--green)',
        today: {
          revenue: st.revenue, goal: st.goal,
          pctToGoal: st.pctToGoal, pace: pace,
          projected: st.revenue, projectedRevenue: st.revenue, projectedPace: pace
        }
      };
    });
  }

  // ── Historical: format date for display ─────────────────────
  function fmtHistDate(dateStr) {
    // dateStr is 'YYYY-MM-DD' — produce e.g. "Tuesday, May 26, 2026"
    try {
      var parts = dateStr.split('-');
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    } catch(err) { return dateStr; }
  }

  // ── Historical: full page render ────────────────────────────
  function renderHistorical(histData, dateStr) {
    var histStores  = histData.stores || [];
    var todayObj    = buildHistTodayObj(histStores);
    var storeList   = buildHistStores(histStores);
    var displayDate = fmtHistDate(dateStr);

    return '<div class="app-page">'
      + renderHeader(null)
      + '<div class="hist-banner" id="histBanner">'
      +   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
      +   'Viewing <strong>' + e(displayDate) + '</strong> — End of Day Snapshot'
      +   '<button class="btn-live" id="btnBackToLive">↩ Back to Live</button>'
      + '</div>'
      + renderStatusStrip(storeList)
      + (todayObj.goal
          ? '<div class="dir-today-row">'
          +   renderDirGoalCard(todayObj)
          +   renderDirPaceCard(todayObj)
          +   renderDirHourlyCard(todayObj)
          + '</div>'
          : '')
      + renderHistoricalStoreGrid(histStores)
      + renderHistoricalEmployees(histStores)
      + '</div>';
  }

  // ── Historical: wire interactivity ──────────────────────────
  function initHistorical(histData, dateStr) {
    // Stop live auto-refresh — historical view must not be overwritten
    if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
    startClock();

    var btnBack = document.getElementById('btnBackToLive');
    if (btnBack) btnBack.addEventListener('click', function() {
      GC.views.renderDirector();
    });

    // Settings gear still works
    var btnSettings = document.getElementById('btnSettings');
    if (btnSettings) btnSettings.addEventListener('click', function() {
      GC.router.navigate('#/settings');
    });

    // History button toggles date picker (so user can pick another date)
    wireHistoryControls();
    // Mark the history button as active while in historical mode
    var btnHistory = document.getElementById('btnHistory');
    if (btnHistory) btnHistory.classList.add('active');
    // Pre-fill date picker with current historical date
    var dateInput = document.getElementById('histDateInput');
    if (dateInput) dateInput.value = dateStr;

    // Animate gauge bars (reuse existing animation)
    animateBars();
  }

  // ── History controls (shared between live init + historical init) ──
  function wireHistoryControls() {
    var btnHistory = document.getElementById('btnHistory');
    var dateInput  = document.getElementById('histDateInput');
    if (!btnHistory || !dateInput) return;

    // Set max to yesterday (today's data captured at 11pm, not yet available)
    var yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    var yStr = yesterday.toISOString().slice(0, 10);
    dateInput.max = yStr;

    btnHistory.addEventListener('click', function() {
      dateInput.classList.toggle('visible');
      if (dateInput.classList.contains('visible')) {
        dateInput.showPicker ? dateInput.showPicker() : dateInput.focus();
      }
    });

    dateInput.addEventListener('change', function() {
      var ds = this.value;
      if (!ds) return;
      dateInput.classList.remove('visible');
      GC.views.renderDirectorHistorical(ds);
    });
  }

  return {
    render:              render,
    renderLoading:       renderLoading,
    renderError:         renderError,
    renderHistorical:    renderHistorical,
    init:                init,
    initHistorical:      initHistorical,
    startClock:          startClock,
    updateStaffTable:    updateStaffTable,
    wireHistoryControls: wireHistoryControls,
    resetPeriods: function() {
      _storePeriod   = 'mtd';
      _storePpStores = null;
      _storePpRange  = null;
    },
  };
})();

</script>
<script>
// ============================================================
//  Green Cross — Kiosk View
//  Renders /store/:slug — store-floor display
//  Gamified, kinetic, celebratory
//
//  Data flow:
//    GC.views.renderKiosk(slug)
//      → GC.api.fetchKioskAll(slug)
//      → kiosk.render(data, slug)   injects HTML into #app
//      → kiosk.init(data, slug)     wires animations + polling
// ============================================================

window.GC = window.GC || {};

GC.views.renderKiosk = function(slug) {
  var app = document.getElementById('app');
  if (!app) return;

  // Only show loading shell if cache is cold — skip the flash when data is preloaded
  if (!GC.api.hasKioskCache(slug)) {
    app.innerHTML = kiosk.renderLoading(slug);
  }

  // No onFresh callback — the 30-second sinceTs poll already updates numbers/hourly
  // in-place without a full re-render. Passing onFresh caused animations to fire twice
  // (once from cache, once when the background network request landed 2-5s later).
  GC.api.fetchKioskAll(slug)
    .then(function(rawData) {
      var data = kiosk.normalize(rawData);
      app.innerHTML = kiosk.render(data, slug);
      kiosk.init(data, slug);
    })
    .catch(function(err) {
      console.error('[kiosk] fetch failed:', err);
      app.innerHTML = '<div style="padding:40px;color:var(--text-dim)">Failed to load store data.</div>';
    });
};

// ── Private module ──────────────────────────────────────────
var kiosk = (function() {

  // ── State ──────────────────────────────────────────────
  var _slug         = null;
  var _storeName    = '';
  var _onShift      = [];    // full roster array (all statuses) — used by lb refresh
  var _badges       = [];    // current week's badges — used by lb refresh
  var _goal         = 0;     // daily revenue goal — used by pace projection updates
  var _hourlyTargets = null; // per-hour target amounts from same-DOW history; null = flat fallback
  var _leaderName    = '';    // disambiguated display name of today's leader
  var _eomKey        = null; // current Employee of the Month nameKey (or null)
  var _pollTimer    = null;
  var _lbTimer      = null;
  var _clockTimer   = null;
  var _lastTxnTs    = '';    // cursor for incremental ticker polling
  var _seenTxnKeys  = {};    // dedup set: "ts|who|price" → true, prevents re-injection on repeat polls
  var _confettiParticles  = [];
  var _confettiRunning    = false;
  var _avatarConfigs      = {};   // set in normalize(), used in renderHeader
  var _goalCelebrated    = false;  // true once confetti has fired for today's goal
  var _bigTxnLastFired  = 0;      // timestamp of last big-txn mini-celebration (throttle)

  // ── Helpers ────────────────────────────────────────────
  function e(s) { return GC.esc(String(s)); }

  /**
   * Always returns exactly 2 uppercase chars.
   * "Dean Smith"  → "DS"
   * "Zachary B."  → "ZB"
   * "Dean"        → "De"
   */
  function nameToInitials(name) {
    var parts = (name || '').trim().split(/\s+/).filter(Boolean);
    if (parts.length >= 2) {
      // First letter of first word + first letter of last word
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }
    // Single word: first 2 letters
    var w = parts[0] || '??';
    return (w[0] + (w[1] || w[0])).toUpperCase();
  }

  function fmtDollars(n) {
    if (n === null || n === undefined) return '—';
    return '$' + Math.round(n).toLocaleString();
  }

  function fmtPace(pace) {
    var sign = pace >= 0 ? '+' : '−';
    return sign + Math.abs(Math.round(pace * 100)) + '%';
  }

  // ── Render: Loading ────────────────────────────────────
  function renderLoading(slug) {
    var name = slug ? slug.charAt(0).toUpperCase() + slug.slice(1) : 'Store';
    return '<div style="padding:60px;text-align:center;color:var(--text-dim)">'
      + '<div style="font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">'
      + e(name) + ' · Loading…</div>'
      + '</div>';
  }

  // ── Render: Header ─────────────────────────────────────
  function renderHeader(store) {
    var sess = GC.auth.load() || {};
    var isDirector = sess.role === 'director' || sess.role === 'owner';
    var backBtn = isDirector
      ? '<button class="kiosk-back-btn" onclick="GC.router.navigate(\'#/director\')">← Back</button>'
      : '';
    return '<header class="kiosk-header">'
      + backBtn
      + '<img class="gc-logo-img" src="' + GC.LOGO_PNG + '" alt="Green Cross" height="28">'
      + '<span class="store-live-badge">' + e(store.name) + '</span>'
      + '<div class="kiosk-clock">'
      + '  <div class="kc-time num" id="kioskTime">—</div>'
      + '  <div class="kc-date" id="kioskDate">—</div>'
      + '</div>'
      + (function() {
          var nameKey = GC.nameToKey(sess.displayName || sess.user || '');
          var cfg     = findAvatarCfg_(_avatarConfigs, nameKey);
          var avatarInner = GC.ucAvatarHtml(cfg, nameKey, sess.initials || '??');
          return '<span class="user-chip" id="kioskUserChip" title="Sign out">'
            + avatarInner
            + e(sess.displayName || sess.user || '')
            + '</span>';
        })()
      + '</header>';
  }

  // ── Render: On-shift strip ─────────────────────────────
  function renderShiftStrip(onShift) {
    var people = (onShift || []).map(function(p) {
      var cls = p.status === 'on' ? '' : (' ' + e(p.status));
      var noteHtml = (p.status !== 'on' && p.note)
        ? e(p.role) + ' · ' + e(p.note)
        : e(p.role);
      var shiftNameKey = p.nameKey || GC.nameToKey(p.name || '');
      return '<div class="shift-person' + cls + '">'
        + GC.lbAvaPuck(shiftNameKey, p.avatarConfig || null, p.initials || '??', true)
        + '  <div class="shift-meta">'
        + '    <span class="shift-name">' + e(p.name) + '</span>'
        + '    <span class="shift-role">' + noteHtml + '</span>'
        + '  </div>'
        + '</div>';
    }).join('');

    return '<div class="shift-strip">'
      + '<div class="shift-label">On shift now</div>'
      + '<div class="shift-avatars">' + people + '</div>'
      + '</div>';
  }

  // ── Helper: first name, or first name + last initial when duped ──
  function disambiguateName(name) {
    // Server applies nicknames and strips initials by default.
    // Disambiguation is handled in Settings — just return the name as-is.
    return name || '';
  }

  // ── Render: Leader card ────────────────────────────────
  // Fixed count of distinct trophy types — denominator for "N / TOTAL trophies" stat.
  var BADGE_TYPE_TOTAL = 7;

  function renderLeaderCard(leader, allStaff, onShift, badges, today, eomKey) {
    var dispName = leader.name;

    // ── Chips ────────────────────────────────────────────
    var chipsHtml = '';
    if (leader.leadingSince) {
      chipsHtml += '<span class="leader-chip since">👑 Leading since ' + e(leader.leadingSince) + '</span>';
    }
    if (leader.streak && leader.streak > 1 && leader.streakType === 'fire') {
      chipsHtml += '<span class="leader-chip streak">🔥 ' + leader.streak + '-day streak</span>';
    }

    // ── Secondary stat line ──────────────────────────────
    var aovStr = leader.aov ? '$' + leader.aov.toFixed(2) : '—';
    var uptStr = leader.upt ? leader.upt.toFixed(1) : '—';
    var roleHtml = leader.role
      ? '<div class="leader-role">' + e(leader.role) + '</div>'
      : '';

    // ── Bottom-row stat 1: lead margin ───────────────────
    var secondSales = (allStaff && allStaff[1]) ? (allStaff[1].sales || 0) : null;
    var marginHtml;
    if (secondSales !== null && leader.sales > 0) {
      var margin    = (leader.sales || 0) - secondSales;
      var marginCls = margin > 0 ? ' up' : (margin < 0 ? ' down' : '');
      var marginStr = (margin >= 0 ? '+$' : '−$') + Math.abs(margin).toLocaleString();
      marginHtml = '<div class="kstat' + marginCls + '">'
        + '<div class="kstat-v num">' + marginStr + '</div>'
        + '<div class="kstat-l">Ahead of #2</div>'
        + '</div>';
    } else {
      marginHtml = '<div class="kstat">'
        + '<div class="kstat-v num">—</div>'
        + '<div class="kstat-l">Ahead of #2</div>'
        + '</div>';
    }

    // ── Bottom-row stat 2: personal stretch target ───────
    // leader.target comes from GAS (28-day avg daily sales × 1.025).
    // Color: green if already met, amber if within 20% of target, default otherwise.
    var targetHtml;
    var tgtVal = leader.target || 0;
    if (tgtVal > 0) {
      var tgtCls = '';
      if (leader.sales >= tgtVal) {
        tgtCls = ' up';           // green — hit or exceeded
      } else if (leader.sales >= tgtVal * 0.8) {
        tgtCls = ' warn';         // amber — within 20%
      }
      targetHtml = '<div class="kstat' + tgtCls + '">'
        + '<div class="kstat-v num">' + fmtDollars(tgtVal) + '</div>'
        + '<div class="kstat-l">Today\'s target</div>'
        + '</div>';
    } else {
      targetHtml = '<div class="kstat">'
        + '<div class="kstat-v num">—</div>'
        + '<div class="kstat-l">Today\'s target</div>'
        + '</div>';
    }

    // ── Bottom-row stat 3: trophies held by leader ───────
    var leaderNameLower = (leader.name || '').toLowerCase();
    var trophyCount = (badges || []).filter(function(b) {
      return (b.holder || '').toLowerCase() === leaderNameLower;
    }).length;
    var trophyHtml = '<div class="kstat">'
      + '<div class="kstat-v num">'
      + '<span style="color:var(--yellow);">' + trophyCount + '</span>'
      + '<span style="color:var(--text-mute);font-weight:600;">/' + BADGE_TYPE_TOTAL + '</span>'
      + '</div>'
      + '<div class="kstat-l">Trophies today</div>'
      + '</div>';

    // ── Progress bar toward personal target ─────────────
    var leaderRawPct   = leader.target > 0
      ? Math.round((leader.sales / leader.target) * 100) : 0;
    var leaderBarOver  = leaderRawPct > 100;
    var leaderBarFill  = leaderBarOver ? 100 : leaderRawPct;
    var leaderMarkPct  = leaderBarOver ? Math.round(100 / leaderRawPct * 100) : null;
    var leaderBarLbl   = leaderRawPct + '%';
    var leaderFillStyle = leaderBarOver
      ? 'width:0%; --mark-pct:' + leaderMarkPct + '%'
      : 'width:0%';
    var leaderBarHtml = leader.target > 0
      ? '<div class="emp-bar-wrap leader-bar' + (leaderBarOver ? ' bar-over' : '') + '">'
        +   '<div class="emp-bar"><span style="' + leaderFillStyle + '" data-final="' + leaderBarFill + '%"></span></div>'
        +   (leaderMarkPct !== null ? '<div class="emp-bar-mark" style="left:' + leaderMarkPct + '%"></div>' : '')
        +   '<div class="emp-bar-tick" style="left:0%" data-final="' + leaderBarFill + '%">'
        +     '<span class="emp-bar-pct">' + leaderBarLbl + '</span>'
        +     '<span class="emp-bar-chevron">▲</span>'
        +   '</div>'
        + '</div>'
      : '';

    var isLeaderEom = eomKey && leader.nameKey && leader.nameKey === eomKey;
    var eomPillHtml = isLeaderEom
      ? '<span class="eom-badge" style="margin-left:8px"><span class="eom-star">★</span> EoM</span>'
      : '';

    return '<div class="leader-card">'
      + '<div class="leader-header">'
      + '  <span class="kcard-label">Today\'s Leader</span>'
      + eomPillHtml
      + '  <div class="leader-chips">' + chipsHtml + '</div>'
      + '</div>'
      + '<div class="leader-main">'
      + '  <div class="leader-avatar-wrap">'
      + '    <span class="leader-crown">👑</span>'
      + '    <div class="leader-avatar">' + e(leader.initials) + '</div>'
      + '  </div>'
      + '  <div class="leader-info">'
      + '    <div class="leader-name">' + e(dispName) + '</div>'
      + roleHtml
      + '    <div class="leader-secondary">'
      + '      <b>' + e(String(leader.txns || 0)) + '</b> txns'
      + '      · <b>' + e(aovStr) + '</b> AOV'
      + '      · <b>' + e(uptStr) + '</b> UPT'
      + '    </div>'
      + '  </div>'
      + '  <div class="leader-amount-wrap">'
      + '    <div class="leader-amount num" id="kioskLeaderAmt" data-target="' + (leader.sales || 0) + '">'
      + fmtDollars(0) + '</div>'
      + '    <div class="leader-amt-label">Today</div>'
      + '  </div>'
      + '</div>'
      + leaderBarHtml
      + '<div class="kcard-stats">'
      + marginHtml
      + targetHtml
      + trophyHtml
      + '</div>'
      + '</div>';
  }

  // ── Render: Store KPI summary card ─────────────────────
  function renderKpiCard(today) {
    var sales    = today.revenue            || 0;
    var txns     = today.transactions       || 0;
    var aov      = today.avgOrderValue      || 0;
    var upt      = today.avgUPT             || 0;
    var disc     = today.totalDiscounts     || 0;
    var discRate = today.discountRate       || 0;

    var discRatePct = (discRate * 100).toFixed(1) + '%';
    var discCls     = discRate > 0.20 ? ' warn' : '';

    function cell(label, value, id, cls) {
      return '<div class="kpi-cell' + (cls || '') + '"' + (id ? ' id="' + id + 'Wrap"' : '') + '>'
        + '<div class="kpi-cell-v num"' + (id ? ' id="' + id + '"' : '') + '>' + value + '</div>'
        + '<div class="kpi-cell-l">' + label + '</div>'
        + '</div>';
    }

    return '<div class="kpi-card">'
      + '<div class="kcard-label">Store KPIs · Today</div>'
      + '<div class="kpi-card-grid">'
      + cell('Total Sales',     fmtDollars(sales),            'kioskKpiSales')
      + cell('Transactions',    txns.toLocaleString(),         'kioskKpiTxns')
      + '<hr class="kpi-cell-divider">'
      + cell('Avg Order Value', aov > 0 ? '$' + aov.toFixed(2) : '—', 'kioskKpiAov')
      + cell('Units per Txn',   upt > 0 ? upt.toFixed(1) : '—',       'kioskKpiUpt')
      + '<hr class="kpi-cell-divider">'
      + cell('Total Discounts', fmtDollars(disc),             'kioskKpiDisc',     ' warn')
      + cell('Discount Rate',   discRatePct,                  'kioskKpiDiscRate', discCls)
      + '</div>'
      + '</div>';
  }

  // ── Render: Goal arc card ──────────────────────────────
  function renderGoalCard(today) {
    var pct      = today.pctToGoal || 0;
    var pctDisp  = Math.round(pct * 100) + '%';
    var closed   = today.timeRemainingLabel === 'Closed';
    var preOpen  = today.isPreOpen || today.timeRemainingLabel === 'Pre-open';
    var isFinal  = closed || preOpen;
    // Arc for "M 22 122 A 98 98 0 0 1 218 122" ≈ π × 98 = 308
    var ARC_LEN  = 308;

    // Card label: "Yesterday's Results" pre-open, "Daily Goal · $X" otherwise
    var cardLabel = preOpen
      ? 'Yesterday\'s Results · <span id="kioskDailyGoalAmt">' + e(fmtDollars(today.goal)) + '</span>'
      : 'Daily Goal · <span id="kioskDailyGoalAmt">' + e(fmtDollars(today.goal)) + '</span>';

    // "Remain" slot: pre-open shows "Pre-open", closed shows "Closed", else time
    var remainCls  = preOpen ? '' : (closed ? ' store-closed-label' : (' ' + timeZoneClass(today.timeRemainingLabel)).trimRight());
    var remainText = preOpen ? 'Pre-open' : e(today.timeRemainingLabel || '—');

    // "To Go" slot: show shortfall, or green "+$N over" when goal is exceeded.
    // toGo from GAS is always Math.max(0, goal-revenue), so derive overGoal separately.
    var overGoal   = (today.goal > 0 && today.revenue > today.goal)
      ? (today.revenue - today.goal) : 0;
    var isOverGoal = overGoal > 0;
    var toGoHtml, toGoLabel;
    if (isOverGoal) {
      toGoHtml  = '<div class="kstat-v num up" id="kioskGoalToGo">+' + fmtDollars(overGoal) + '</div>';
      toGoLabel = 'Over Goal';
    } else if (isFinal) {
      toGoHtml  = '<div class="kstat-v num" id="kioskGoalToGo">' + fmtDollars(today.toGo || 0) + '</div>';
      toGoLabel = 'Shortfall';
    } else {
      toGoHtml  = '<div class="kstat-v num" id="kioskGoalToGo" data-target="' + (today.toGo || 0) + '">' + fmtDollars(0) + '</div>';
      toGoLabel = 'To Go';
    }

    return '<div class="goal-card' + (closed ? ' store-closed' : '') + '">'
      + '<div class="kcard-label">' + cardLabel + '</div>'
      + '<div class="gauge-wrap">'
      + '  <svg width="240" height="130" viewBox="0 0 240 130">'
      + '    <path d="M 22 122 A 98 98 0 0 1 218 122"'
      + '          stroke="#232a27" stroke-width="14" fill="none" stroke-linecap="butt"/>'
      + '    <path id="kioskGoalArc"'
      + '          d="M 22 122 A 98 98 0 0 1 218 122"'
      + '          stroke="#4ade80" stroke-width="14" fill="none" stroke-linecap="round"'
      + '          stroke-dasharray="' + ARC_LEN + '"'
      + '          stroke-dashoffset="' + ARC_LEN + '"'
      + '          style="transition: stroke-dashoffset 1.6s cubic-bezier(.2,.7,.3,1)"/>'
      + '    <path id="kioskGoalOverflow"'
      + '          d="M 22 122 A 98 98 0 0 1 218 122"'
      + '          stroke="none" stroke-width="16" fill="none" stroke-linecap="round"'
      + '          stroke-dasharray="0 308" stroke-dashoffset="0"'
      + '          style="transition: stroke-dasharray 1.6s cubic-bezier(.2,.7,.3,1), stroke-dashoffset 1.6s cubic-bezier(.2,.7,.3,1); filter: drop-shadow(0 0 4px #86efac)"/>'
      + '  </svg>'
      + '  <div class="gauge-pct">'
      + '    <div class="gp-big num" id="kioskGoalPct">0%</div>'
      + '    <div class="gp-small">' + (isFinal ? 'final' : 'to goal') + '</div>'
      + '  </div>'
      + '</div>'
      + '<div class="kcard-stats">'
      + '  <div class="kstat">'
      + '    <div class="kstat-v num" id="kioskGoalSold" data-target="' + (today.revenue || 0) + '">' + fmtDollars(0) + '</div>'
      + '    <div class="kstat-l">Sold</div>'
      + '  </div>'
      + '  <div class="kstat">'
      + toGoHtml
      + '    <div class="kstat-l" id="kioskToGoLabel">' + toGoLabel + '</div>'
      + '  </div>'
      + '  <div class="kstat">'
      + '    <div class="kstat-v' + remainCls + '" id="kioskTimeRemaining">' + remainText + '</div>'
      + '    <div class="kstat-l">Remain</div>'
      + '  </div>'
      + '</div>'
      + '</div>';
  }
  // ── Render: Pace dial card ─────────────────────────────
  // PACE_RANGE: ±N% maps to ±90° rotation on the arc.
  // Zones: |deg| > 30 → red (left) or green (right); |deg| ≤ 30 → amber.
  var PACE_RANGE = 30;

  // Parse "H:MM" label → total minutes; returns null for "Closed" / invalid
  function parseLabelMins(label) {
    var m = (label || '').match(/^(\d+):(\d+)$/);
    if (!m) return null;
    return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
  }

  // CSS class for time-remaining colour coding
  function timeZoneClass(label) {
    var mins = parseLabelMins(label);
    if (mins === null) return '';
    if (mins <= 30) return 'zone-red';
    if (mins <= 60) return 'zone-amber';
    return '';
  }

  function paceZone(pace) {
    var pct     = (pace || 0) * 100;           // convert decimal to percentage
    var clamped = Math.max(-PACE_RANGE, Math.min(PACE_RANGE, pct));
    var deg     = (clamped / PACE_RANGE) * 90;
    if (deg <= -30) return 'red';
    if (deg >=  30) return 'green';
    return 'amber';
  }

  function renderPaceCard(today) {
    var pace = today.pace || 0;
    var proj = today.projectedRevenue || 0;
    var goal = today.goal || 0;
    var diff = proj - goal;

    // ± % text and zone
    var pctInt  = Math.round(pace * 100);
    var pctStr  = (pctInt >= 0 ? '+' : '−') + Math.abs(pctInt) + '%';
    var zone    = paceZone(pace);
    var zoneColor = zone === 'red' ? 'var(--red)' : zone === 'green' ? 'var(--green)' : 'var(--amber)';

    // Sublabel (under the big %)
    var subLabel = Math.abs(diff) < (goal || 1) * 0.02
      ? 'On plan'
      : diff >= 0 ? 'ahead of plan' : 'behind plan';

    // Tick rotation
    var pct100  = pace * 100;
    var clamped = Math.max(-PACE_RANGE, Math.min(PACE_RANGE, pct100));
    var tickDeg = Math.round((clamped / PACE_RANGE) * 90);

    // Bottom-row stats
    var projStr   = fmtDollars(proj);
    var gapAbs    = Math.abs(Math.round(diff));
    var gapStr    = '$' + gapAbs.toLocaleString();
    var statusStr = Math.abs(diff) < (goal || 1) * 0.02
      ? 'On plan'
      : diff >= 0 ? 'Ahead' : 'Behind';
    var gapCls    = diff >= 0 ? '' : ' down';
    var statusCls = diff >= 0 ? '' : ' down';

    return '<div class="pace-card">'
      + '<div class="kcard-label">Pace · vs. Plan</div>'
      + '<div class="gauge-wrap pace-gauge-wrap">'
      + '  <svg width="240" height="130" viewBox="0 0 240 130">'
      // Background track
      + '    <path d="M 22 122 A 98 98 0 0 1 218 122"'
      + '          stroke="#232a27" stroke-width="14" fill="none" stroke-linecap="round"/>'
      // 3-zone color band
      + '    <path d="M 22 122 A 98 98 0 0 1 71 37"'
      + '          stroke="#ef4444" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.62"/>'
      + '    <path d="M 71 37 A 98 98 0 0 1 169 37"'
      + '          stroke="#eab308" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.62"/>'
      + '    <path d="M 169 37 A 98 98 0 0 1 218 122"'
      + '          stroke="#4ade80" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.62"/>'
      // Apex anchor tick
      + '    <line x1="120" y1="14" x2="120" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>'
      // Pill position indicator — rotates around arc center (120, 122)
      + '    <g id="kioskPaceNeedle"'
      + '       style="transform-origin:120px 122px;transform:rotate(' + tickDeg + 'deg);'
      + 'transition:transform 1.4s cubic-bezier(.2,.7,.3,1)">'
      + '      <rect x="113" y="11" width="14" height="26" rx="7" fill="#0a0e0d" opacity="0.55"/>'
      + '      <rect x="115" y="13" width="10" height="22" rx="5" fill="#e6ece9" stroke="#0a0e0d" stroke-width="1.5"/>'
      + '    </g>'
      + '  </svg>'
      + '  <div class="gauge-pct">'
      + '    <div class="gp-big num zone-' + zone + '" id="kioskPacePct">' + e(pctStr) + '</div>'
      + '    <div class="gp-small" id="kioskPaceLabel" style="color:' + zoneColor + '">' + e(subLabel) + '</div>'
      + '  </div>'
      + '</div>'
      + '<div class="kcard-stats">'
      + '  <div class="kstat">'
      + '    <div class="kstat-v num" id="kioskPaceProjVal">' + e(projStr) + '</div>'
      + '    <div class="kstat-l">Projected</div>'
      + '  </div>'
      + '  <div class="kstat' + gapCls + '">'
      + '    <div class="kstat-v num" id="kioskPaceShortBy">' + e(gapStr) + '</div>'
      + '    <div class="kstat-l" id="kioskPaceShortByLabel">' + e(diff >= 0 ? 'Ahead by' : 'Short by') + '</div>'
      + '  </div>'
      + '</div>'
      + '</div>';
  }
  // ── Render: Staff leaderboard grid ────────────────────
  // onShift: full roster array with { initials, name, role, status, note }
  //          used to build shift-status and mark off-shift employees
  // badges:  normalized badge array — used to show which trophies each emp holds
  function renderStaffGrid(staff, storeName, onShift, badges, eomKey) {
    // Build shift status map: name (lower) → { status, note }
    var shiftMap = {};
    (onShift || []).forEach(function(p) {
      shiftMap[(p.name || '').toLowerCase()] = { status: p.status || 'on', note: p.note || null };
    });

    // Build badge map: holder name (lower) → [badge, ...]
    var badgeMap = {};
    (badges || []).forEach(function(b) {
      if (!b.holder) return;
      var key = b.holder.toLowerCase();
      if (!badgeMap[key]) badgeMap[key] = [];
      badgeMap[key].push(b);
    });

    // Count first-name frequency across the FULL roster (onShift) so that
    // an off-shift Zachary triggers disambiguation for the on-shift Zachary too.
    var firstNameCount = {};
    (onShift || []).forEach(function(p) {
      var fn = (p.name || '').split(' ')[0].toLowerCase();
      firstNameCount[fn] = (firstNameCount[fn] || 0) + 1;
    });
    // Also include any leaderboard entries not in the onShift roster
    staff.forEach(function(s) {
      var inRoster = (onShift || []).some(function(p) {
        return (p.name || '').toLowerCase() === (s.name || '').toLowerCase();
      });
      if (!inRoster) {
        var fn = (s.name || '').split(' ')[0].toLowerCase();
        firstNameCount[fn] = (firstNameCount[fn] || 0) + 1;
      }
    });

    // Tag the top-2 off-shift employees who had sales today as "recently active"
    // so iPad mode can show them as ghost placeholders.
    var recentOffShiftCount = 0;
    var recentOffShiftSet   = {};
    staff.forEach(function(s) {
      var nameKey    = (s.name || '').toLowerCase();
      var shift      = shiftMap[nameKey] || { status: 'on', note: null };
      var isOffShift = shift.status !== 'on';
      if (isOffShift && s.sales > 0 && recentOffShiftCount < 2) {
        recentOffShiftSet[nameKey] = true;
        recentOffShiftCount++;
      }
    });

    var cards = staff.map(function(s) {
      var isLeading  = s.rank === 1;
      var barPct     = s.target > 0 ? Math.min(rawBarPct, 100) : 0;
      var aovStr     = s.aov  ? '$' + s.aov.toFixed(2) : '—';
      var uptStr     = s.upt  ? s.upt.toFixed(1)        : '—';
      var nameKey    = (s.name || '').toLowerCase();
      var shift      = shiftMap[nameKey] || { status: 'on', note: null };
      var isOffShift = shift.status !== 'on';
      var isRecent   = isOffShift && !!recentOffShiftSet[nameKey];

      // Trophies this employee currently holds — computed first so icons can appear in streak line.
      // Try full-name key first (fixture holders = "Dean Deloof").
      // Fall back to first-name key (GAS holders = "Zachary") ONLY when that
      // first name is unique in the roster — avoids giving one Zachary's trophies
      // to a different Zachary at rank #4.
      var firstKey        = (s.name || '').split(' ')[0].toLowerCase();
      var firstNameUnique = firstNameCount[firstKey] === 1;
      var myBadges        = badgeMap[nameKey] || (firstNameUnique ? badgeMap[firstKey] : null) || [];
      // Badge icons are shown inline with the streak count — no separate chips row needed.
      var badgeIconsStr   = myBadges.map(function(b) { return b.icon; }).join('');
      var badgesHtml      = '';  // icons now live in the streak line below

      // Streak / personal best row — trophy icons prefixed before the day count.
      // e.g. "💰🔥 3 day streak" (AOV Avenger + Top Sales, 3-day run)
      // 🔥 is the Top Sales badge icon — never used as a generic streak fallback.
      var extraHtml = '';
      if (s.streak > 0 && badgeIconsStr) {
        var streakLabel = badgeIconsStr + ' ' + e(s.streak) + ' day streak';
        extraHtml = '<div class="emp-extra streak">' + streakLabel + '</div>';
      } else if (s.personalBestPct !== null && s.personalBestPct >= 0.90) {
        extraHtml = '<div class="emp-extra pb">⚡ Personal best in sight</div>';
      }

      // Off-shift status pill — shows note ("Back at 8p") or generic label
      var statusHtml = '';
      if (isOffShift) {
        var pillCls = shift.status === 'later' ? 'status-later' : 'status-off';
        var pillTxt = shift.note || (shift.status === 'later' ? 'Later today' : 'Off shift');
        statusHtml = '<div class="emp-status-pill ' + e(pillCls) + '">' + e(pillTxt) + '</div>';
      }

      var amtId = 'kioskEmpAmt' + s.rank;

      // Under 100%: bar fills proportionally, no glow, no mark.
      // Over 100%:  bar is always full width + glow; hash mark slides left
      //             to show how far past target they are (mark = 100/rawPct %).
      var rawBarPct     = s.target > 0 ? Math.round((s.sales / s.target) * 100) : 0;
      var barOver       = rawBarPct > 100;
      var barFillPct    = barOver ? 100 : rawBarPct;
      var targetMarkPct = barOver ? Math.round(100 / rawBarPct * 100) : null;
      var pctLabel      = rawBarPct + '%';
      // --mark-pct CSS var drives the ::after glow start position on the fill span
      var fillStyle     = barOver
        ? 'width:0%; --mark-pct:' + targetMarkPct + '%'
        : 'width:0%';
      var statsBody = s.sales > 0
        ? '<div class="emp-amt num" id="' + amtId + '" data-target="' + (s.sales || 0) + '">' + fmtDollars(0) + '</div>'
          + '<div class="emp-bar-wrap' + (barOver ? ' bar-over' : '') + '">'
          +   '<div class="emp-bar"><span style="' + fillStyle + '" data-final="' + barFillPct + '%"></span></div>'
          +   (targetMarkPct !== null ? '<div class="emp-bar-mark" style="left:' + targetMarkPct + '%"></div>' : '')
          +   '<div class="emp-bar-tick" style="left:0%" data-final="' + barFillPct + '%">'
          +     '<span class="emp-bar-pct">' + pctLabel + '</span>'
          +     '<span class="emp-bar-chevron">▲</span>'
          +   '</div>'
          + '</div>'
          + '<div class="emp-stats"><span>AOV <b>' + e(aovStr) + '</b></span><span>UPT <b>' + e(uptStr) + '</b></span>'
          + (s.target > 0 ? '<span>Target <b class="num">' + fmtDollars(s.target) + '</b></span>' : '')
          + '</div>'
        : '<div class="emp-amt" style="color:var(--text-mute);font-size:13px;margin-top:12px">No sales yet</div>';

      var dispName = s.name;
      var isEom     = !!(eomKey && s.nameKey && s.nameKey === eomKey);
      var eomCorner = isEom
        ? '<div class="eom-corner">'
          + '<span class="eom-badge"><span class="eom-star">★</span> EoM</span>'
          + '<span class="eom-rank">#' + e(s.rank) + ' today</span>'
          + '</div>'
        : '';
      // When EoM, the in-flow rank is hidden via CSS (.emp-card.eom > .emp-rank { display:none })
      // and re-rendered inside the corner stack above.
      return '<div class="emp-card' + (isLeading ? ' leading' : '') + (isOffShift ? ' off-shift' : '') + (isRecent ? ' ghost-recent' : '') + (isEom ? ' eom' : '') + '">'
        + (isEom ? '' : '<span class="emp-rank">#' + e(s.rank) + '</span>')
        + eomCorner
        + '<div class="emp-head">'
        + GC.lbAvaPuck(s.nameKey, s.avatarConfig, s.initials, true)
        + '  <div>'
        + '    <div class="emp-n">' + e(dispName) + '</div>'
        + '    <div class="emp-initials">' + e(s.initials) + '</div>'
        + '    <div class="emp-r">' + e(s.role) + '</div>'
        + '  </div>'
        + '</div>'
        + statsBody
        + badgesHtml
        + statusHtml
        + extraHtml
        + '</div>';
    }).join('');

    // Ghost cards — roster members with no leaderboard entry today
    // (GAS marks these status:'off' with sales:0; they haven't transacted yet)
    var staffNames = {};
    staff.forEach(function(s) { staffNames[(s.name || '').toLowerCase()] = true; });

    var ghostCards = (onShift || [])
      .filter(function(p) {
        return p.status !== 'on' && !staffNames[(p.name || '').toLowerCase()];
      })
      .map(function(p) {
        var pillCls  = p.status === 'later' ? 'status-later' : 'status-off';
        var pillTxt  = p.note || (p.status === 'later' ? 'Later today' : 'Off shift');
        var nameKey  = (p.name || '').toLowerCase();
        var fn       = (p.name || '').split(' ')[0].toLowerCase();
        var fnUnique = firstNameCount[fn] === 1;
        var myBadges = badgeMap[nameKey] || (fnUnique ? badgeMap[fn] : null) || [];
        var badgesHtml = myBadges.length > 0
          ? '<div class="emp-badges">'
              + myBadges.map(function(b) {
                  return '<span class="emp-badge-chip" title="' + e(b.title) + '">' + b.icon + '</span>';
                }).join('')
            + '</div>'
          : '';
        var ghostDispName = p.name;
        var ghostNameKey  = p.nameKey || GC.nameToKey(p.name || '');
        var isGhostEom    = !!(eomKey && ghostNameKey && ghostNameKey === eomKey);
        var ghostEomCorner = isGhostEom
          ? '<div class="eom-corner"><span class="eom-badge"><span class="eom-star">★</span> EoM</span></div>'
          : '';
        return '<div class="emp-card off-shift' + (isGhostEom ? ' eom' : '') + '">'
          + ghostEomCorner
          + '<div class="emp-head">'
          + GC.lbAvaPuck(ghostNameKey, p.avatarConfig || null, p.initials || '??', true)
          + '  <div>'
          + '    <div class="emp-n">' + e(ghostDispName) + '</div>'
          + '    <div class="emp-r">' + e(p.role || '') + '</div>'
          + '  </div>'
          + '</div>'
          + (isGhostEom ? '' : badgesHtml)
          + '<div class="emp-status-pill ' + e(pillCls) + '">' + e(pillTxt) + '</div>'
          + '</div>';
      }).join('');

    return '<section class="lb-section">'
      + '<div class="lb-head">'
      + '  <h2>Today · ' + e(storeName || '') + ' Team</h2>'
      + '  <span class="lb-sep">/</span>'
      + '  <span class="lb-meta">Live · refreshes every 30 seconds</span>'
      + '</div>'
      + '<div class="lb-grid">' + cards + ghostCards + '</div>'
      + '</section>';
  }

  // ── Render: Weekly badges ──────────────────────────────
  function renderBadges(badges) {
    // Short stat label by badge type — avoids long descriptors ("discount rate") overflowing
    var SHORT_STAT_LABEL = {
      'b-aov':    'AOV',
      'b-upt':    'UPT',
      'b-clean':  'Disc.',
      'b-streak': 'Sales',
      'b-close':  'Tickets',
      'b-new':    'New cust.',
      'b-txn':    'Items',
    };

    // Count first names across all badge holders — disambiguate with last initial when duped
    var badgeFirstNames = {};
    (badges || []).forEach(function(b) {
      var fn = (b.holder || '').trim().split(/\s+/)[0].toLowerCase();
      badgeFirstNames[fn] = (badgeFirstNames[fn] || 0) + 1;
    });

    var items = (badges || []).map(function(b) {
      // Holder display: first name, + last initial if first name is shared
      var parts       = (b.holder || '').trim().split(/\s+/);
      var fn          = (parts[0] || '').toLowerCase();
      var displayName = parts[0] || '';
      if (badgeFirstNames[fn] > 1 && parts.length > 1) {
        displayName += ' ' + parts[parts.length - 1][0].toUpperCase() + '.';
      }
      // Split stat into value + descriptor: "$39.81 avg ticket" → ["$39.81", "avg ticket"]
      // Use short label from map if available (avoids long GAS descriptors overflowing)
      var statParts = (b.stat || '').trim().split(/\s+(.*)/);
      var statVal   = statParts[0] || '';
      var statLabel = SHORT_STAT_LABEL[b.type] || statParts[1] || '';
      return '<div class="badge-item ' + e(b.type) + '">'
          + '<div class="badge-icon">' + b.icon + '</div>'
          + '<div class="badge-info">'
          + '  <div class="badge-title">' + e(b.title) + '</div>'
          + '  <div class="badge-holder">' + e(displayName) + '</div>'
          + '</div>'
          + '<div class="badge-stat">'
          + '  <div class="badge-stat-value">' + e(statVal) + '</div>'
          + (statLabel ? '<div class="badge-stat-label">' + e(statLabel) + '</div>' : '')
          + '</div>'
          + '</div>';
    }).join('');

    return '<div class="kiosk-card badges-card">'
      + '<div class="kcard-label">This Week\'s Trophies</div>'
      + '<div class="badges-grid">' + items + '</div>'
      + '</div>';
  }

  // ── Render: Hourly heatmap ─────────────────────────────
  function renderHeatmap(hourly, peakHour, peakRevenue, goal, hourlyTargets) {
    // Color interpolation: 0% → #1a2c21, 100% → #4ade80
    function pctColor(pct, projected) {
      if (projected) return '#232a27';
      var t = pct / 100;
      var r = Math.round(26  + t * (74  - 26));
      var g = Math.round(44  + t * (222 - 44));
      var b = Math.round(33  + t * (128 - 33));
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    var numHours = (hourly && hourly.length) || 13;
    // Only use targets when real same-DOW historical data is available.
    // No flat fallback — without history the chart shows normally with no notches,
    // avoiding the bar-compression artifact from a flat goal ÷ hours estimate.
    var targets = (hourlyTargets && hourlyTargets.length === numHours)
      ? hourlyTargets : null;

    // Chart scale: only expand for tallest target when we have real targets
    var maxTarget    = targets ? Math.max.apply(null, targets) : 0;
    var effectiveMax = Math.max(peakRevenue || 0, maxTarget) || 1;

    var bars = (hourly || []).map(function(h, i) {
      var cls = '';
      if (h.current)   cls = ' now';
      if (h.projected) cls = ' projected';

      var amt       = h.revenue != null ? h.revenue
                    : h.amount  != null ? h.amount
                    : Math.round((h.pct || 0) * (peakRevenue || 0) / 100);
      var scaledPct = Math.min(100, (amt / effectiveMax) * 100);
      var color     = pctColor(scaledPct, h.projected);

      // Per-bar target notch — placed in column wrapper so it's always chart-relative.
      // This works even for projected bars that have 0 revenue (height ≈ 0).
      var notchHtml = '';
      if (targets && targets[i] > 0) {
        var tgt         = targets[i];
        var tgtChartPct = Math.min(100, (tgt / effectiveMax) * 100); // % of chart height
        var miss        = amt < tgt;
        notchHtml = '<div class="hm-notch' + (miss ? ' hm-notch--miss' : '') + '"'
          + ' style="bottom:' + tgtChartPct.toFixed(1) + '%"></div>';
      }

      var tipGoal = (targets && targets[i] > 0)
        ? '<span class="hm-tip-goal">goal $' + e(Math.round(targets[i]).toLocaleString('en-US')) + '</span>'
        : '';

      // Bars start at height:0 and animate up via data-final + animateHeatmap().
      // Notch lives in .hm-col (chart-relative), bar + tooltip live in .hm-bar
      return '<div class="hm-col">'
        + notchHtml
        + '<div class="hm-bar' + cls + '" style="height:0%;background:' + color + '"'
        + ' data-final="' + scaledPct.toFixed(1) + '%">'
        + '<div class="hm-tooltip"><span class="hm-tip-amt">$' + e(amt.toLocaleString()) + (h.projected ? ' est.' : '') + '</span>' + tipGoal + '</div>'
        + '<span class="hm-hour">' + e(h.hour) + '</span>'
        + '</div>'
        + '</div>';
    }).join('');

    var peakStr = peakHour
      ? 'Peak · ' + e(peakHour) + ' · ' + e(fmtDollars(peakRevenue || 0))
      : '';
    // When targets haven't loaded yet, show a subtle hint in the legend
    var targetStatus = !targets
      ? '<span class="hm-targets-loading">· targets loading…</span>'
      : '';

    return '<div class="kiosk-card heatmap-card">'
      + '<div class="kcard-label">Today by Hour</div>'
      + '<div class="heatmap">' + bars + '</div>'
      + '<div class="hm-legend">'
      + '  <span>Open</span>'
      + '  <span class="hm-peak">' + e(peakStr) + targetStatus + '</span>'
      + '  <span>Close</span>'
      + '</div>'
      + '</div>';
  }

  // ── Render: Live ticker ────────────────────────────────
  function renderTicker(items) {
    var rows = (items || []).map(function(t) {
      var big = (t.amount || 0) >= GC.THRESHOLDS.bigTransactionMin;
      return '<div class="ticker-item' + (big ? ' ticker-item--big' : '') + '">'
        + '<span class="t-time">' + e(t.time) + '</span>'
        + '<span class="t-who"><span class="t-who-name">' + e(t.firstName || '') + '</span>'
        +                        '<span class="t-who-init">' + e(nameToInitials(t.firstName)) + '</span></span>'
        + '<span class="t-desc">' + e(t.desc) + '</span>'
        + '<span class="t-amt">'  + e(fmtDollars(t.amount)) + '</span>'
        + '</div>';
    }).join('');

    return '<div class="kiosk-card ticker-card">'
      + '<div class="ticker-header">'
      + '  <div class="kcard-label" style="margin-bottom:0">Live Sales</div>'
      + '  <span class="ticker-live">Live</span>'
      + '</div>'
      + '<div class="ticker-feed" id="kioskTickerFeed">' + rows + '</div>'
      + '</div>';
  }

  // ── Closing push helpers ───────────────────────────────

  /** Returns minutes left until store close (10pm PT), using client-side PT time. */
  function getMinutesLeftPT_() {
    try {
      var parts = {};
      new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Los_Angeles', hour: 'numeric', minute: 'numeric', hour12: false
      }).formatToParts(new Date()).forEach(function(p) { parts[p.type] = parseInt(p.value, 10) || 0; });
      return 22 * 60 - (parts.hour * 60 + parts.minute);
    } catch(err) {
      return 999;
    }
  }

  // ── Render: Closing push banner ────────────────────────
  function renderClosingBanner() {
    return '<div id="kioskClosingPush" class="closing-push" style="display:none">'
      + '<div class="cp-icon">⏳</div>'
      + '<div class="cp-body">'
      + '  <div class="cp-headline">CLOSING PUSH &nbsp;·&nbsp; <span id="cpTimeLeft">—</span></div>'
      + '  <div class="cp-detail">'
      + '    Need <span class="cp-need num" id="cpNeed">—</span> to hit today\'s goal'
      + '    <span class="cp-txns"> · ≈<span id="cpTxns">—</span> more sales at <span id="cpAov">—</span> avg</span>'
      + '  </div>'
      + '</div>'
      + '</div>';
  }

  /** Show/hide/update the closing push banner based on current time + remaining goal. */
  function updateClosingBanner(td) {
    var banner = document.getElementById('kioskClosingPush');
    if (!banner) return;

    var toGo  = td.toGo           || 0;
    var aov   = td.avgOrderValue  || 0;
    var mins  = getMinutesLeftPT_();

    // Show when store is open, ≤ 2h left, and goal not yet hit
    var show = mins > 0 && mins <= 120 && toGo > 0;
    banner.style.display = show ? 'flex' : 'none';
    if (!show) return;

    var h      = Math.floor(mins / 60);
    var m      = mins % 60;
    var tStr   = h > 0
      ? h + 'h ' + (m > 0 ? m + 'm' : '') + ' left'
      : m + ' min left';

    var txns   = aov > 0 ? Math.ceil(toGo / aov) : null;
    var aovStr = aov > 0 ? ('$' + Math.round(aov).toLocaleString()) : null;

    var timeEl = document.getElementById('cpTimeLeft');
    var needEl = document.getElementById('cpNeed');
    var txnsEl = document.getElementById('cpTxns');
    var aovEl  = document.getElementById('cpAov');
    var txnsWrap = banner.querySelector('.cp-txns');

    if (timeEl) timeEl.textContent = tStr;
    if (needEl) needEl.textContent = '$' + Math.round(toGo).toLocaleString();
    if (txns !== null) {
      if (txnsEl) txnsEl.textContent = txns;
      if (aovEl)  aovEl.textContent  = aovStr;
      if (txnsWrap) txnsWrap.style.display = '';
    } else {
      if (txnsWrap) txnsWrap.style.display = 'none';
    }
  }

  // ── Render: Rare drop overlay ──────────────────────────
  function renderRareDrop() {
    return '<div id="kioskRareDrop" onclick="kiosk._hideRareDrop(event)">'
      + '  <div class="raredrop-box" onclick="event.stopPropagation()">'
      + '    <div class="rd-gem">💎</div>'
      + '    <div class="rd-kicker">Rare Drop</div>'
      + '    <div class="rd-who" id="rdWho"></div>'
      + '    <div class="rd-item" id="rdItem"></div>'
      + '    <div class="rd-price num" id="rdPrice"></div>'
      + '    <button class="rd-close" onclick="kiosk._hideRareDrop()">Nice 🔥</button>'
      + '  </div>'
      + '</div>';

  // ── Full render ────────────────────────────────────────
  function render(data, slug) {
    var storeData    = data.today;
    var store        = storeData.store;
    var today        = storeData.today;
    var onShift      = storeData.onShift || [];
    var hourly       = storeData.hourly;
    var peakHour     = storeData.peakHour;
    var peakRevenue  = storeData.peakRevenue;
    var ticker       = storeData.ticker;
    var staff        = data.leaderboard.staff;
    var badges       = data.badges.badges;
    var leader       = staff[0] || {};
    _leaderName = leader.name || '';
    _eomKey     = data.eomKey || null;  // store for poll updates

    return [
      '<canvas id="kioskConfetti"></canvas>',
      '<div id="kioskGoalBanner">🎯 DAILY GOAL HIT! · ' + e(store.name.toUpperCase()) + ' TEAM!</div>',
      '<div class="kiosk-wrap">',
        renderHeader(store),
        renderStaffGrid(staff, store.name, onShift, badges, _eomKey),
        '<div class="hero-grid">',
          renderGoalCard(today),
          renderPaceCard(today),
          renderKpiCard(today),
        '</div>',
        renderClosingBanner(),
        '<div class="lower-grid">',
          renderBadges(badges),
          renderHeatmap(hourly, peakHour, peakRevenue, _goal, _hourlyTargets),
          renderTicker(ticker),
        '</div>',
      '</div>',
      renderRareDrop(),
    ].join('');

  // ── init ──────────────────────────────────────────────
  // Animate all .hm-bar elements from height:0 to their data-final target.
  // Force a synchronous layout read first so the browser commits height:0% before
  // we set the final value — without this, microtask-resolved cache hits let both
  // rAFs fire before any paint, and the browser skips the transition entirely.
  function animateHeatmap() {
    var bars = document.querySelectorAll('.hm-bar[data-final]');
    // Reading offsetHeight forces the browser to flush pending style/layout,
    // committing the height:0% state so the subsequent style change triggers a transition.
    bars.forEach(function(bar) { void bar.offsetHeight; });
    requestAnimationFrame(function() {
      bars.forEach(function(bar) {
        bar.style.height = bar.getAttribute('data-final');
      });
    });
  }

  function init(data, slug) {
    _slug      = slug;
    _storeName = (data.today.store && data.today.store.name) || slug || '';

    // Full roster + badges — kept for leaderboard refresh re-renders
    _onShift       = data.today.onShift || [];
    _badges        = data.badges.badges || [];
    _goal          = (data.today.today && data.today.today.goal) || data.today.goal || 0;
    _hourlyTargets = data.today.hourlyTargets || null;

    // Seed ticker cursor from the most recent transaction timestamp
    _lastTxnTs = data.today.latestTxnTs || '';

    // Seed dedup set from initial ticker so polls don't re-inject what's already shown
    _seenTxnKeys = {};
    (data.today.ticker || []).forEach(function(t) {
      // Fixture tickers use {time,firstName,desc,amount}; GAS raw uses {ts,who,item,price}
      var key = (t.ts || t.time || '') + '|' + (t.who || t.firstName || '') + '|' + (t.price || t.amount || 0);
      _seenTxnKeys[key] = true;
    });

    document.body.classList.add('kiosk-bg');

    startClock();
    runCountUps(data);
    animateGoalArc(data.today.today.pctToGoal);
    animatePaceNeedle(data.today.today.pace);
    animateBars();
    animateHeatmap();
    updateClosingBanner(data.today.today);
    initConfetti();
    startPolling(slug);

    // User chip → sign out
    var kioskChip = document.getElementById('kioskUserChip');
    if (kioskChip) kioskChip.addEventListener('click', function() {
      if (confirm('Sign out?')) {
        GC.auth.clear();
        GC.router.navigate('#/login');
      }
    });

    // Inject slideshow bar if active
    if (GC.slideshow.active) GC.slideshow.injectBar(slug);

    // Seed celebration flag — if goal is already hit on load, fire confetti once
    _goalCelebrated = (data.today.today.pctToGoal || 0) >= GC.THRESHOLDS.goalCelebrationAt;
    if (_goalCelebrated) {
      setTimeout(fireConfetti, 800);
    }
  }

  // ── Clock ──────────────────────────────────────────────
  function startClock() {
    function tick() {
      var now  = new Date();
      var el   = document.getElementById('kioskTime');
      var elD  = document.getElementById('kioskDate');
      if (el)  el.textContent  = GC.fmtTime(now);
      if (elD) elD.textContent = GC.fmtDateShort(now).toUpperCase();
    }
    tick();
    clearInterval(_clockTimer);
    _clockTimer = setInterval(tick, 1000);
  }

  // ── Count-up animation ─────────────────────────────────
  function countUp(el, target, duration) {
    duration = duration || 1400;
    var start = performance.now();
    function frame(now) {
      var t      = Math.min(1, (now - start) / duration);
      var eased  = 1 - Math.pow(1 - t, 3);
      var val    = Math.round(target * eased);
      el.textContent = '$' + val.toLocaleString();
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function runCountUps(data) {
    // Goal stats
    var soldEl  = document.getElementById('kioskGoalSold');
    var toGoEl  = document.getElementById('kioskGoalToGo');
    if (soldEl) countUp(soldEl, parseInt(soldEl.getAttribute('data-target'), 10) || 0);
    if (toGoEl) countUp(toGoEl, parseInt(toGoEl.getAttribute('data-target'), 10) || 0);

    // Pace card ±% is plain text — no countUp needed

    // Employee amounts
    var staff = data.leaderboard.staff || [];
    staff.forEach(function(s) {
      var el = document.getElementById('kioskEmpAmt' + s.rank);
      if (el) countUp(el, s.sales || 0, 1200);
    });

    // Goal percentage counter
    var pctEl = document.getElementById('kioskGoalPct');
    if (pctEl) {
      var pctTarget = Math.round((data.today.today.pctToGoal || 0) * 100);
      var pctStart  = performance.now();
      var pctDur    = 1600;
      (function animPct(now) {
        var t     = Math.min(1, (now - pctStart) / pctDur);
        var eased = 1 - Math.pow(1 - t, 3);
        pctEl.textContent = Math.round(pctTarget * eased) + '%';
        if (t < 1) requestAnimationFrame(animPct);
      })(pctStart);
    }
  }

  // ── Goal arc ───────────────────────────────────────────
  function animateGoalArc(pct) {
    var ARC_LEN = 308;
    setTimeout(function() {
      setGoalArcs(pct || 0);
    }, 250);
  }

  function setGoalArcs(pct) {
    var ARC_LEN = 308;
    var capped  = Math.min(pct, 1);
    var arc = document.getElementById('kioskGoalArc');
    var ovr = document.getElementById('kioskGoalOverflow');

    if (arc) arc.setAttribute('stroke-dashoffset', String(Math.round(ARC_LEN * (1 - capped))));

    if (ovr) {
      if (pct > 1) {
        var overLen = Math.round(Math.min(pct - 1, 0.5) * ARC_LEN);
        ovr.setAttribute('stroke',            '#a3f0be');
        ovr.setAttribute('stroke-dasharray',  overLen + ' 9999');
        ovr.setAttribute('stroke-dashoffset', String(-(ARC_LEN - overLen)));
      } else {
        // stroke="none" prevents the round-linecap zero-length dash from drawing a dot
        ovr.setAttribute('stroke',            'none');
        ovr.setAttribute('stroke-dasharray',  '0 308');
        ovr.setAttribute('stroke-dashoffset', '0');
      }
    }
  }

  // ── Pace tick ─────────────────────────────────────────
  function animatePaceNeedle(pace) {
    setTimeout(function() {
      var tick = document.getElementById('kioskPaceNeedle');
      if (!tick) return;
      var pct100  = (pace || 0) * 100;
      var clamped = Math.max(-PACE_RANGE, Math.min(PACE_RANGE, pct100));
      var deg     = Math.round((clamped / PACE_RANGE) * 90);
      tick.style.transform = 'rotate(' + deg + 'deg)';
    }, 350);
  }

  // ── Animate employee bars ──────────────────────────────
  function animateBars() {
    setTimeout(function() {
      document.querySelectorAll('.emp-bar span[data-final]').forEach(function(span) {
        span.style.width = span.getAttribute('data-final');
      });
      document.querySelectorAll('.emp-bar-tick[data-final]').forEach(function(tick) {
        tick.style.left = tick.getAttribute('data-final');
      });
    }, 400);
  }

  // ── Live ticker ────────────────────────────────────────

  /** Format a local-time string "2026-05-20T14:32:00" → "2:32p" */
  function fmtTxnTime(ts) {
    // Parse directly from string chars to avoid UTC-offset issues
    var h  = ts && ts.length >= 13 ? parseInt(ts.slice(11, 13), 10) : new Date().getHours();
    var mn = ts && ts.length >= 16 ? parseInt(ts.slice(14, 16), 10) : new Date().getMinutes();
    var hh = ((h + 11) % 12) + 1;
    return hh + ':' + mn.toString().padStart(2, '0') + (h >= 12 ? 'p' : 'a');
  }

  /**
   * Inject real new transactions from a delta poll response into the ticker feed.
   * items: array of { who, item, price, ts } (GAS delta format)
   */
  function injectTickerItems(items) {
    var feed = document.getElementById('kioskTickerFeed');
    if (!feed || !items || !items.length) return;

    items.forEach(function(t) {
      // Dedup: skip items already shown (handles GAS returning same transactions on repeat polls)
      var key = (t.ts || '') + '|' + (t.who || '') + '|' + (t.price || 0);
      if (_seenTxnKeys[key]) return;
      _seenTxnKeys[key] = true;

      var qty     = t.qty || 0;
      var qtyStr  = qty > 0 ? (qty + (qty === 1 ? ' item' : ' items')) : '';
      var big = (t.price || 0) >= GC.THRESHOLDS.bigTransactionMin;
      var el = document.createElement('div');
      el.className = 'ticker-item fresh' + (big ? ' ticker-item--big' : '');
      el.innerHTML = '<span class="t-time">' + GC.esc(fmtTxnTime(t.ts)) + '</span>'
        + '<span class="t-who"><span class="t-who-name">' + GC.esc(t.who || '') + '</span>'
        +                     '<span class="t-who-init">' + GC.esc(nameToInitials(t.who || '')) + '</span></span>'
        + '<span class="t-desc">' + GC.esc(qtyStr)        + '</span>'
        + '<span class="t-amt">'  + GC.esc(fmtDollars(t.price || 0)) + '</span>';
      feed.insertBefore(el, feed.firstChild);
      setTimeout(function() { el.classList.remove('fresh'); }, 1800);

      // Trigger celebration overlays for high-value transactions
      var txnPrice = t.price || 0;
      if (txnPrice >= GC.THRESHOLDS.rareDropMinTransaction) {
        showRareDrop(t.who || '', t.item || '', txnPrice);
      } else if (txnPrice >= GC.THRESHOLDS.bigTransactionMin) {
        fireBigTxnCelebration(t.who || '', txnPrice);
      }
    });

    // Keep feed trimmed to 10 rows
    while (feed.children.length > 10) feed.removeChild(feed.lastChild);
  }

  // ── Data normalizer ────────────────────────────────────────────
  // Converts GAS flat shape OR fixture nested shape into the canonical
  // nested shape that render / init / runCountUps expect.
  //
  // GAS flat today: { storeSlug, storeName, goal, revenue, pctToGoal, pace,
  //                   projectedRevenue, toGo, timeRemainingLabel,
  //                   onShift, hourly, ticker:[{who,item,price,ts}] }
  // Fixture today:  { store:{id,name,slug}, today:{goal,revenue,pctToGoal,...},
  //                   onShift, hourly, ticker:[{time,firstName,desc,amount}] }
  //
  // Staff: GAS uses avgOrderValue/transactions/streakDays
  //        Fixture uses aov/txns/streak + streakType
  // Badges: GAS uses label/winner/detail; fixture uses title/holder/stat
  // Look up an avatar config by nameKey, falling back to each name segment.
  // Handles both old saves (first-name-only key "maria") and new saves
  // (canonical full-name key "maria_sunshine") regardless of lookup key format.
  // Delegate to the shared GC utility so all modules use the same logic.
  function findAvatarCfg_(configs, nameKey, altKey) { return GC.findAvatarCfg(configs, nameKey, altKey); }

  function normalizeKioskData_(rawData) {
    var td = rawData.today       || {};
    var lb = rawData.leaderboard || {};
    var bg = rawData.badges      || {};

    // Avatar config map — declared early so onShift + staff normalization can both use it
    var kioskAvatarConfigs = lb.avatarConfigs || {};
    _avatarConfigs = kioskAvatarConfigs; // store for user chip in renderHeader

    // ── today block ──
    var normalizedToday;
    if (td.store && td.today) {
      // Fixture shape — pass through with onShift roles defaulted
      normalizedToday = Object.assign({}, td, {
        onShift: (td.onShift || []).map(function(p) {
          return Object.assign({ role: '', note: null }, p);
        }),
      });
    } else {
      // GAS flat shape → convert to fixture-compatible nested shape
      normalizedToday = {
        store: {
          id:   td.storeSlug || '',
          name: td.storeName || td.storeSlug || '',
          slug: td.storeSlug || '',
        },
        today: {
          goal:               td.goal               || 0,
          revenue:            td.revenue             || 0,
          transactions:       td.transactions        || 0,
          avgOrderValue:      td.avgOrderValue       || 0,
          avgUPT:             td.avgUPT              || 0,
          totalDiscounts:     td.totalDiscounts      || 0,
          discountRate:       td.discountRate        || 0,
          pctToGoal:          td.pctToGoal           || 0,
          pace:               td.pace                || 0,
          projectedRevenue:   td.projectedRevenue    || 0,
          toGo:               td.toGo                || 0,
          timeRemainingLabel: td.timeRemainingLabel  || '',
          isPreOpen:          td.isPreOpen           || false,
        },
        onShift: (td.onShift || []).map(function(p) {
          // Prefer nameKey from GAS (pre-nickname, matches settings-page save key).
          // Fall back to computing from display name for fixture/legacy data.
          var nameKey = p.nameKey || GC.nameToKey(p.name || '');
          // altKey: display-name-derived key (e.g. "zach_r") — catches configs
          // saved before the canonical-key fix under the nickname format.
          var altKey  = GC.nameToKey(p.name || '');
          return {
            initials:     GC.nickInitials(p.name, nameKey, p.initials || ''),
            name:         p.name     || '',
            nameKey:      nameKey,
            avatarConfig: findAvatarCfg_(kioskAvatarConfigs, nameKey, altKey),
            role:         p.role     || '',
            status:       p.status   || 'on',
            note:         p.note     || null,
          };
        }),
        hourly:        td.hourly        || [],
        hourlyTargets: td.hourlyTargets || null,
        peakHour:      td.peakHour      || null,
        peakRevenue:   td.peakRevenue   || 0,
        latestTxnTs:   td.latestTxnTs   || '',
        // GAS ticker: {who,qty,price,ts} → {time,firstName,desc,amount}
        ticker: (td.ticker || []).map(function(t) {
          if (t.firstName !== undefined) return t; // already normalized
          // Parse time directly from local ISO string to avoid UTC offset
          var ts = t.ts || '';
          var h  = ts.length >= 13 ? parseInt(ts.slice(11, 13), 10) : new Date().getHours();
          var mn = ts.length >= 16 ? parseInt(ts.slice(14, 16), 10) : new Date().getMinutes();
          var hh = ((h + 11) % 12) + 1;
          var qty = t.qty || 0;
          return {
            time:      hh + ':' + mn.toString().padStart(2, '0') + (h >= 12 ? 'p' : 'a'),
            firstName: t.who || '',
            desc:      qty > 0 ? (qty + (qty === 1 ? ' item' : ' items')) : '',
            amount:    t.price || 0,
          };
        }),
      };
    }

    // ── staff ──
    // GAS: avgOrderValue, avgUPT, transactions, streakDays (no role, no streakType)
    // Fixture: aov, txns, streak, streakType, role, upt
    var normalizedStaff = (lb.staff || []).map(function(s) {
      var streak  = s.streak != null ? s.streak : (s.streakDays || 0);
      // Prefer nameKey from GAS (pre-nickname, matches settings-page save key).
      // Fall back to computing from display name for fixture/legacy data.
      var nameKey = s.nameKey || GC.nameToKey(s.name || '');
      var altKey  = GC.nameToKey(s.name || ''); // nickname-derived fallback key
      return {
        rank:            s.rank           || 0,
        initials:        GC.nickInitials(s.name, nameKey, s.initials || ''),
        name:            s.name           || '',
        nameKey:         nameKey,
        avatarConfig:    findAvatarCfg_(kioskAvatarConfigs, nameKey, altKey),
        role:            s.role           || s.roleLabel || '',
        sales:           s.sales          || 0,
        txns:            s.txns  != null  ? s.txns  : (s.transactions || 0),
        aov:             s.aov   != null  ? s.aov   : (s.avgOrderValue || 0),
        upt:             s.upt   != null  ? s.upt   : (s.avgUPT        || 0),
        streak:          streak,
        streakType:      s.streakType     || (streak > 2 ? 'fire' : ''),
        leadingSince:    s.leadingSince   || '',
        target:          s.target         || 0,
        personalBestPct: s.personalBestPct || null,
        note:            s.note           || null,
      };
    });

    // ── badges ──
    // GAS: label, winner, detail, type='gold'/'silver', id='aov-avenger' etc.
    // Fixture: title, holder, stat, type='b-aov' etc.
    // Map GAS id → CSS class + emoji icon.
    // Icons are hardcoded here (not trusted from GAS) because emoji come
    // through JSONP with encoding corruption on some GAS deployments.
    var BADGE_TYPE_MAP = {
      'aov-avenger': 'b-aov',
      'upsell-king': 'b-upt',
      'cleanest':    'b-clean',
      'top-sales':   'b-streak',
      'the-closer':  'b-close',
      'streak':      'b-streak',
      'new-hire':    'b-new',
