      'txn-king':    'b-txn',
    };
    var BADGE_ICON_MAP = {
      'aov-avenger': '💰',
      'upsell-king': '👑',
      'cleanest':    '🧼',
      'top-sales':   '🔥',
      'the-closer':  '🤝',
      'streak':      '⚡',
      'new-hire':    '🌱',
      'txn-king':    '🎯',
    };
    // Short display titles — avoids ellipsis truncation in narrow badge cards
    var BADGE_SHORT_MAP = {
      'aov-avenger': 'AOV Avenger',
      'upsell-king': 'Upsell King',
      'cleanest':    'Low Disc.',
      'top-sales':   'Top Sales',
      'the-closer':  'The Closer',
      'streak':      'Win Streak',
      'new-hire':    'New Cust.',
      'txn-king':    'Txn King',
    };
    var normalizedBadges = (bg.badges || []).map(function(b) {
      return {
        id:         b.id     || '',
        icon:       BADGE_ICON_MAP[b.id]   || b.icon  || '',
        title:      BADGE_SHORT_MAP[b.id]  || b.label || b.title || '',
        holder:     b.winner || b.holder   || '',
        stat:       b.detail || b.stat     || '',
        type:       BADGE_TYPE_MAP[b.id]   || b.type  || '',
      };
    });

    // eomKey: prefer leaderboard (fresher for recurring polls), fall back to today
    var eomKey = lb.eomKey !== undefined ? lb.eomKey : (td.eomKey || null);

    return {
      today:       normalizedToday,
      leaderboard: { staff: normalizedStaff },
      badges:      { badges: normalizedBadges },
      eomKey:      eomKey || null,
    };
  }

  // ── Polling ────────────────────────────────────────────

  /** Soft-update the goal/pace numbers on screen without re-rendering */
  function updateNumbers(td) {
    var revenue   = td.revenue   || 0;
    var pctToGoal = td.pctToGoal || 0;
    var toGo      = td.toGo      || 0;
    var label     = td.timeRemainingLabel || '';
    var closed    = label === 'Closed';
    var isPreOpen = td.isPreOpen || false;

    var soldEl = document.getElementById('kioskGoalSold');
    if (soldEl) countUp(soldEl, revenue, 800);

    // To-Go slot: green "+$N Over Goal" when exceeded, "Closed", or countdown
    var overGoal   = (_goal > 0 && revenue > _goal) ? (revenue - _goal) : 0;
    var isOverGoal = overGoal > 0;
    var toGoEl = document.getElementById('kioskGoalToGo');
    if (toGoEl) {
      if (closed) {
        toGoEl.classList.remove('up');
        toGoEl.classList.add('store-closed-label');
        toGoEl.classList.remove('num');
        toGoEl.textContent = 'Closed';
      } else if (isOverGoal) {
        toGoEl.classList.remove('store-closed-label');
        toGoEl.classList.add('num', 'up');
        toGoEl.textContent = '+' + fmtDollars(overGoal);
      } else {
        toGoEl.classList.remove('store-closed-label', 'up');
        toGoEl.classList.add('num');
        countUp(toGoEl, toGo, 800);
      }
    }
    var toGoLblEl = document.getElementById('kioskToGoLabel');
    if (toGoLblEl) {
      toGoLblEl.textContent = closed ? '10 pm'
        : isOverGoal ? 'Over Goal'
        : isPreOpen  ? 'Shortfall'
        : 'To Go';
    }

    var pctEl = document.getElementById('kioskGoalPct');
    if (pctEl) pctEl.textContent = Math.round(pctToGoal * 100) + '%';

    // sub-label under the arc: "to goal" while open, "final" after close
    var subEl = pctEl && pctEl.nextElementSibling;
    if (subEl && subEl.classList.contains('gp-small')) {
      subEl.textContent = closed ? 'final' : 'to goal';
    }

    setGoalArcs(pctToGoal);

    // Goal amount in card header + pre-open → live label flip
    if (td.goal) {
      _goal = td.goal;   // keep module var in sync for pace gap calc
      // If store just opened (isPreOpen flipped false), swap "Yesterday's Results" → "Daily Goal"
      var kcardLbl = document.querySelector('.goal-card .kcard-label');
      if (kcardLbl && !isPreOpen && (kcardLbl.textContent || '').indexOf('Yesterday') >= 0) {
        kcardLbl.innerHTML = 'Daily Goal · <span id="kioskDailyGoalAmt">' + fmtDollars(td.goal) + '</span>';
      } else {
        var goalAmtEl = document.getElementById('kioskDailyGoalAmt');
        if (goalAmtEl) goalAmtEl.textContent = fmtDollars(td.goal);
      }
    }

    // Dim the card when store is closed
    var card = document.querySelector('.goal-card');
    if (card) card.classList.toggle('store-closed', closed);

    // Update the status label + time-zone colour
    var lblEl = document.getElementById('kioskTimeRemaining');
    if (lblEl) {
      lblEl.textContent = label || '—';
      lblEl.classList.toggle('store-closed-label', closed);
      lblEl.classList.toggle('zone-red',   !closed && timeZoneClass(label) === 'zone-red');
      lblEl.classList.toggle('zone-amber', !closed && timeZoneClass(label) === 'zone-amber');
    }

    // Pace tick position
    if (td.pace != null) {
      var tick = document.getElementById('kioskPaceNeedle');
      if (tick) {
        var pct100  = td.pace * 100;
        var clamped = Math.max(-PACE_RANGE, Math.min(PACE_RANGE, pct100));
        var tickDeg = Math.round((clamped / PACE_RANGE) * 90);
        tick.style.transform = 'rotate(' + tickDeg + 'deg)';
      }
      // ±% big number + zone color
      var pctInt    = Math.round(td.pace * 100);
      var pctStr    = (pctInt >= 0 ? '+' : '−') + Math.abs(pctInt) + '%';
      var zone      = paceZone(td.pace);
      var zoneColor = zone === 'red' ? 'var(--red)' : zone === 'green' ? 'var(--green)' : 'var(--amber)';
      var paceEl = document.getElementById('kioskPacePct');
      if (paceEl) {
        paceEl.textContent = pctStr;
        paceEl.className   = 'gp-big num zone-' + zone;
      }
      var labelEl = document.getElementById('kioskPaceLabel');
      if (labelEl) {
        var subLbl = Math.abs(td.pace) < 0.02 ? 'On plan'
          : td.pace >= 0 ? 'ahead of plan' : 'behind plan';
        labelEl.textContent  = subLbl;
        labelEl.style.color  = zoneColor;
      }
    }
    if (td.projectedRevenue != null) {
      var proj  = td.projectedRevenue;
      var diff  = proj - _goal;
      var gapCls = diff >= 0 ? '' : ' down';
      var projValEl = document.getElementById('kioskPaceProjVal');
      if (projValEl) projValEl.textContent = fmtDollars(proj);
      var shortByEl = document.getElementById('kioskPaceShortBy');
      if (shortByEl) {
        shortByEl.textContent = '$' + Math.abs(Math.round(diff)).toLocaleString();
        shortByEl.parentElement.className = 'kstat' + gapCls;
      }
      var shortByLblEl = document.getElementById('kioskPaceShortByLabel');
      if (shortByLblEl) shortByLblEl.textContent = diff >= 0 ? 'Ahead by' : 'Short by';
    }

    // Closing push
    updateClosingBanner(td);

    // KPI card live updates
    var kpiSalesEl = document.getElementById('kioskKpiSales');
    if (kpiSalesEl && td.revenue != null) countUp(kpiSalesEl, td.revenue, 800);
    var kpiTxnsEl = document.getElementById('kioskKpiTxns');
    if (kpiTxnsEl && td.transactions != null) kpiTxnsEl.textContent = (td.transactions || 0).toLocaleString();
    var kpiAovEl = document.getElementById('kioskKpiAov');
    if (kpiAovEl && td.avgOrderValue != null) kpiAovEl.textContent = td.avgOrderValue > 0 ? '$' + td.avgOrderValue.toFixed(2) : '—';
    var kpiUptEl = document.getElementById('kioskKpiUpt');
    if (kpiUptEl && td.avgUPT != null) kpiUptEl.textContent = td.avgUPT > 0 ? td.avgUPT.toFixed(1) : '—';
    var kpiDiscEl = document.getElementById('kioskKpiDisc');
    if (kpiDiscEl && td.totalDiscounts != null) countUp(kpiDiscEl, td.totalDiscounts, 800);
    var kpiDiscRateEl = document.getElementById('kioskKpiDiscRate');
    if (kpiDiscRateEl && td.discountRate != null) {
      var dr = td.discountRate || 0;
      kpiDiscRateEl.textContent = (dr * 100).toFixed(1) + '%';
      var drWrap = document.getElementById('kioskKpiDiscRateWrap');
      if (drWrap) drWrap.className = 'kpi-cell' + (dr > 0.20 ? ' warn' : '');
    }

    // Hourly heatmap — re-render in place when fresh hourly data arrives
    if (td.hourly && td.hourly.length) {
      var heatCard = document.querySelector('.heatmap-card');
      if (heatCard) {
        // Derive peak from the hourly array (exclude projected hours)
        var peak = td.hourly.reduce(function(best, h) {
          if (!h.projected && (h.revenue || 0) > (best ? best.revenue : 0)) return h;
          return best;
        }, null);
        var newPeakHour    = peak ? peak.hour    : null;
        var newPeakRevenue = peak ? peak.revenue : 0;
        heatCard.outerHTML = renderHeatmap(td.hourly, newPeakHour, newPeakRevenue, _goal, _hourlyTargets);
        animateHeatmap();
      }
    }

    // Goal celebration — fire confetti the first time pctToGoal crosses the threshold
    if (!_goalCelebrated && pctToGoal >= GC.THRESHOLDS.goalCelebrationAt) {
      _goalCelebrated = true;
      fireConfetti();
    }
  }

  function startPolling(slug) {
    clearInterval(_pollTimer);
    clearInterval(_lbTimer);

    // ── 30-second ticker poll ────────────────────────────
    // Sends sinceTs cursor → GAS returns only NEW transactions + updated totals.
    // On first poll (or fixture mode) falls back to full response handling.
    _pollTimer = setInterval(function() {
      GC.api.fetchStoreToday(slug, { sinceTs: _lastTxnTs })
        .then(function(resp) {
          if (resp.isUpdate) {
            // Delta response: inject new ticker items + update numbers
            if (resp.newTicker && resp.newTicker.length) {
              injectTickerItems(resp.newTicker);
            }
            updateNumbers(resp);
            if (resp.latestTxnTs) _lastTxnTs = resp.latestTxnTs;
          } else {
            // Full response (fixture mode or first ever poll without sinceTs)
            var data = normalizeKioskData_({
              today:       resp,
              leaderboard: { staff: [] },
              badges:      { badges: [] },
            });
            updateNumbers(data.today.today);
            if (resp.latestTxnTs) _lastTxnTs = resp.latestTxnTs;
          }
        })
        .catch(function(err) {
          console.warn('[kiosk] ticker poll failed:', err);
        });
    }, 30000);

    // ── 5-minute leaderboard refresh ────────────────────
    _lbTimer = setInterval(function() {
      GC.api.fetchStoreLeaderboard(slug)
        .then(function(lb) {
          var data = normalizeKioskData_({
            today:       {},
            leaderboard: lb,
            badges:      { badges: [] },
          });
          var staff = data.leaderboard.staff;

          // Update on-shift roster so on/off-duty status stays current
          if (lb.onShift && lb.onShift.length) _onShift = lb.onShift;

          // Pick up fresh eomKey if the lb response includes one
          if (lb.eomKey !== undefined) _eomKey = lb.eomKey || null;

          var section = document.querySelector('.lb-section');
          if (section) {
            section.outerHTML = renderStaffGrid(staff, _storeName, _onShift, _badges, _eomKey);
            animateBars();
            // Animate employee amounts
            staff.forEach(function(s) {
              var el = document.getElementById('kioskEmpAmt' + s.rank);
              if (el) countUp(el, s.sales || 0, 1000);
            });
          }
          if (staff.length) {
            _leaderName = staff[0].name || '';
          }
        })
        .catch(function(err) {
          console.warn('[kiosk] leaderboard refresh failed:', err);
        });
    }, 5 * 60 * 1000);
  }

  // ── Big-transaction mini celebration ───────────────────
  // Fires for transactions >= $100 (below the rare-drop threshold).
  // Throttled to once every 8 seconds so rapid multi-item rings don't stack.
  function fireBigTxnCelebration(who, price) {
    var now = Date.now();
    if (now - _bigTxnLastFired < 8000) return;
    _bigTxnLastFired = now;

    // Small confetti burst (~55 particles, spread along bottom third)
    var cv = document.getElementById('kioskConfetti');
    if (cv) {
      var cx = window.innerWidth  / 2;
      var cy = window.innerHeight * 0.72;
      for (var i = 0; i < 55; i++) {
        _confettiParticles.push({
          x:       cx + (Math.random() - 0.5) * 200,
          y:       cy,
          vx:      (Math.random() - 0.5) * 8,
          vy:      -Math.random() * 9 - 3,
          size:    Math.random() * 5 + 2,
          color:   CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
          rot:     Math.random() * Math.PI * 2,
          vrot:    (Math.random() - 0.5) * 0.28,
          life:    0,
          maxLife: 100 + Math.random() * 50,
        });
      }
    }

    // Toast banner naming the employee and amount
    var label = who ? who.split(' ')[0] + ' — ' + fmtDollars(price) + '! 🎉'
                    : fmtDollars(price) + ' sale! 🎉';
    GC.toast(label, 'success', 3200);
  }

  // ── Rare drop ──────────────────────────────────────────
  function showRareDrop(who, item, price) {
    var el = document.getElementById('kioskRareDrop');
    if (!el) return;
    document.getElementById('rdWho').textContent   = who  || '';
    document.getElementById('rdItem').textContent  = item || '';
    document.getElementById('rdPrice').textContent = fmtDollars(price || 0);
    el.classList.add('show');
    fireConfetti();
  }

  function _hideRareDrop(evt) {
    var el = document.getElementById('kioskRareDrop');
    if (el) el.classList.remove('show');
  }

  // ── Confetti ───────────────────────────────────────────
  var CONFETTI_COLORS = ['#4ade80','#60a5fa','#facc15','#f472b6','#a78bfa','#f97316'];

  function initConfetti() {
    var cv = document.getElementById('kioskConfetti');
    if (!cv) return;
    function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    if (!_confettiRunning) {
      _confettiRunning = true;
      requestAnimationFrame(confettiTick);
    }
  }

  function fireConfetti() {
    var cv = document.getElementById('kioskConfetti');
    if (!cv) return;
    var cx = window.innerWidth  / 2;
    var cy = window.innerHeight * 0.42;
    for (var i = 0; i < 140; i++) {
      _confettiParticles.push({
        x: cx + (Math.random() - 0.5) * 60,
        y: cy,
        vx: (Math.random() - 0.5) * 9,
        vy: -Math.random() * 11 - 4,
        size: Math.random() * 6 + 3,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.3,
        life: 0,
        maxLife: 140 + Math.random() * 80,
      });
    }
    // Also show goal banner
    var banner = document.getElementById('kioskGoalBanner');
    if (banner) {
      banner.classList.add('show');
      setTimeout(function() { banner.classList.remove('show'); }, 2600);
    }
  }

  function confettiTick() {
    var cv = document.getElementById('kioskConfetti');
    if (!cv) { _confettiRunning = false; return; }
    var ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cv.width, cv.height);
    _confettiParticles = _confettiParticles.filter(function(p) { return p.life < p.maxLife; });
    _confettiParticles.forEach(function(p) {
      p.vy  += 0.22;
      p.vx  *= 0.995;
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.vrot;
      p.life++;
      var alpha = 1 - (p.life / p.maxLife);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
    requestAnimationFrame(confettiTick);
  }

  // Public API (exposed for onclick handlers)
  return {
    render:        render,
    renderLoading: renderLoading,
    init:          init,
    normalize:     normalizeKioskData_,
    _hideRareDrop: _hideRareDrop,
  };

})();

</script>
<script>
// ============================================================
//  Green Cross — Leaderboard View
//  Renders /leaderboard — cross-store staff table
//  Director+ only. Dense, table-driven.
// ============================================================

window.GC = window.GC || {};

GC.views.renderLeaderboard = function(period) {
  var app = document.getElementById('app');
  if (!app) return;
  period = period || 'mtd';
  app.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-dim)">Loading leaderboard…</div>';

  // Single round-trip reusing the directorall mega-batch
  GC.api.fetchDirectorAll(period)
    .then(function(data) {
      var lbData = lb.normalizeStaff(data.staff, data.avatarConfigs || {});
      app.innerHTML = lb.render(data.summary, data.alerts, lbData, period, data.eomKey || null);
      lb.init(period);
    })
    .catch(function(err) {
      console.error('[leaderboard] fetch failed:', err);
      app.innerHTML = '<div style="padding:40px;color:var(--text-dim)">Failed to load leaderboard.</div>';
    });
};

// ── Private module ──────────────────────────────────────────
var lb = (function() {

  var _lbData   = null;
  var _summary  = null;
  var _alerts   = null;
  var _eomKey   = null;
  var _storeFilter = 'all';
  var _tagFilter   = null;
  var _search      = '';
  var _sortKey     = 'sales';
  var _sortDir     = -1;
  var _period      = 'mtd';

  function e(s) { return GC.esc(String(s)); }

  // ── Render: Nav ──────────────────────────────────────────
  function renderNav() {
    var sess = GC.auth.load() || {};
    var initials = sess.initials || '??';
    var displayName = sess.displayName || 'Director';

    return '<nav class="lb-nav">'
      + '<img class="gc-logo-img" src="' + GC.LOGO_PNG + '" alt="Green Cross" height="28">'
      + '<div class="lb-nav-tabs">'
      + '  <button class="lb-nav-tab" onclick="GC.router.navigate(\'#/director\')">← Director</button>'
      + '  <button class="lb-nav-tab active">Leaderboard</button>'
      + '</div>'
      + '<div class="lb-nav-right">'
      + '  <button class="btn-ghost" id="lbRefreshBtn">↻ Refresh</button>'
      + '  <div class="user-chip">'
      + '    <span class="uc-initials">' + e(initials) + '</span>'
      + '    <span class="uc-name">' + e(displayName) + '</span>'
      + '  </div>'
      + '</div>'
      + '</nav>';
  }

  // ── Render: KPI rows (reuse summary data) ────────────────
  function renderKPIs(summary) {
    var d = summary.deltas || {};

    function bigKpi(label, value, delta, cls) {
      return '<div class="kpi' + (cls ? ' ' + cls : '') + '">'
        + '<div class="kpi-label">' + e(label) + '</div>'
        + '<div class="kpi-value">' + e(value) + '</div>'
        + (delta ? '<div class="kpi-delta">' + e(delta) + '</div>' : '')
        + '</div>';
    }
    function smallKpi(label, value, delta, cls) {
      return '<div class="kpi small' + (cls ? ' ' + cls : '') + '">'
        + '<div class="kpi-label">' + e(label) + '</div>'
        + '<div class="kpi-value">' + e(value) + '</div>'
        + (delta ? '<div class="kpi-delta">' + e(delta) + '</div>' : '')
        + '</div>';
    }

    var bigRow = '<div class="kpi-row large">'
      + bigKpi('Total Sales · MTD',  GC.fmtCurrency(summary.totalSales),    '▲ +' + GC.fmtPct(d.totalSalesPct), 'v-green')
      + bigKpi('Transactions',       GC.fmtNum(summary.transactions),        '▲ +' + GC.fmtNum(d.transactions) + ' vs. last month')
      + bigKpi('Avg Order Value',    GC.fmtCurrency(summary.avgOrderValue),  GC.fmtDeltaCurrency(d.avgOrderValue), 'v-green')
      + '</div>';

    var discDelta = d.discountRatePts
      ? '▲ +' + (d.discountRatePts * 100).toFixed(1) + ' pts' : '';
    var flagSub = summary.flaggedStaffBreakdown
      ? summary.flaggedStaffBreakdown.repeat + ' repeat · ' + summary.flaggedStaffBreakdown.new + ' new' : '';

    var smallRow = '<div class="kpi-row small">'
      + smallKpi('Avg UPT',         GC.fmtDecimal(summary.avgUPT),         '▲ +' + GC.fmtDecimal(d.avgUPT))
      + smallKpi('Total Discounts', GC.fmtCurrency(summary.totalDiscounts), '▲ +' + GC.fmtCurrency(d.totalDiscounts), 'v-amber')
      + smallKpi('Discount Rate',   GC.fmtPct(summary.discountRate),        discDelta, 'v-amber')
      + smallKpi('Flagged Staff',   String(summary.flaggedStaff),            flagSub, 'v-red')
      + smallKpi('Active Staff',    String(summary.activeStaff),             'across ' + summary.storeCount + ' stores')
      + smallKpi('Sales / Hour',    '$' + GC.fmtNum(summary.salesPerHour),  GC.fmtDeltaNum(d.salesPerHour, '$'))
      + '</div>';

    return bigRow + smallRow;
  }

  // ── Render: Filters + controls ───────────────────────────
  function renderFilters(period) {
    period = period || 'mtd';
    var stores = ['Baseline','Center','Century','Commercial','Portland','River'];
    var storePills = stores.map(function(s) {
      return '<button class="pill store-pill" data-slug="' + s.toLowerCase() + '">' + e(s) + '</button>';
    }).join('');

    function opt(val, label) {
      return '<option value="' + val + '"' + (period === val ? ' selected' : '') + '>' + label + '</option>';
    }

    return '<div class="filter-row">'
      + '<button class="pill active" id="lbAllStores" data-slug="all">All Stores</button>'
      + storePills
      + '<div style="margin-left:auto;display:flex;gap:8px">'
      + '  <button class="pill tag-pill" data-tag="top">Top 10</button>'
      + '  <button class="pill tag-pill" data-tag="rising">Rising</button>'
      + '  <button class="pill tag-pill" data-tag="watch">Watch</button>'
      + '  <button class="pill tag-pill" data-tag="flag">Flagged</button>'
      + '</div>'
      + '</div>'
      + '<div class="controls">'
      + '  <input type="text" id="lbSearch" placeholder="Search staff or store…" />'
      + '  <select id="lbPeriod">'
      + opt('pp',    'Period: Pay Period (2-wk)')
      + opt('mtd',   'Period: Month-to-Date')
      + opt('today', 'Period: Today')
      + opt('wtd',   'Period: Week-to-Date')
      + opt('qtd',   'Period: Quarter-to-Date')
      + opt('ytd',   'Period: Year-to-Date')
      + '  </select>'
      + '  <select id="lbRole">'
      + '    <option value="">All Roles</option>'
      + '    <option value="Store Mgr">Store Mgr</option>'
      + '    <option value="Asst Mgr">Asst Mgr</option>'
      + '    <option value="Budtender">Budtender</option>'
      + '  </select>'
      + '  <select id="lbSort">'
      + '    <option value="sales,-1">Sort: Sales ↓</option>'
      + '    <option value="avgOrderValue,-1">AOV ↓</option>'
      + '    <option value="avgUPT,-1">UPT ↓</option>'
      + '    <option value="discountRate,1">Discount % ↑</option>'
      + '  </select>'
      + '</div>';
  }

  // ── Render: Staff table ──────────────────────────────────
  function renderTable(staffData, eomKey) {
    var staff   = applyFilters(staffData.staff || []);
    var total   = staffData.totalStaff || staff.length;
    var maxSales = staff.length > 0 ? staff[0].sales : 1;

    var metaHtml = '<div class="lb-meta-row">'
      + '<span class="lb-showing">Showing ' + staff.length + ' of ' + total + ' staff</span>'
      + '<span id="lbLastRefresh" style="color:var(--text-mute)">Last refresh ' + GC.fmtTime(new Date()) + '</span>'
      + '</div>';

    var rows = staff.map(function(s) {
      var rankCls   = GC.rankPillClass(s.rank, total);
      var barPct    = maxSales > 0 ? Math.round((s.sales / maxSales) * 100) : 0;
      var discCls   = GC.discountSeverity(s.discountRate);
      var discW     = Math.min(Math.round((s.discountRate / 0.12) * 100), 100);
      var trendCls  = GC.trendClass(s.trendPct);
      var trendStroke = GC.trendStroke(trendCls);
      var trendLabel  = GC.trendLabel(s.trendPct);
      var pts       = GC.sparklinePoints(s.trend30d, 72, 20);
      var isRowEom  = !!(eomKey && s.nameKey && s.nameKey === eomKey);

      var tagsHtml = (s.tags || []).map(function(t) {
        var labels = { top: 'TOP', rising: 'RISING', watch: 'WATCH', flag: 'FLAG', new: 'NEW' };
        return '<span class="tag ' + e(t) + '">' + e(labels[t] || t) + '</span>';
      }).join('');
      var eomTagHtml = isRowEom
        ? '<span class="eom-badge" style="margin-left:6px;vertical-align:middle"><span class="eom-star">★</span> EoM</span>'
        : '';

      return '<tr' + (isRowEom ? ' style="background:rgba(212,168,71,0.04)"' : '') + '>'
        + '<td><span class="rank-pill ' + e(rankCls) + '">#' + e(s.rank) + '</span></td>'
        + '<td>'
        + '  <div class="who">'
        + GC.lbAvaPuck(s.nameKey, s.avatarConfig, s.initials, true)
        + '    <div>'
        + '      <div class="who-name">' + e(s.name)
        +          eomTagHtml
        +          (tagsHtml ? ' <span class="tags">' + tagsHtml + '</span>' : '')
        + '      </div>'
        + '      <div class="who-sub">' + (s.role ? e(s.role) + ' · ' : '') + e(s.hours) + 'h MTD</div>'
        + '    </div>'
        + '  </div>'
        + '</td>'
        + '<td class="store-col lb-store-dot">'
        + '  <span class="store-dot ' + e(s.storeSlug) + '"></span>'
        + '  <span class="lb-store-label">' + e(s.storeName) + '</span>'
        + '</td>'
        + '<td>'
        + '  <div class="sales-cell">'
        + '    <span class="sales-amt num">' + e(GC.fmtCurrency(s.sales)) + '</span>'
        + '    <div class="bar-track"><div class="bar-fill" style="width:' + barPct + '%"></div></div>'
        + '  </div>'
        + '</td>'
        + '<td class="num">' + e(s.transactions) + '</td>'
        + '<td class="num">' + e('$' + s.avgOrderValue.toFixed(2)) + '</td>'
        + '<td class="num">' + e(s.avgUPT.toFixed(1)) + '</td>'
        + '<td>'
        + '  <span class="disc ' + e(discCls) + '">'
        + '    <span class="disc-bar"><span style="width:' + discW + '%"></span></span>'
        + e(GC.fmtPct(s.discountRate))
        + '  </span>'
        + '</td>'
        + '<td>'
        + '  <div class="sparkline-cell">'
        + '    <svg width="72" height="20" viewBox="0 0 72 20" style="overflow:visible">'
        + '      <polyline pathLength="1" fill="none" stroke="' + e(trendStroke) + '" stroke-width="1.5" points="' + e(pts) + '"/>'
        + '    </svg>'
        + '    <span class="spark-delta ' + e(trendCls) + '">' + e(trendLabel) + '</span>'
        + '  </div>'
        + '</td>'
        + '<td class="actions-col">'
        + '  <button class="row-action-btn" title="More">⋯</button>'
        + '</td>'
        + '</tr>';
    }).join('');

    function thSort(label, key) {
      var isActive = _sortKey === key;
      var arrow = isActive ? (_sortDir === -1 ? ' ▼' : ' ▲') : '';
      return '<th class="lb-th-sort' + (isActive ? ' active' : '') + '" data-sort="' + key + '" style="cursor:pointer;user-select:none">'
        + label + arrow + '</th>';
    }

    var tableHtml = '<table class="gc-table lb-table">'
      + '<thead><tr>'
      + '  <th class="lb-th-sort' + (_sortKey === 'rank' ? ' active' : '') + '" data-sort="rank" style="width:60px;cursor:pointer;user-select:none">RANK' + (_sortKey === 'rank' ? (_sortDir === -1 ? ' ▼' : ' ▲') : '') + '</th>'
      + thSort('STAFF', 'name')
      + thSort('STORE', 'storeName')
      + thSort('SALES', 'sales')
      + thSort('TXNS', 'transactions')
      + thSort('AOV', 'avgOrderValue')
      + thSort('UPT', 'avgUPT')
      + thSort('DISCOUNT', 'discountRate')
      + thSort('TREND · 30D', 'trendPct')
      + '  <th class="actions-col"></th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table>';

    return metaHtml + tableHtml;
  }

  // ── Render: Discount Watch panel ─────────────────────────
  function renderWatchPanel(alerts) {
    var watchList = (alerts && alerts.discountWatch) || [];
    if (!watchList.length) return '';

    var items = watchList.map(function(w) {
      var discCls = GC.discountSeverity(w.discountRate);
      var detail = w.ordersOver15Pct
        ? w.ordersOver15Pct + ' orders >15% off'
          + (w.topReason  ? ' · "' + w.topReason + '"' : '')
          + (w.reasonNote ? ' · ' + w.reasonNote       : '')
        : (w.detail || '');
      var storeName = w.storeName || w.store || '';
      return '<div class="watch-row">'
        + '<div class="user-chip" style="background:transparent;padding:0;border:none">'
        + '  <span class="uc-initials">' + e(w.initials || w.name.slice(0,2).toUpperCase()) + '</span>'
        + '  <div style="display:flex;flex-direction:column;gap:1px">'
        + '    <span style="font-weight:600;font-size:12px">' + e(w.name) + '</span>'
        + '    <span style="font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.8px">' + e(storeName) + '</span>'
        + '  </div>'
        + '</div>'
        + '<div class="watch-detail" style="margin-top:6px;font-size:11px;color:var(--text-mute)">' + e(detail) + '</div>'
        + '<span class="watch-pct disc ' + e(discCls) + '" style="margin-top:6px;display:inline-block">' + e(GC.fmtPct(w.discountRate)) + '</span>'
        + '</div>';
    }).join('');

    return '<div class="lb-watch-panel">'
      + '<div class="lb-watch-head">'
      + '  <h3>Discount Watch</h3>'
      + '  <span class="lb-watch-sub">Staff above the 6.5% chain benchmark · 14-day rolling</span>'
      + '</div>'
      + '<div class="lb-watch-grid">' + items + '</div>'
      + '</div>';
  }

  // ── Apply filters ────────────────────────────────────────
  function applyFilters(staff) {
    var result = staff.slice();

    if (_storeFilter !== 'all') {
      result = result.filter(function(s) { return s.storeSlug === _storeFilter; });
    }
    if (_tagFilter) {
      result = result.filter(function(s) { return (s.tags || []).indexOf(_tagFilter) !== -1; });
    }
    if (_roleFilter) {
      var rq = _roleFilter.toLowerCase();
      result = result.filter(function(s) { return (s.role || '').toLowerCase().indexOf(rq) !== -1; });
    }
    if (_search) {
      var q = _search.toLowerCase();
      result = result.filter(function(s) {
        return s.name.toLowerCase().indexOf(q) !== -1
          || (s.storeName || '').toLowerCase().indexOf(q) !== -1
          || (s.role || '').toLowerCase().indexOf(q) !== -1;
      });
    }

    result.sort(function(a, b) {
      var av = a[_sortKey] != null ? a[_sortKey] : '';
      var bv = b[_sortKey] != null ? b[_sortKey] : '';
      if (typeof av === 'string' || typeof bv === 'string') {
        return _sortDir * String(av).localeCompare(String(bv));
      }
      return _sortDir * ((Number(av) || 0) - (Number(bv) || 0));
    });

    // Re-rank after filter
    result.forEach(function(s, i) { s._displayRank = i + 1; });

    return result;
  }

  // ── Normalize: directorall.staff → leaderboard shape ────────
  // directorall returns staff with totalActive / hoursWorked / roleLabel.
  // The table expects totalStaff / hours / role.
  function normalizeStaff(staffData, avatarConfigs) {
    if (!staffData) return { totalStaff: 0, showing: 0, staff: [] };
    avatarConfigs = avatarConfigs || {};
    var staff = (staffData.staff || []).map(function(s) {
      var nameKey = s.nameKey || GC.nameToKey(s.name || '');
      var altKey  = GC.nameToKey(s.name || ''); // nickname-derived fallback
      return {
        rank:          s.rank          || 0,
        initials:      GC.nickInitials(s.name, nameKey, s.initials || ''),
        name:          s.name          || '',
        nameKey:       nameKey,
        avatarConfig:  GC.findAvatarCfg(avatarConfigs, nameKey, altKey),
        role:          s.roleLabel     || s.role || '',
        hours:         s.hoursWorked   || s.hours || 0,
        storeSlug:     s.storeSlug     || '',
        storeName:     s.storeName     || '',
        sales:         s.sales         || 0,
        transactions:  s.transactions  || 0,
        avgOrderValue: s.avgOrderValue || 0,
        avgUPT:        s.avgUPT        || 0,
        discountRate:  s.discountRate  || 0,
        trendPct:      s.trendPct      || 0,
        trend30d:      s.trend30d      || [],
        tags:          s.tags          || [],
      };
    });
    return {
      totalStaff: staffData.totalActive || staffData.totalStaff || staff.length,
      showing:    staff.length,
      staff:      staff,
    };
  }

  // ── Full render ──────────────────────────────────────────
  function render(summary, alerts, lbData, period, eomKey) {
    _summary = summary;
    _alerts  = alerts;
    _lbData  = lbData;
    _eomKey  = eomKey || null;
    _period  = period || 'mtd';

    var periodLabels = { today: 'Today', wtd: 'WTD', mtd: 'MTD', qtd: 'QTD', ytd: 'YTD' };
    var periodLabel  = periodLabels[_period] || _period.toUpperCase();

    return '<div class="lb-page">'
      + renderNav()
      + renderKPIs(summary)
      + renderFilters(_period)
      + '<div id="lbTableWrap">' + renderTable(lbData, _eomKey) + '</div>'
      + renderWatchPanel(alerts)
      + '<div class="lb-footer">Live data · All Stores · ' + e(periodLabel) + ' · '
      + '<span id="lbFooterRefresh">Last refresh ' + GC.fmtTime(new Date()) + '</span>'
      + '</div>'
      + '</div>';
  }

  // ── Re-render table only ─────────────────────────────────
  function refreshTable() {
    var wrap = document.getElementById('lbTableWrap');
    if (wrap && _lbData) wrap.innerHTML = renderTable(_lbData, _eomKey);
    animateLbSparklines();
  }

  function animateLbSparklines() {
    document.querySelectorAll('#lbTableWrap tbody tr').forEach(function(row, i) {
      var poly = row.querySelector('.sparkline-cell polyline');
      if (!poly) return;
      poly.style.animationPlayState = 'paused';
      setTimeout(function() {
        if (poly.isConnected) poly.style.animationPlayState = 'running';
      }, i * 500);
    });
  }

  var _roleFilter = '';

  // ── init ─────────────────────────────────────────────────
  function init(period) {
    _period = period || 'mtd';

    // Refresh button — full reload via directorall
    var refreshBtn = document.getElementById('lbRefreshBtn');
    if (refreshBtn) {
      refreshBtn.addEventListener('click', function() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = '↻ Refreshing…';
        GC.api.fetchDirectorAll(_period).then(function(data) {
          _lbData   = normalizeStaff(data.staff, data.avatarConfigs || {});
          _summary  = data.summary;
          _alerts   = data.alerts;
          if (data.eomKey !== undefined) _eomKey = data.eomKey || null;
          refreshTable();
          refreshBtn.disabled = false;
          refreshBtn.textContent = '↻ Refresh';
          var el = document.getElementById('lbFooterRefresh');
          if (el) el.textContent = 'Last refresh ' + GC.fmtTime(new Date());
        }).catch(function() {
          refreshBtn.disabled = false;
          refreshBtn.textContent = '↻ Refresh';
        });
      });
    }

    // Period change — full page reload with new period
    var periodEl = document.getElementById('lbPeriod');
    if (periodEl) {
      periodEl.addEventListener('change', function() {
        GC.views.renderLeaderboard(periodEl.value);
      });
    }

    // Role filter
    var roleEl = document.getElementById('lbRole');
    if (roleEl) {
      roleEl.addEventListener('change', function() {
        _roleFilter = roleEl.value;
        refreshTable();
      });
    }

    // Store pills
    document.querySelectorAll('.store-pill, #lbAllStores').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.store-pill, #lbAllStores').forEach(function(b) {
          b.classList.remove('active');
        });
        btn.classList.add('active');
        _storeFilter = btn.getAttribute('data-slug');
        refreshTable();
      });
    });

    // Tag pills
    document.querySelectorAll('.tag-pill').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tag = btn.getAttribute('data-tag');
        if (_tagFilter === tag) {
          _tagFilter = null;
          btn.classList.remove('active');
        } else {
          document.querySelectorAll('.tag-pill').forEach(function(b) { b.classList.remove('active'); });
          _tagFilter = tag;
          btn.classList.add('active');
        }
        refreshTable();
      });
    });

    // Search
    var searchEl = document.getElementById('lbSearch');
    if (searchEl) {
      searchEl.addEventListener('input', function() {
        _search = searchEl.value.trim();
        refreshTable();
      });
    }

    // Sort
    var sortEl = document.getElementById('lbSort');
    if (sortEl) {
      sortEl.addEventListener('change', function() {
        var parts = sortEl.value.split(',');
        _sortKey = parts[0];
        _sortDir = parseInt(parts[1], 10);
        refreshTable();
      });
    }

    // Column-header sort — event delegation on the table wrap
    var lbTableWrap = document.getElementById('lbTableWrap');
    if (lbTableWrap) {
      lbTableWrap.addEventListener('click', function(evt) {
        var th = evt.target.closest('th[data-sort]');
        if (!th) return;
        var key = th.dataset.sort;
        if (_sortKey === key) {
          _sortDir = _sortDir * -1;  // toggle direction
        } else {
          _sortKey = key;
          _sortDir = -1;  // default desc
        }
        refreshTable();
      });
    }

    animateLbSparklines();
  }

  return { render: render, init: init, normalizeStaff: normalizeStaff };

})();

</script>
<script>
// ============================================================
//  Green Cross — Settings View
//  Route: #/settings (director/owner only)
//
//  Two sections:
//    1. Store Plan Targets — daily goal per store; PP + monthly auto-computed
//    2. Employee Nicknames — map Dutchie full names to preferred display names
// ============================================================

window.GC = window.GC || {};

GC.views.renderSettings = function() {
  var app = document.getElementById('app');
  if (!app) return;

  app.innerHTML = settings.renderLoading();

  GC.api.fetchSettings()
    .then(function(data) {
      app.innerHTML = settings.render(data);
      settings.init(data);
    })
    .catch(function(err) {
      app.innerHTML = settings.renderError(err.message);
    });
};

var settings = (function() {

  function e(s) { return GC.esc(String(s || '')); }

  function fmt(n) {
    return '$' + Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  // ── Loading ───────────────────────────────────────────────
  function renderLoading() {
    return '<div class="app-page settings-page">'
      + renderHeader()
      + '<div class="settings-loading">Loading settings…</div>'
      + '</div>';
  }

  // ── Error ─────────────────────────────────────────────────
  function renderError(msg) {
    return '<div class="app-page settings-page">'
      + renderHeader()
      + '<div class="settings-error">⚠️ ' + e(msg) + '</div>'
      + '</div>';
  }

  // ── Header ────────────────────────────────────────────────
  function renderHeader() {
    return '<header class="settings-header">'
      + '<button class="btn-ghost settings-back" id="settingsBack">← Back</button>'
      + '<h1 class="settings-title">Settings</h1>'
      + '</header>';
  }

  // ── Goals section (auto-computed, read-only) ───────────────
  function renderGoalsSection(data) {
    var goals         = data.goals        || [];
    var computedAt    = data.rollingComputedAt;
    var reportFrom    = data.reportFrom;
    var reportTo      = data.reportTo;
    var yoyFrom       = data.yoyFrom;
    var yoyTo         = data.yoyTo;
    var yoyComputedAt = data.yoyComputedAt;
    var stretch       = parseFloat(data.stretch) || 0;

    var DOW_ORDER = [1,2,3,4,5,6,0]; // Mon first

    function fmtDate(iso) {
      if (!iso) return '—';
      var s = String(iso).slice(0, 10);
      var parts = s.split('-');
      if (parts.length !== 3) return iso;
      return parts[1].replace(/^0/, '') + '-' + parts[2].replace(/^0/, '') + '-' + parts[0].slice(2);
    }

    function fmtDow(val) {
      if (!val) return '—';
      return '$' + Math.round(val).toLocaleString('en-US');
    }

    function fmtGoal(val) {
      if (!val) return '—';
      return '$' + Math.round(val).toLocaleString('en-US');
    }

    // Build stretch options
    var currentStretch = stretch;
    var stretchOpts = '';
    for (var pct = 0; pct <= 5.01; pct += 0.5) {
      var optVal = Math.round(pct * 10) / 1000;
      var optLbl = pct === 0 ? '0% — base' : '+' + pct.toFixed(1) + '%';
      var sel    = Math.abs(currentStretch - optVal) < 0.0001 ? ' selected' : '';
      stretchOpts += '<option value="' + optVal + '"' + sel + '>' + optLbl + '</option>';
    }

    // Meta line
    var metaParts = [];
    if (computedAt)    metaParts.push('Rolling computed ' + fmtDate(computedAt));
    if (yoyComputedAt) metaParts.push('YoY computed ' + fmtDate(yoyComputedAt));
    if (!computedAt && !yoyComputedAt) metaParts.push('Not yet computed — click Recalculate');
    var metaLine = metaParts.join(' · ');

    var reportLine = '';
    if (reportFrom && reportTo)
      reportLine += 'Rolling range: ' + fmtDate(reportFrom) + ' – ' + fmtDate(reportTo);
    if (yoyFrom && yoyTo)
      reportLine += (reportLine ? ' · ' : '') + 'YoY window: ' + fmtDate(yoyFrom) + ' – ' + fmtDate(yoyTo);

    // Current PP from first goal
    var firstGoal  = goals[0] || {};
    var ppRangeStr = (firstGoal.rolling && firstGoal.rolling.ppStart)
      ? 'Current PP: ' + fmtDate(firstGoal.rolling.ppStart) + ' – ' + fmtDate(firstGoal.rolling.ppEnd)
      : '';

    var fullMeta = [ppRangeStr, reportLine, metaLine].filter(Boolean).join(' · ');

    // Table rows
    // Accumulate totals for the tfoot row
    var mult    = 1 + currentStretch;   // hoisted — used in rows AND totalRow
    var totBase = 0, totMonthly = 0, totEffective = 0;
    var totDow  = { Mon:0, Tue:0, Wed:0, Thu:0, Fri:0, Sat:0, Sun:0 };

    var rows = goals.map(function(g) {
      var r      = g.rolling      || {};
      var y      = g.yoy          || {};
      var src    = g.activeSource || 'rolling';  // 'rolling' | 'yoy' — whichever is higher
      // mult is in outer scope

      // DOW cells always use the winning (active) goal set
      var activeG  = src === 'yoy' ? y : r;
      var dowCells = DOW_ORDER.map(function(d) {
        var base = (activeG.dowAvg && activeG.dowAvg[d]) ? activeG.dowAvg[d] : 0;
        return '<td class="settings-dow-cell" data-base-dow="' + base + '">'
          + '<div class="settings-dow-val">' + fmtDow(Math.round(base * mult)) + '</div>'
          + '</td>';
      }).join('');

      var rBase = r.ppGoal  || 0;
      var yBase = y.ppGoal  || 0;
      var mBase = activeG.monthly || 0;

      // Stacked baseline cell: Rolling over YoY, winner highlighted green
      var rFmt   = fmtGoal(Math.round(rBase * mult));
      var yFmt   = yBase ? fmtGoal(Math.round(yBase * mult)) : '<span class="settings-dim">—</span>';
      var rStyle = src === 'rolling' ? ' class="settings-active-col"' : ' class="settings-dim"';
      var yStyle = src === 'yoy'     ? ' class="settings-active-col"' : ' class="settings-dim"';
      // data-base-pp on inner <span> so textContent updates don't clobber the label span
      var baselineCell = '<td class="settings-baseline-cell">'
        + '<div' + rStyle + '><span class="settings-baseline-label">R</span><span data-base-pp="' + rBase + '">' + rFmt + '</span></div>'
        + '<div' + yStyle + '><span class="settings-baseline-label">Y</span><span data-base-pp="' + yBase + '">' + (yBase ? yFmt : '<span class="settings-dim">—</span>') + '</span></div>'
        + '</td>';

      // Goal PP input — pre-filled with effectivePP (manual if set, else computed active × stretch)
      // data-base-computed-pp = unscaled computed active PP (pre-stretch, pre-override) for scaling monthly/DOW live
      var computedBasePP = (g.active && g.active.ppGoal) ? g.active.ppGoal : (rBase || yBase);
      var overrideVal    = g.effectivePP || Math.round(computedBasePP * mult);
      var overrideInput  = '<div class="settings-input-wrap' + (g.hasManual ? ' has-manual' : '') + '" style="max-width:100px">'
        + '<span class="settings-input-prefix">$</span>'
        + '<input class="settings-input settings-pp-override" type="text" inputmode="numeric"'
        + ' data-slug="' + e(g.slug) + '"'
        + ' data-base-computed-pp="' + computedBasePP + '"'
        + ' value="' + Math.round(overrideVal).toLocaleString('en-US') + '"'
        + (g.hasManual ? ' data-manual="1"' : '')
        + '>'
        + '</div>';

      // Accumulate for totals row
      var computedBasePP2 = (g.active && g.active.ppGoal) ? g.active.ppGoal : (rBase || yBase);
      totBase      += computedBasePP2;
      totEffective += Math.round(overrideVal); // sum of actual input values (incl. manuals)
      totMonthly   += mBase;
      DOW_ORDER.forEach(function(d) {
        totDow[d] = (totDow[d] || 0) + ((activeG.dowAvg && activeG.dowAvg[d]) ? activeG.dowAvg[d] : 0);
      });

      return '<tr>'
        + '<td class="settings-store-name">' + e(g.name) + '</td>'
        + baselineCell
        + '<td>' + overrideInput + '</td>'
        + '<td class="settings-derived" data-base-monthly="' + mBase + '">'
        + fmtGoal(Math.round(mBase * mult)) + '</td>'
        + dowCells
        + '</tr>';
    }).join('');

    // Total footer row
    var totDowCells = DOW_ORDER.map(function(d) {
      var base = totDow[d] || 0;
      return '<td class="settings-dow-cell settings-total-dow" data-base-dow="' + base + '">'
        + '<div class="settings-dow-val">' + fmtDow(Math.round(base * mult)) + '</div>'
        + '</td>';
    }).join('');

    var totalRow = '<tr class="settings-total-row">'
      + '<td class="settings-store-name">Total</td>'
      + '<td class="settings-baseline-cell">'
      +   '<div><span data-base-pp="' + totBase + '">' + fmtGoal(Math.round(totBase * mult)) + '</span></div>'
      + '</td>'
      + '<td id="goalsTotalPP" class="settings-total-pp">' + fmtGoal(totEffective) + '</td>'
      + '<td class="settings-derived settings-total-monthly" data-base-monthly="' + totMonthly + '">'
      +   fmtGoal(Math.round(totMonthly * mult))
      + '</td>'
      + totDowCells
      + '</tr>';

    return '<div class="settings-card" id="goalsCard">'
      + '<div class="settings-card-head">'
      +   '<div>'
      +     '<div class="settings-card-title">Revenue Goals &mdash; Current PP</div>'
      +     '<div class="settings-card-sub">Active goal = higher of Rolling 12-PP vs. Year-over-Year (highlighted). Bar never moves backward. Stretch = growth target on top.</div>'
      +     '<div class="settings-goals-meta" id="goalsMeta">' + e(fullMeta) + '</div>'
      +   '</div>'
      +   '<div class="settings-card-actions">'
      +     '<button class="btn-secondary" id="recalcBtn">Recalculate</button>'
      +     '<div class="settings-stretch-group">'
      +       '<label class="settings-stretch-label">Stretch</label>'
      +       '<select class="settings-stretch-select" id="stretchSelect">' + stretchOpts + '</select>'
      +       ''
      +     '</div>'
      +   '</div>'
      + '</div>'
      + '<div class="settings-table-wrap">'
      + '<table class="settings-table settings-goals-table" id="goalsTable">'
      + '<thead><tr>'
      +   '<th>Store</th>'
      +   '<th title="R = Rolling 12-PP avg · Y = YoY same-season · Green = prevailing">Baseline</th>'
      +   '<th title="Active goal — edit to override">Goal PP</th>'
      +   '<th>Monthly</th>'
      +   '<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '<tfoot>' + totalRow + '</tfoot>'
      + '</table>'
      + '</div>'
      + '<div class="settings-card-foot">'
      +   '<div class="settings-save-status" id="recalcStatus"></div>'
      +   '<button class="btn-primary" id="saveGoalsBtn">Save Goal Overrides</button>'
      + '</div>'
      + '</div>';
  }

  // ── Shared: build a table row for one employee ────────────
  function empRow(emp, nicknames, avatarConfigs, showNick, excludedSet, currentEomKey, roles) {
    var empRole = (roles || {})[emp.key] || '';
    var nick   = (nicknames || {})[emp.key] || '';
    var config = (avatarConfigs || {})[emp.key] || null;
    if (!config) {
      var _segs = emp.key.split('_');
      for (var _si = 0; _si < _segs.length; _si++) {
        if ((avatarConfigs || {})[_segs[_si]]) { config = (avatarConfigs || {})[_segs[_si]]; break; }
      }
    }
    var nameParts   = (emp.name || '').split(' ');
    var initials    = (nameParts[0] || '').slice(0, 1)
                    + (nameParts.length > 1 ? nameParts[nameParts.length - 1].slice(0, 1) : '');
    var displayName = nick || emp.name;
    var puck        = GC.lbAvaPuck(emp.key, config, GC.nickInitials(displayName, emp.key, emp.initials || initials || '??'), true);
    var encKey    = e(emp.key);
    var isExcluded = excludedSet && excludedSet[emp.key];
    var isEom      = currentEomKey && emp.key === currentEomKey;
    var rowCls    = isExcluded ? ' class="emp-row-excluded"' : '';
    return '<tr' + rowCls + '>'
      + '<td class="settings-emp-ava" title="Click to edit avatar">' + puck + '</td>'
      + '<td class="settings-emp-name">' + e(emp.name) + '</td>'
      + (showNick
          ? '<td><input class="settings-input settings-nick-input"'
            +   ' type="text" data-key="' + encKey + '"'
            +   ' value="' + e(nick) + '" placeholder="Nickname"></td>'
            + '<td class="settings-emp-store">' + e(emp.store || '') + '</td>'
            + '<td class="settings-emp-eom-col" style="text-align:center">'
            +   '<input type="radio" name="eomPick" value="' + encKey + '"'
            +     (isEom ? ' checked' : '') + ' title="Set as Employee of the Month">'
            + '</td>'
            + '<td>'
            +   '<select class="settings-input settings-role-select" data-key="' + encKey + '">'
            +     '<option value="">—</option>'
            +     '<option value="budtender"' + (empRole === 'budtender' ? ' selected' : '') + '>Budtender</option>'
            +     '<option value="asst_manager"' + (empRole === 'asst_manager' ? ' selected' : '') + '>Asst. Manager</option>'
            +     '<option value="store_manager"' + (empRole === 'store_manager' ? ' selected' : '') + '>Store Manager</option>'
            +   '</select>'
            + '</td>'
            + '<td class="settings-emp-excl">'
            +   '<button class="excl-toggle' + (isExcluded ? ' excluded' : '') + '"'
            +           ' data-key="' + encKey + '"'
            +           ' title="' + (isExcluded ? 'Re-activate employee' : 'Exclude from dashboard') + '">'
            +     (isExcluded ? 'Excluded' : 'Active')
            +   '</button>'
            + '</td>'
          : '<td class="settings-emp-store" style="color:var(--text-dim);font-size:12px">' + e(emp.roleLabel || 'Admin') + '</td>'
            + '<td class="settings-emp-store" style="font-size:12px">' + e(emp.jobTitle || '') + '</td>'
        )
      + '</tr>';
  }

  // ── Management card ────────────────────────────────────────
  function renderManagement(employees, avatarConfigs) {
    var mgmt = (employees || []).filter(function(e) { return e.section === 'management'; });
    if (!mgmt.length) return '';
    var rows = mgmt.map(function(emp) { return empRow(emp, {}, avatarConfigs, false); }).join('');
    return '<div class="settings-card" id="mgmtCard">'
      + '<div class="settings-card-head">'
      +   '<div>'
      +     '<div class="settings-card-title">Management</div>'
      +     '<div class="settings-card-sub">Directors — click an avatar to customize.</div>'
      +   '</div>'
      + '</div>'
      + '<table class="settings-table settings-emp-table">'
      + '<thead><tr><th></th><th>Name</th><th>Role</th><th>Job Title</th></tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table>'
      + '</div>';
  }

  // ── Employees card (nicknames + avatars combined) ─────────
  function renderEmployees(employees, nicknames, avatarConfigs, excluded, eom, roles) {
    nicknames     = nicknames     || {};
    avatarConfigs = avatarConfigs || {};
    roles         = roles         || {};
    // excluded is an array of keys from GAS — convert to a set-like object for fast lookup
    var excludedSet = {};
    (excluded || []).forEach(function(k) { excludedSet[k] = true; });
    var currentEomKey = (eom && eom.employeeKey) ? eom.employeeKey : null;
    var staff = (employees || []).filter(function(emp) { return emp.section !== 'management'; });
    var rows  = staff.map(function(emp) { return empRow(emp, nicknames, avatarConfigs, true, excludedSet, currentEomKey, roles); }).join('');

    return '<div class="settings-card" id="nickCard">'
      + '<div class="settings-card-head">'
      +   '<div>'
      +     '<div class="settings-card-title">Employees</div>'
      +     '<div class="settings-card-sub">Set a nickname and build an avatar. ★ = Employee of the Month. Toggle <strong>Active/Excluded</strong> to show or hide on the dashboard.</div>'
      +   '</div>'
      + '</div>'
      + '<table class="settings-table settings-emp-table" id="nickTable">'
      + '<thead><tr>'
      +   '<th></th><th>Dutchie Name</th><th>Nickname</th><th>Store</th><th title="Employee of the Month">★ EoM</th><th>Role</th><th>Status</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table>'
      + '<div class="settings-card-foot">'
      +   '<div class="settings-save-status" id="nickStatus"></div>'
      +   '<button class="btn-ghost" id="clearEomBtn" style="font-size:12px;padding:6px 12px">Clear EoM</button>'
      +   '<button class="btn-primary" id="saveNicksBtn">Save</button>'
      + '</div>'
      + '</div>';
  }

  // ── Full page render ──────────────────────────────────────
  function render(data) {
    return '<div class="app-page settings-page">'
      + renderHeader()
      + '<div class="settings-body">'
      +   renderGoalsSection(data)
      +   renderManagement(data.employees, data.avatarConfigs)
      +   renderEmployees(data.employees, data.nicknames, data.avatarConfigs, data.excluded, data.eom, data.roles)
      + '</div>'
      + '</div>';
  }

  // ── Init ──────────────────────────────────────────────────
  function init(data) {

    // Back button
    var back = document.getElementById('settingsBack');
    if (back) back.addEventListener('click', function() {
      GC.router.navigate('#/director');
    });

    // Recalculate button — chains prefetchY2 → prefetchY1 → recalculategoals
    // Each step fires only 36 Dutchie requests (well under the 45s JSONP timeout).
    // After the first cold run both Y1 and Y2 are cached, so recalculate is instant.
    var recalcBtn    = document.getElementById('recalcBtn');
    var recalcStatus = document.getElementById('recalcStatus');
    var goalsMeta    = document.getElementById('goalsMeta');
    if (recalcBtn) {
      recalcBtn.addEventListener('click', function() {
        recalcBtn.disabled = true;
        if (recalcStatus) { recalcStatus.textContent = ''; recalcStatus.className = 'settings-save-status'; }

        function setStatus(msg) {
          recalcBtn.textContent = msg;
          if (recalcStatus) recalcStatus.textContent = msg;
        }

        setStatus('Fetching Y2 data…');
        GC.api.gasCall('prefetchyoy2', {})
          .then(function(r2) {
            if (!r2.ok) throw new Error(r2.error || 'Y2 prefetch failed');
            setStatus('Fetching Y1 data…');
            return GC.api.gasCall('prefetchyoy1', {});
          })
          .then(function(r1) {
            if (!r1.ok) throw new Error(r1.error || 'Y1 prefetch failed');
            setStatus('Computing goals…');
            return GC.api.gasCall('recalculategoals', {});
          })
          .then(function(res) {
            recalcBtn.disabled = false;
            recalcBtn.textContent = 'Recalculate';
            if (res.ok) {
              if (recalcStatus) { recalcStatus.textContent = '✓ Rolling + YoY goals recalculated — reload to see updated values'; recalcStatus.className = 'settings-save-status ok'; }
              if (goalsMeta)   { goalsMeta.textContent = 'Recalculated just now · Reload to see updated values'; }
            } else {
              if (recalcStatus) { recalcStatus.textContent = '✗ ' + (res.error || 'Recalculation failed'); recalcStatus.className = 'settings-save-status err'; }
            }
          })
          .catch(function(err) {
            recalcBtn.disabled = false;
            recalcBtn.textContent = 'Recalculate';
            if (recalcStatus) { recalcStatus.textContent = '✗ ' + err.message; recalcStatus.className = 'settings-save-status err'; }
          });
      });
    }

    // Stretch multiplier — live preview + Apply
    var stretchSelect = document.getElementById('stretchSelect');

    function applyStretchDisplay(updatePPInputs) {
      var mult = 1 + (parseFloat((stretchSelect && stretchSelect.value) || 0) || 0);

      // Baseline PP spans (Rolling / YoY) — pure stretch, no override involved
      document.querySelectorAll('[data-base-pp]').forEach(function(el) {
        var base = parseFloat(el.getAttribute('data-base-pp')) || 0;
        el.textContent = base ? '$' + Math.round(base * mult).toLocaleString('en-US') : '—';
      });

      // Monthly + DOW — always preview as base × mult (pure stretch scaling)
      // Manual PP overrides are per-period fine-tuning; the stretch preview for
      // monthly/DOW should show what the new stretch target implies for those horizons.
      // (scale was previously applied here but caused monthly/DOW to barely move
      //  when all stores had saved stretch-adjusted values as manual overrides.)
      document.querySelectorAll('#goalsTable tbody tr').forEach(function(row) {
        var inp        = row.querySelector('.settings-pp-override');
        var computedPP = inp ? (parseFloat(inp.getAttribute('data-base-computed-pp')) || 0) : 0;
        var hasManual  = inp && inp.getAttribute('data-manual') === '1';

        // If no manual override, recalculate the PP input itself from base × stretch
        // — but only when triggered by a stretch change, not by the user typing in the input.
        var newPP = inp ? (parseFloat((inp.value || '').replace(/[^0-9.]/g, '')) || 0) : 0;
        if (updatePPInputs && inp && !hasManual && computedPP) {
          newPP = Math.round(computedPP * mult);
          inp.value = newPP.toLocaleString('en-US');
        }

        // Manual rows scale by actual PP / base; non-manual rows scale by stretch mult
        var scale = (hasManual && computedPP > 0 && newPP > 0) ? (newPP / computedPP) : mult;

        var monthlyEl = row.querySelector('[data-base-monthly]');
        if (monthlyEl) {
          var base = parseFloat(monthlyEl.getAttribute('data-base-monthly')) || 0;
          monthlyEl.textContent = base ? '$' + Math.round(base * scale).toLocaleString('en-US') : '—';
        }

        row.querySelectorAll('.settings-dow-cell[data-base-dow]').forEach(function(el) {
          var base  = parseFloat(el.getAttribute('data-base-dow')) || 0;
          var inner = el.querySelector('.settings-dow-val');
          if (inner) inner.textContent = base ? '$' + Math.round(base * scale).toLocaleString('en-US') : '—';
        });
      });

      // Update total PP cell — live sum of all PP override input values
      var totalPPEl = document.getElementById('goalsTotalPP');
      if (totalPPEl) {
        var ppSum = 0;
        document.querySelectorAll('.settings-pp-override').forEach(function(inp) {
          ppSum += parseFloat((inp.value || '').replace(/[^0-9.]/g, '')) || 0;
        });
        totalPPEl.textContent = ppSum ? '$' + Math.round(ppSum).toLocaleString('en-US') : '—';
      }

      // Update total monthly and DOW cells in tfoot (same data-attribute pattern as tbody)
      var tfoot = document.querySelector('#goalsTable tfoot');
      if (tfoot) {
        var mTot = tfoot.querySelector('[data-base-monthly]');
        if (mTot) {
          var mBase2 = parseFloat(mTot.getAttribute('data-base-monthly')) || 0;
          mTot.textContent = mBase2 ? '$' + Math.round(mBase2 * mult).toLocaleString('en-US') : '—';
        }
        tfoot.querySelectorAll('.settings-dow-cell[data-base-dow]').forEach(function(el) {
          var base  = parseFloat(el.getAttribute('data-base-dow')) || 0;
          var inner = el.querySelector('.settings-dow-val');
          if (inner) inner.textContent = base ? '$' + Math.round(base * mult).toLocaleString('en-US') : '—';
        });
        var bTot = tfoot.querySelector('[data-base-pp]');
        if (bTot) {
          var bBase = parseFloat(bTot.getAttribute('data-base-pp')) || 0;
          bTot.textContent = bBase ? '$' + Math.round(bBase * mult).toLocaleString('en-US') : '—';
        }
      }
    }

    // Live-preview stretch when dropdown changes — also updates PP inputs
    if (stretchSelect) stretchSelect.addEventListener('change', function() {
      applyStretchDisplay(true);
    });

    // Live-update monthly + DOW when a PP override input changes.
    // Scale that row's derived cells by newPP / computedBasePP so daily goals
    // update proportionally as you type — no overwrite of the PP input itself.
    document.querySelectorAll('.settings-pp-override').forEach(function(inp) {
      inp.addEventListener('input', function() {
        var row           = inp.closest('tr');
        var computedBase  = parseFloat(inp.getAttribute('data-base-computed-pp')) || 0;
        var newPP         = parseFloat((inp.value || '').replace(/[^0-9.]/g, '')) || 0;
        // Scale = ratio of new PP to base computed PP; fall back to stretch mult if no base
        var mult          = 1 + (parseFloat((stretchSelect && stretchSelect.value) || 0) || 0);
        var scale         = (computedBase > 0 && newPP > 0) ? (newPP / computedBase) : mult;

        // Amber border when value differs from computed; clear when back to computed
        var wrap = inp.closest('.settings-input-wrap');
        if (wrap && computedBase > 0) {
          var expectedVal = Math.round(computedBase * mult);
          var isModified  = newPP > 0 && Math.abs(newPP - expectedVal) > 1;
          wrap.classList.toggle('has-manual', isModified);
        }

        if (row) {
          var monthlyEl = row.querySelector('[data-base-monthly]');
          if (monthlyEl) {
            var mBase = parseFloat(monthlyEl.getAttribute('data-base-monthly')) || 0;
            monthlyEl.textContent = mBase ? '$' + Math.round(mBase * scale).toLocaleString('en-US') : '—';
          }
          row.querySelectorAll('.settings-dow-cell[data-base-dow]').forEach(function(el) {
            var base  = parseFloat(el.getAttribute('data-base-dow')) || 0;
            var inner = el.querySelector('.settings-dow-val');
            if (inner) inner.textContent = base ? '$' + Math.round(base * scale).toLocaleString('en-US') : '—';
          });
        }

        recomputeTotals();
      });
    });

    // Recompute and refresh all tfoot total cells from current tbody displayed values
    function recomputeTotals() {
      var table = document.getElementById('goalsTable');
      if (!table) return;
      var tfoot = table.querySelector('tfoot');
      var tbody = table.querySelector('tbody');
      if (!tfoot || !tbody) return;

      // Sum Goal PP inputs
      var ppSum = 0;
      table.querySelectorAll('.settings-pp-override').forEach(function(i) {
        ppSum += parseFloat((i.value || '').replace(/[^0-9.]/g, '')) || 0;
      });
      var totalPPEl = document.getElementById('goalsTotalPP');
      if (totalPPEl) totalPPEl.textContent = ppSum ? '$' + Math.round(ppSum).toLocaleString('en-US') : '—';

      // Sum monthly from all tbody rows
      var mSum = 0;
      tbody.querySelectorAll('[data-base-monthly]').forEach(function(el) {
        var v = parseFloat((el.textContent || '').replace(/[^0-9.]/g, '')) || 0;
        mSum += v;
      });
      var mTotEl = tfoot.querySelector('[data-base-monthly]');
      if (mTotEl) mTotEl.textContent = mSum ? '$' + Math.round(mSum).toLocaleString('en-US') : '—';

      // Sum each DOW column by position across all tbody rows
      var tfootDowCells = tfoot.querySelectorAll('.settings-total-dow');
      if (tfootDowCells.length) {
        var dowSums = [];
        for (var di = 0; di < tfootDowCells.length; di++) dowSums[di] = 0;
        tbody.querySelectorAll('tr').forEach(function(r) {
          var rowDow = r.querySelectorAll('.settings-dow-cell:not(.settings-total-dow)');
          rowDow.forEach(function(el, di) {
            var inner = el.querySelector('.settings-dow-val');
            var v = parseFloat(((inner ? inner.textContent : el.textContent) || '').replace(/[^0-9.]/g, '')) || 0;
            if (di < dowSums.length) dowSums[di] += v;
          });
        });
        tfootDowCells.forEach(function(el, di) {
          var inner = el.querySelector('.settings-dow-val');
          var txt = dowSums[di] ? '$' + Math.round(dowSums[di]).toLocaleString('en-US') : '—';
          if (inner) inner.textContent = txt; else el.textContent = txt;
        });
      }
    }

    // Save Goal Overrides
    var saveGoalsBtn = document.getElementById('saveGoalsBtn');
    if (saveGoalsBtn) {
      saveGoalsBtn.addEventListener('click', function() {
        var inputs  = document.querySelectorAll('.settings-pp-override');
        var payload = {};
        inputs.forEach(function(inp) {
          var slug = inp.getAttribute('data-slug');
          var raw  = inp.value.replace(/[^0-9.]/g, '');
          var val  = parseFloat(raw);
          if (slug) payload[slug] = (val > 0) ? val : 0;
        });

        saveGoalsBtn.disabled = true;
        saveGoalsBtn.textContent = 'Saving…';
        if (recalcStatus) { recalcStatus.textContent = ''; recalcStatus.className = 'settings-save-status'; }

        var stretch = parseFloat(stretchSelect ? stretchSelect.value : 0) || 0;
        // Save stretch first, then manual goals — both committed together on one button press
        GC.api.gasCall('savesettings', { stretch: stretch }).catch(function() {});
        GC.api.gasCall('savemanualgoals', { goals: JSON.stringify(payload) })
          .then(function(res) {
            if (res.ok) {
              // Reload so all derived values (daily goals, monthly, DOW) reflect the new overrides
              window.location.reload();
            } else {
              saveGoalsBtn.disabled = false;
              saveGoalsBtn.textContent = 'Save Goal Overrides';
              if (recalcStatus) { recalcStatus.textContent = '✗ ' + (res.error || 'Save failed'); recalcStatus.className = 'settings-save-status err'; }
            }
          })
          .catch(function(err) {
            saveGoalsBtn.disabled = false;
            saveGoalsBtn.textContent = 'Save Goal Overrides';
            if (recalcStatus) { recalcStatus.textContent = '✗ ' + err.message; recalcStatus.className = 'settings-save-status err'; }
          });
      });
    }

    // Exclude toggle — live toggle, saved with the Save button
    var nickTable = document.getElementById('nickTable');
    if (nickTable) {
      nickTable.addEventListener('click', function(evt) {
        var btn = evt.target.closest('.excl-toggle');
        if (!btn) return;
        var isExcluded = btn.classList.toggle('excluded');
        btn.textContent = isExcluded ? 'Excluded' : 'Active';
        btn.title       = isExcluded ? 'Re-activate employee' : 'Exclude from dashboard';
        var row = btn.closest('tr');
        if (row) row.classList.toggle('emp-row-excluded', isExcluded);
      });
    }

    // Save nicknames + excluded state
    var saveNicksBtn = document.getElementById('saveNicksBtn');
    var nickStatus   = document.getElementById('nickStatus');
    if (saveNicksBtn) {
      saveNicksBtn.addEventListener('click', function() {
        var inputs    = document.querySelectorAll('#nickTable input[data-key]');
        var nicknames = {};
        inputs.forEach(function(inp) {
          var val = inp.value.trim();
          if (val) nicknames[inp.dataset.key] = val;
        });

        var excluded = [];
        document.querySelectorAll('#nickTable .excl-toggle.excluded').forEach(function(btn) {
          excluded.push(btn.dataset.key);
        });

        var roles = {};
        document.querySelectorAll('#nickTable select.settings-role-select').forEach(function(sel) {
          if (sel.value) roles[sel.dataset.key] = sel.value;
        });

        saveNicksBtn.disabled = true;
        saveNicksBtn.textContent = 'Saving…';
        nickStatus.textContent = '';
        nickStatus.className = 'settings-save-status';

        GC.api.saveSettings(null, nicknames, excluded, roles)
          .then(function(res) {
            saveNicksBtn.disabled = false;
            saveNicksBtn.textContent = 'Save';
            if (res.ok) {
              GC.api.clearAvatarCaches(); // bust director cache so roles/nicknames show immediately
              nickStatus.textContent = '✓ Saved';
              nickStatus.className = 'settings-save-status ok';
            } else {
              nickStatus.textContent = '✗ ' + (res.error || 'Save failed');
              nickStatus.className = 'settings-save-status err';
            }
          })
          .catch(function(err) {
            saveNicksBtn.disabled = false;
            saveNicksBtn.textContent = 'Save';
            nickStatus.textContent = '✗ ' + err.message;
            nickStatus.className = 'settings-save-status err';
          });
      });
    }

    // EoM radio — auto-save on selection change
    if (nickTable) {
      nickTable.addEventListener('change', function(evt) {
        var radio = evt.target;
        if (radio.type !== 'radio' || radio.name !== 'eomPick') return;
        nickStatus.textContent = 'Saving EoM…';
        nickStatus.className   = 'settings-save-status';
        GC.api.gasCall('saveeom', { key: radio.value })
          .then(function(r) {
            nickStatus.textContent = r.ok ? '✓ EoM saved' : '✗ ' + (r.error || 'Save failed');
            nickStatus.className   = 'settings-save-status ' + (r.ok ? 'ok' : 'err');
          })
          .catch(function(err) {
            nickStatus.textContent = '✗ ' + err.message;
            nickStatus.className   = 'settings-save-status err';
          });
      });
    }

    // Clear EoM button
    var clearEomBtn = document.getElementById('clearEomBtn');
    if (clearEomBtn) {
      clearEomBtn.addEventListener('click', function() {
        if (!confirm('Clear Employee of the Month?')) return;
        clearEomBtn.disabled = true;
        GC.api.gasCall('saveeom', {})
          .then(function(r) {
            clearEomBtn.disabled = false;
            if (r.ok) {
              document.querySelectorAll('input[name="eomPick"]').forEach(function(inp) { inp.checked = false; });
              nickStatus.textContent = '✓ EoM cleared';
              nickStatus.className   = 'settings-save-status ok';
            } else {
              nickStatus.textContent = '✗ ' + (r.error || 'Clear failed');
              nickStatus.className   = 'settings-save-status err';
            }
          })
          .catch(function(err) {
            clearEomBtn.disabled = false;
            nickStatus.textContent = '✗ ' + err.message;
            nickStatus.className   = 'settings-save-status err';
          });
      });
    }

    // Apply override scaling once on load so saved overrides are reflected immediately
    applyStretchDisplay();
    // Recompute tfoot totals once on load (handles manual overrides already in inputs)
    recomputeTotals();
  }

  return { render: render, renderLoading: renderLoading, renderError: renderError, init: init };
})();

</script>
<script>
// ============================================================
//  Green Cross — Avatar Picker View
//  Route: #/avatar?employee=<nameKey>
//
//  Lets any authenticated user build and save a DiceBear
//  Avataaars avatar for a given employee nameKey.
// ============================================================

window.GC = window.GC || {};

GC.views.renderAvatar = function(queryParams) {
  var app = document.getElementById('app');
  if (!app) return;
  var nameKey = (queryParams && queryParams.employee) || '';

  app.innerHTML = ava.renderLoading(nameKey);

  GC.api.fetchAvatarData()
    .then(function(data) {
      var emp = (data.employees || []).filter(function(e) { return e.key === nameKey; })[0];
      if (!emp) {
        // Employee is in live transaction data but not yet in the synced roster.
        // Build a minimal record from the nameKey so the picker still works.
        var displayName = nameKey.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        emp = { key: nameKey, name: displayName, store: '' };
      }
      // Configs may be stored under a short display-name key (e.g. "sunshine") while
      // the roster/URL key uses the full name ("maria_sunshine"). Try exact match first,
      // then each name segment so any position can match.
      var _rawCfgs = data.avatarConfigs || {};
      var savedConfig = _rawCfgs[nameKey] || null;
      if (!savedConfig) {
        var _segs = nameKey.split('_');
        for (var _si = 0; _si < _segs.length; _si++) {
          if (_rawCfgs[_segs[_si]]) { savedConfig = _rawCfgs[_segs[_si]]; break; }
        }
      }
      app.innerHTML = ava.render(emp, savedConfig);
      ava.init(emp, queryParams);
    })
    .catch(function(err) {
      app.innerHTML = ava.renderError(err.message);
      ava.initBack(queryParams);
    });
};

var ava = (function() {

  // ── Options (DiceBear Avataaars v9 — curated) ─────────────
  var HAT_TOPS = { hat: true, winterHat1: true };  // tops that need hatColor, not hairColor

  var OPTIONS = {
    skinColor:    ['ffdbb4','f8d25c','fd9841','edb98a','d08b5b','ae5d29','614335'],
    top: [
      '_none','_gchat','hat','winterHat1',
      'bigHair','bob','bun','curly','curvy','dreads','dreads01','dreads02','frida','frizzle','fro','froBand','longButNotTooLong','miaWallace','shaggy','shaggyMullet','shavedSides','shortCurly','shortFlat','shortRound','shortWaved','sides','straight01','straight02','straightAndStrand','theCaesar','theCaesarAndSidePart'
    ],
    hairColor:    ['2c1b18','4a312c','724133','a55728','b58143','c93305','d6b370','e8e1e1','ecdcbf','f59797'],
    hatColor:     ['3c4f5c','65c9ff','262e33','5199e4','25557c','929598','a7ffc4','b1e2ff','e6e6e6','ff5c5c','ff488e','ffafb9','ffdeb5','ffffb1','ffffff'],
    eyes:         ['default','eyeRoll','happy','hearts','side','squint','surprised','wink'],
    eyebrows:     ['default','defaultNatural','flatNatural','frownNatural','raisedExcited','raisedExcitedNatural','upDown','upDownNatural'],
    mouth:        ['default','smile','twinkle','tongue','serious','disbelief'],
    facialHair:        ['_none','beardLight','beardMajestic','beardMedium','moustacheFancy','moustacheMagnum'],
    facialHairColor:   ['2c1b18','4a312c','724133','a55728','b58143','c93305','d6b370','e8e1e1','ecdcbf','f59797'],
    clothing:     ['blazerAndShirt','blazerAndSweater','collarAndSweater','graphicShirt','hoodie','shirtCrewNeck','shirtScoopNeck','shirtVNeck'],
    clothesColor: ['3c4f5c','65c9ff','262e33','5199e4','25557c','929598','a7ffc4','b1e2ff','e6e6e6','ff5c5c','ff488e','ffafb9','ffdeb5','ffffb1','ffffff'],
    accessories:  ['_none','prescription01','prescription02','round','sunglasses','wayfarers'],
    accessoriesColor: ['3c4f5c','65c9ff','262e33','5199e4','25557c','929598','a7ffc4','b1e2ff','e6e6e6','ff5c5c','ff488e','ffafb9','ffdeb5','ffffb1','ffffff']
  };

  var DEFAULT_CONFIG = {
    skinColor: 'f8d25c', top: '_none', hairColor: '2c1b18', hatColor: '262e33',
    eyes: 'wink', eyebrows: 'upDown', mouth: 'default',
    facialHair: '_none', facialHairColor: '2c1b18',
    clothing: 'shirtCrewNeck', clothesColor: '929598',
    accessories: '_none', accessoriesColor: '3c4f5c'
  };

  function humanize(s) {
    if (s === '_none')  return 'None';
    if (s === '_gchat') return 'GC Hat';
    return s.replace(/([A-Z])/g, ' $1').replace(/^./, function(c) { return c.toUpperCase(); }).replace(/(\d+)/, ' $1').trim();
  }

  function e(s) { return GC.esc ? GC.esc(String(s || '')) : String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Loading / Error / Not Found ────────────────────────────
  function renderLoading(nameKey) {
    return '<div class="app-page avatar-page">'
      + renderHeader('…')
      + '<div style="padding:40px 24px;color:var(--text-dim,#a8aba6)">Loading…</div>'
      + '</div>';
  }

  function renderError(msg) {
    return '<div class="app-page avatar-page">'
      + renderHeader('Error')
      + '<div style="padding:40px 24px;color:#ef4444">Error: ' + e(msg) + '</div>'
      + '</div>';
  }

  function renderNotFound(nameKey) {
    return '<div class="app-page avatar-page">'
      + renderHeader('Not Found')
      + '<div style="padding:40px 24px;color:var(--text-dim,#a8aba6)">Employee <strong>' + e(nameKey) + '</strong> not found. <button id="avatarBack" class="ava-back">← Back</button></div>'
      + '</div>';
  }

  // ── Header ─────────────────────────────────────────────────
  function renderHeader(empName) {
    return '<header class="avatar-header">'
      + '<button id="avatarBack" class="ava-back">← Back</button>'
      + '<h1>Build your avatar</h1>'
      + '<div class="avatar-crumb">' + e(empName) + ' · Avatar</div>'
      + '</header>';
  }

  // ── Main render ────────────────────────────────────────────
  function render(emp, savedConfig) {
    var firstName = (emp.name || '').split(' ')[0] || emp.name;

    return '<div class="app-page avatar-page">'
      + renderHeader(emp.name)
      + '<div class="avatar-grid">'

      // LEFT: preview card
      + '<div class="avatar-preview card">'
      +   '<h3>Preview</h3>'
      +   '<div class="avatar-frame">'
      +     '<img id="avaImg" alt="' + e(emp.name) + ' avatar">'
      +   '</div>'
      +   '<div class="avatar-actions">'
      +     '<button id="avaRandom" class="ava-btn">↻ Surprise me</button>'
      +     '<button id="avaSave" class="ava-btn primary">Save</button>'
      +   '</div>'
      +   (savedConfig ? '<div class="ava-clear-wrap"><button id="avaClear" class="ava-clear">Remove avatar — revert to initials</button></div>' : '')
      +   '<div class="ava-lb-preview">'
      +     '<h4>How it\'ll look on the leaderboard</h4>'
      +     '<div class="ava-lb-row">'
      +       '<div class="ava-lb-rank">1</div>'
      +       '<div class="lb-ava"><img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Jordan&skinColor=edb98a&top=straight01&hairColor=2c1b18&clothing=hoodie&clothesColor=ff5c5c&accessoriesProbability=0&facialHairProbability=0" alt=""></div>'
      +       '<div class="ava-lb-name">Jordan M.</div>'
      +       '<div class="ava-lb-val">$4,820</div>'
      +     '</div>'
      +     '<div class="ava-lb-row you">'
      +       '<div class="ava-lb-rank">2</div>'
      +       '<div class="lb-ava"><img id="avaImgLb" alt=""></div>'
      +       '<div class="ava-lb-name">' + e(firstName) + '</div>'
      +       '<div class="ava-lb-val">$4,210</div>'
      +     '</div>'
      +     '<div class="ava-lb-row">'
      +       '<div class="ava-lb-rank">3</div>'
      +       '<div class="lb-ava initials">DT</div>'
      +       '<div class="ava-lb-name">Devon T.</div>'
      +       '<div class="ava-lb-val">$3,945</div>'
      +     '</div>'
      +   '</div>'
      + '</div>'

      // RIGHT: controls card
      + '<div class="avatar-controls card">'
      +   '<div class="ava-tabs">'
      +     '<div class="ava-tab active" data-tab="face">Face</div>'
      +     '<div class="ava-tab" data-tab="hair">Hair</div>'
