<!-- ── Foundation layer (load order matters) ──────────────── -->
<script>
// ============================================================
//  Green Cross — Sales Dashboard
//  Utilities: constants, formatters, threshold helpers, dates
// ============================================================

window.GC = window.GC || {};

// ── Store Registry ────────────────────────────────────────
GC.STORES = {
  baseline:   { name: 'Baseline',   slug: 'baseline',   color: '#4ade80', address: 'SW 5th' },
  center:     { name: 'Center',     slug: 'center',     color: '#60a5fa', address: 'Downtown' },
  century:    { name: 'Century',    slug: 'century',    color: '#f97316', address: 'SE Powell' },
  commercial: { name: 'Commercial', slug: 'commercial', color: '#facc15', address: 'N Mississippi' },
  portland:   { name: 'Portland',   slug: 'portland',   color: '#a78bfa', address: 'NW 23rd' },
  river:      { name: 'River',      slug: 'river',      color: '#ef4444', address: 'SE 39th' },
};

GC.STORE_SLUGS = Object.keys(GC.STORES);

// ── Slideshow ────────────────────────────────────────────
GC.slideshow = (function() {
  var _active      = false;
  var _slugs       = GC.STORE_SLUGS;
  var _idx         = 0;
  var _intervalMs  = 2 * 60 * 1000;
  var _timer       = null;
  var _hideTimer   = null;

  function start(startIdx) {
    _active = true;
    _idx    = (startIdx != null) ? startIdx : 0;
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(function() {});
    }
    _navigate();
  }

  function stop() {
    _active = false;
    clearTimeout(_timer);
    clearTimeout(_hideTimer);
    _timer = _hideTimer = null;
    var bar = document.getElementById('ssBar');
    if (bar) bar.remove();
    if (document.fullscreenElement && document.exitFullscreen) {
      document.exitFullscreen().catch(function() {});
    }
    GC.router.navigate('#/director');
  }

  function advance(delta) {
    clearTimeout(_timer);
    _idx = ((_idx + delta) + _slugs.length) % _slugs.length;
    _navigate();
  }

  function setInterval_(ms) {
    _intervalMs = ms;
    // Restart the current slide's timer with the new interval
    clearTimeout(_timer);
    _scheduleNext();
    // Update button states
    var bar = document.getElementById('ssBar');
    if (!bar) return;
    bar.querySelectorAll('.ss-bar-intervals button').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.ms, 10) === _intervalMs);
    });
    _resetProgress();
  }

  function _navigate() {
    var slug = _slugs[_idx];
    GC.router.navigate('#/store/' + slug);
    // Bar is injected by kiosk.init after render; schedule next
    _scheduleNext();
  }

  function _scheduleNext() {
    clearTimeout(_timer);
    _timer = setTimeout(function() {
      if (!_active) return;
      _idx = (_idx + 1) % _slugs.length;
      _navigate();
    }, _intervalMs);
  }

  function injectBar(slug) {
    if (!_active) return;
    // Remove any existing bar
    var old = document.getElementById('ssBar');
    if (old) old.remove();

    var store    = GC.STORES[slug] || {};
    var color    = store.color || 'var(--green)';
    var name     = store.name  || slug;
    var total    = _slugs.length;
    var current  = _idx + 1;

    var intervals = [
      { label: '1m',  ms: 60000 },
      { label: '2m',  ms: 120000 },
      { label: '3m',  ms: 180000 },
      { label: '5m',  ms: 300000 },
    ];
    var intBtns = intervals.map(function(o) {
      var act = o.ms === _intervalMs ? ' active' : '';
      return '<button class="' + act + '" data-ms="' + o.ms + '" onclick="GC.slideshow.setInterval(' + o.ms + ')">' + o.label + '</button>';
    }).join('');

    var bar = document.createElement('div');
    bar.id        = 'ssBar';
    bar.className = 'ss-bar';
    bar.innerHTML =
      '<div class="ss-bar-store">'
      + '<span class="ss-bar-dot" style="background:' + color + '"></span>'
      + '<span class="ss-bar-name">' + GC.esc(name) + '</span>'
      + '<span class="ss-bar-count">' + current + ' / ' + total + '</span>'
      + '</div>'
      + '<div class="ss-bar-intervals">' + intBtns + '</div>'
      + '<div class="ss-bar-controls">'
      + '<button onclick="GC.slideshow.advance(-1)">← Prev</button>'
      + '<button class="ss-stop" onclick="GC.slideshow.stop()">■ Stop</button>'
      + '<button onclick="GC.slideshow.advance(1)">Next →</button>'
      + '</div>'
      + '<div class="ss-bar-progress" id="ssProgress"></div>';
    document.body.appendChild(bar);

    _resetProgress();
    _setupAutoHide(bar);

    // Prefetch next store ~1s after bar renders so data is cache-warm before the switch
    var nextSlug = _slugs[(_idx + 1) % _slugs.length];
    setTimeout(function() {
      if (_active) GC.api.prefetchKiosk(nextSlug);
    }, 1000);
  }

  function _resetProgress() {
    var prog = document.getElementById('ssProgress');
    if (!prog) return;
    // Restart CSS transition for progress bar
    prog.classList.remove('animating');
    prog.style.transition = 'none';
    prog.style.width = '0%';
    // Force reflow then start animation
    void prog.offsetWidth;
    prog.style.transition = 'width ' + (_intervalMs / 1000) + 's linear';
    prog.classList.add('animating');
  }

  function _setupAutoHide(bar) {
    clearTimeout(_hideTimer);
    _hideTimer = setTimeout(function() { bar.classList.add('hidden'); }, 3000);
    document.addEventListener('mousemove', _onMouseMove);
    document.addEventListener('touchstart', _onMouseMove);
  }

  function _onMouseMove() {
    var bar = document.getElementById('ssBar');
    if (!bar) { document.removeEventListener('mousemove', _onMouseMove); document.removeEventListener('touchstart', _onMouseMove); return; }
    bar.classList.remove('hidden');
    clearTimeout(_hideTimer);
    _hideTimer = setTimeout(function() { bar.classList.add('hidden'); }, 3000);
  }

  return {
    get active() { return _active; },
    start:       start,
    stop:        stop,
    advance:     advance,
    setInterval: setInterval_,
    injectBar:   injectBar,
  };
}());

// ── Thresholds (spec §5) ─────────────────────────────────
// All UI states are derived from these. In v1.1 these come
// from GET /api/config/thresholds instead of this constant.
GC.THRESHOLDS = {
  discountWatch:            0.065,   // 6.5% — flag for discount watch panel
  discountUnusual:          0.15,    // 15% — per-transaction line flag
  bigTransactionMin:        100,     // $ — mini celebration trigger
  rareDropMinTransaction:   400,     // $ — celebration trigger
  rareDropMinLineItem:      300,     // $ — alt trigger (single SKU line)
  rareDropMaxPerShift:      3,       // throttle rare drops per shift
  paceRedBelow:            -0.05,    // −5% vs plan → red dot
  paceAmberBelow:          -0.01,    // −1% vs plan → amber dot
  paceGreenAbove:           0.01,    // +1% vs plan → green dot
  goalCelebrationAt:        1.0,     // 100% → confetti + banner
  newHireWindowDays:        60,      // days since hire → "New" tag
  streakWindowDays:         30,      // rolling window for streak baseline
  personalBestWindowDays:   90,      // window for personal-best calc
};

// ── Formatters ────────────────────────────────────────────

/** $646,100 → "$646.1k" · $78,340 → "$78.3k" · $78.34 → "$78.34" */
GC.fmtCurrency = function(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1_000_000) return sign + '$' + (abs / 1_000_000).toFixed(1) + 'M';
  if (abs >= 10_000)    return sign + '$' + (abs / 1_000).toFixed(1) + 'k';
  if (abs >= 1_000)     return sign + '$' + abs.toLocaleString('en-US', { maximumFractionDigits: 0 });
  return sign + '$' + abs.toFixed(2);
};

/** 0.061 → "6.1%" */
GC.fmtPct = function(n, decimals) {
  if (n == null || isNaN(n)) return '—';
  const d = decimals != null ? decimals : 1;
  return (n * 100).toFixed(d) + '%';
};

/** 8247 → "8,247" */
GC.fmtNum = function(n) {
  if (n == null || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('en-US');
};

/** 2.6 → "2.6" */
GC.fmtDecimal = function(n, places) {
  if (n == null || isNaN(n)) return '—';
  return n.toFixed(places != null ? places : 1);
};

/** 0.042 → "▲ +4.2%" | -0.053 → "▼ −5.3%" */
GC.fmtDeltaPct = function(n) {
  if (n == null || isNaN(n)) return '';
  const abs = Math.abs(n * 100).toFixed(1);
  if (n > 0.001)  return '▲ +' + abs + '%';
  if (n < -0.001) return '▼ −' + abs + '%';
  return '—';
};

/** 1.18 → "▲ +$1.18" | -1.18 → "▼ −$1.18" */
GC.fmtDeltaCurrency = function(n) {
  if (n == null || isNaN(n)) return '';
  const abs = GC.fmtCurrency(Math.abs(n));
  if (n > 0.005)  return '▲ +' + abs;
  if (n < -0.005) return '▼ −' + abs;
  return '—';
};

/** 14 → "▲ +14" | -14 → "▼ −14" */
GC.fmtDeltaNum = function(n, prefix) {
  if (n == null || isNaN(n)) return '';
  const pre = prefix || '';
  if (n > 0)  return '▲ +' + pre + GC.fmtNum(n);
  if (n < 0)  return '▼ −' + pre + GC.fmtNum(Math.abs(n));
  return '—';
};

// ── Threshold Classifiers ─────────────────────────────────

/** 0.042 → 'lo' | 0.058 → 'mid' | 0.089 → 'hi' */
GC.discountSeverity = function(rate) {
  if (rate == null) return 'lo';
  if (rate >= GC.THRESHOLDS.discountWatch) return 'hi';
  if (rate >= 0.05) return 'mid';
  return 'lo';
};

/** pace number → 'green' | 'amber' | 'red' */
GC.paceDotClass = function(pace) {
  const t = GC.THRESHOLDS;
  if (pace >= t.paceGreenAbove) return 'green';
  if (pace <= t.paceRedBelow)   return 'red';
  return 'amber';
};

/** rank number + total stores → '' | 'mid' | 'bad' */
GC.rankPillClass = function(rank, total) {
  if (rank <= 2)           return '';          // green
  if (rank >= (total - 1)) return 'bad';       // red (bottom two)
  return 'mid';
};

/** hire_date string → true if within new-hire window */
GC.isNewHire = function(hireDateStr) {
  if (!hireDateStr) return false;
  const hire = new Date(hireDateStr);
  const cutoff = new Date(Date.now() - GC.THRESHOLDS.newHireWindowDays * 86400_000);
  return hire > cutoff;
};

// ── Sparkline ─────────────────────────────────────────────

/**
 * Convert an array of numbers to SVG polyline points string.
 * Output fits inside a width×height bounding box.
 * Y-axis is inverted (SVG 0 = top).
 */
GC.sparklinePoints = function(data, width, height) {
  width  = width  || 80;
  height = height || 22;
  if (!data || data.length < 2) return '';
  const min = Math.min.apply(null, data);
  const max = Math.max.apply(null, data);
  const range = max - min || 1;
  const step = width / (data.length - 1);
  const pad = 2;
  return data.map(function(v, i) {
    const x = Math.round(i * step);
    const y = Math.round((height - pad) - ((v - min) / range) * (height - pad * 2) + pad);
    return x + ',' + y;
  }).join(' ');
};

/** trendPct (0.18 for +18%) → 'up' | 'down' | '' */
GC.trendClass = function(pct) {
  if (pct >  0.005) return 'up';
  if (pct < -0.005) return 'down';
  return '';
};

/** trendPct → "+18%" | "−11%" | "0%" */
GC.trendLabel = function(pct) {
  if (pct == null || isNaN(pct)) return '';
  const abs = Math.abs(pct * 100).toFixed(0);
  if (pct >  0.005) return '+' + abs + '%';
  if (pct < -0.005) return '−' + abs + '%';
  return '0%';
};

/** Sparkline stroke color based on trendClass */
GC.trendStroke = function(cls) {
  if (cls === 'up')   return '#4ade80';
  if (cls === 'down') return '#ef4444';
  return '#8a958f';
};

// ── Timezone: always display/compute in Pacific Time ─────────────────────────
// Uses IANA 'America/Los_Angeles' so PDT/PST transitions are handled
// automatically by the browser, regardless of where the viewer is located.

GC.PT_TZ = 'America/Los_Angeles';

/** Returns PT 'YYYY-MM-DD' for a given Date (or today).
 *  en-CA locale produces YYYY-MM-DD format natively. */
GC._ptDateStr = function(d) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: GC.PT_TZ }).format(d || new Date());
};

// ── Date / Period Helpers ─────────────────────────────────

/** Returns 'YYYY-MM-DD' for today in PT */
GC.todayStr = function() {
  return GC._ptDateStr(new Date());
};

/** Returns 'YYYY-MM-DD' for n days ago in PT */
GC.daysAgoStr = function(n) {
  return GC._ptDateStr(new Date(Date.now() - n * 86400_000));
};

/** Returns { from: 'YYYY-MM-01', to: PT today } for MTD */
GC.mtdRange = function() {
  const today = GC.todayStr();
  return { from: today.slice(0, 7) + '-01', to: today };
};

/** Returns { from: Mon, to: today } for current week in PT */
GC.wtdRange = function() {
  const d     = new Date();
  const today = GC.todayStr();
  const parts = {};
  new Intl.DateTimeFormat('en-US', {
    timeZone: GC.PT_TZ, weekday: 'short',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).formatToParts(d).forEach(function(p) { parts[p.type] = p.value; });
  var dowMap   = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
  var daysToMon = (dowMap[parts.weekday] || 0) === 0 ? 6 : (dowMap[parts.weekday] - 1);
  var mon = new Date(d.getTime() - daysToMon * 86400_000);
  return { from: GC._ptDateStr(mon), to: today };
};

/** Period label for display */
GC.periodLabel = function(period) {
  const map = {
    today: 'Today',
    wtd:   'Week-to-Date',
    mtd:   'Month-to-Date',
    pp:    'Pay Period (2-wk)',
    qtd:   'Quarter-to-Date',
    ytd:   'Year-to-Date',
  };
  return map[period] || period;
};

// ── Clock ─────────────────────────────────────────────────

/** Format a Date → "6:47 PM" in PT (DST-aware, viewer-timezone-independent) */
GC.fmtTime = function(d) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: GC.PT_TZ, hour: 'numeric', minute: '2-digit', hour12: true
  }).format(d || new Date());
};

/** Format a Date → "Fri · May 15" in PT */
GC.fmtDateShort = function(d) {
  const parts = {};
  new Intl.DateTimeFormat('en-US', {
    timeZone: GC.PT_TZ, weekday: 'short', month: 'short', day: 'numeric'
  }).formatToParts(d || new Date()).forEach(function(p) { parts[p.type] = p.value; });
  return parts.weekday + ' · ' + parts.month + ' ' + parts.day;
};

/** Format a Date → "May 1 – 15, 2026" for period range */
GC.fmtDateRange = function(fromStr, toStr) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr   + 'T00:00:00');
  if (f.getMonth() === t.getMonth() && f.getFullYear() === t.getFullYear()) {
    return months[f.getMonth()] + ' ' + f.getDate() + ' – ' + t.getDate() + ', ' + f.getFullYear();
  }
  return months[f.getMonth()] + ' ' + f.getDate() + ' – ' + months[t.getMonth()] + ' ' + t.getDate() + ', ' + t.getFullYear();
};

// ── Escape ────────────────────────────────────────────────
GC.esc = function(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
};

// ── Avatar helpers ────────────────────────────────────────

/** Canonical nameKey: same logic as GAS nameToKey_() */
GC.nameToKey = function(name) {
  return (name || '').toLowerCase().replace(/\./g, '').replace(/\s+/g, '_').trim();
};

/**
 * Build a DiceBear Avataaars v9 URL from a config object + seed.
 * Rules:
 *   - _none in top/facialHair/accessories → set *Probability=0, skip color param
 *   - Otherwise → *Probability=100 so feature is guaranteed
 */
// ── GC branded hat SVG — overlaid on top of DiceBear avatar ──
// viewBox matches Avataaars (280×280) so it scales perfectly.
GC.GC_HAT_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280.01"><g><g><path d="M86.239,62.287c48.508-3.223,59.204-3.223,107.712,0,2.156,9.668,18.16,23.768,9.425,19.336-13.835-7.019-113.784-7.302-125.645.412-6.37,4.143,6.352-10.08,8.507-19.748Z" fill="#2c302d" stroke="#000" stroke-linejoin="round" stroke-width="4"/><path d="M86.7,67.121c-6.468-46.192,32.82-57.199,53.6-57.199,23.549,0,59.586,11.007,53.119,57.199h-106.718Z" fill="#2c302d" stroke="#000" stroke-linejoin="round" stroke-width="4"/><path d="M140.3,4.3c2.679,0,4.851.598,4.851,3.268s-1.931,2.341-4.61,2.341-5.091.329-5.091-2.341,2.172-3.268,4.851-3.268Z"/></g><g><path d="M139.905,12.984l.241,2.376c-.149,3.26-.513-5.595-.62-2.376h.38Z" fill="none" opacity=".35" stroke="#000" stroke-linecap="round" stroke-width="2"/><path d="M140.238,60.417c.145,4.188-.213.992.001,5.265" fill="none" opacity=".35" stroke="#000" stroke-linecap="round" stroke-width="2"/></g><path d="M146.709,23.878l.003,4.438c0,1.872-1.514,3.387-3.387,3.387l-.003-6.751c0-.578-.468-1.074-1.074-1.074h-4.02c-.578,0-1.074.496-1.074,1.074l-.029,6.405c0,1.873-1.514,3.387-3.359,3.387h-6.334c-.578,0-1.074.496-1.074,1.074v4.02c0,.606.496,1.074,1.074,1.074h4.998c.579,0,1.074-.468,1.074-1.074v-.22c0-1.983,1.597-3.58,3.58-3.58v4.681c0,1.983-1.597,3.58-3.58,3.58h-7.146c-1.982,0-3.58-1.597-3.58-3.58v-5.755c0-1.982,1.597-3.607,3.58-3.607h7.418s0-.748,0-.748l-.008-6.731c0-1.982,1.625-3.58,3.607-3.58h5.755c1.983,0,3.58,1.597,3.58,3.58ZM133.769,51.891l-.003-4.438c0-1.872,1.514-3.387,3.387-3.387l.003,6.751c0,.578.468,1.074,1.074,1.074h4.02c.578,0,1.074-.496,1.074-1.074l-.008-6.751c1.873,0,3.387,1.515,3.387,3.387l.008,4.438c0,1.982-1.625,3.58-3.607,3.58h-5.755c-1.983,0-3.58-1.597-3.58-3.58ZM157.192,44.365h-10.415c-1.982,0-3.58-1.597-3.58-3.58v-5.755c0-1.982,1.597-3.607,3.58-3.607h10.446c0,1.873-1.515,3.387-3.387,3.387h-5.985c-.578,0-1.074.496-1.074,1.074v4.02c0,.606.496,1.074,1.074,1.074h5.954c1.872,0,3.387,1.515,3.387,3.387Z" fill="#93d500"/></g></svg>';

GC.buildAvatarUrl = function(cfg, seed) {
  var params = [];
  params.push('seed=' + encodeURIComponent(seed || 'unknown'));

  var noAccessories = cfg.accessories === '_none';
  var noFacialHair  = cfg.facialHair  === '_none';
  var isGcHat       = cfg.top === '_gchat';
  // _gchat uses shortFlat underneath — hair peeks out from under the hat
  var noHair        = cfg.top === '_none';
  var isHat         = !!(cfg.top && { hat: true, winterHat1: true }[cfg.top]);  // hat/winterHat1 need hatColor, not hairColor

  var keys = Object.keys(cfg);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var v = cfg[k];
    if (v == null || v === '_none') continue;
    if (k === 'top' && isGcHat) {
      params.push('top=shortFlat');  // shortFlat renders under the hat overlay
      continue;
    }
    if (k === 'accessoriesColor' && noAccessories) continue;
    if (k === 'facialHairColor'  && noFacialHair)  continue;
    if (k === 'hairColor'        && (noHair || isHat)) continue;  // hats use hatColor instead
    if (k === 'hatColor'         && !isHat)         continue;     // only send hatColor for hat styles
    params.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
  }

  params.push('accessoriesProbability=' + (noAccessories ? '0' : '100'));
  params.push('facialHairProbability='  + (noFacialHair  ? '0' : '100'));
  params.push('topProbability='         + ((noHair && !isGcHat) ? '0' : '100'));

  return 'https://api.dicebear.com/9.x/avataaars/svg?' + params.join('&');
};

/**
 * onerror handler for .lb-ava img elements.
 * Falls back to initials text stored in [data-initials] on the parent puck.
 */
GC.avaFallback = function(img) {
  var puck = img.parentNode;
  if (!puck) return;
  puck.classList.add('initials');
  puck.textContent = puck.getAttribute('data-initials') || '';
};

/**
 * Generate the HTML for a leaderboard avatar puck.
 * @param {string}  nameKey      - stable per-employee key (used as seed + nav target)
 * @param {Object}  avatarConfig - avatar config object, or null/undefined for initials
 * @param {string}  initials     - fallback text (2–3 chars)
 * @param {boolean} clickable    - if true, adds data-ava-nav so the chip navigates to picker
 */
/**
 * Navigate to the avatar picker, encoding the current route as `from`
 * so the picker's back button returns to the right place.
 */
GC.navToAvatar = function(nameKey) {
  var from = (window.location.hash || '').replace(/^#/, '') || '/';
  GC.router.navigate('#/avatar?employee=' + encodeURIComponent(nameKey) + '&from=' + encodeURIComponent(from));
};

/**
 * Compute display initials for an avatar bubble.
 *
 * Multi-word displayed name (e.g. "Zach R", "Bobby J"):
 *   → first letter of first word + first letter of last word
 *   Works whether the name came from a configured nickname or Dutchie.
 *   Does NOT require nameKey — avoids stale-cache failures.
 *
 * Single-word displayed name (e.g. "Nate", "Maria"):
 *   → first letter of name + first letter of last segment of nameKey
 *   Falls back to gasInitials (capped to 2 chars) if nameKey is missing/short.
 *
 * Examples:
 *   "Zach R" / "zachary_robinson" → "ZR"  (multi-word: Z+R from name words)
 *   "Bobby"  / "robert_johnson"   → "BJ"  (single: B + J from nameKey last seg)
 *   "Nate"   / "nathan_wilson"    → "NW"  (single: N + W from nameKey last seg)
 *   "Maria"  / "maria_sunshine"   → "MS"  (single: M + S from nameKey last seg)
 *   "Chris"  / "chris_carney"     → "CC"  (single: C + C from nameKey last seg)
 */
GC.nickInitials = function(name, nameKey, gasInitials) {
  var parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return gasInitials || '??';

  // Multi-word display name: always derive from first + last word
  if (parts.length > 1) {
    var result = ((parts[0][0] || '') + (parts[parts.length - 1][0] || '')).toUpperCase();
    return result || gasInitials || '??';
  }

  // Single-word: first letter of name + first letter of nameKey's last segment
  var first   = (parts[0][0] || '').toUpperCase();
  var keySegs = (nameKey || '').split('_').filter(Boolean);
  var last    = keySegs.length > 1 ? (keySegs[keySegs.length - 1][0] || '').toUpperCase() : '';

  if (first && last) return first + last;

  // No last-name segment available — cap gasInitials to 2 chars and return
  return (gasInitials || '').slice(0, 2) || first || '??';
};

/** Segment-matching avatar config lookup (shared across all modules).
 *  Pass nameKey (canonical pre-nickname key, e.g. "zachary_robinson") and
 *  optionally altKey (display-name-derived key, e.g. "zach_r") to also search
 *  configs that were saved under the nickname format before the canonical-key fix.
 *
 *  Search order:
 *   1. configs[nameKey]          exact canonical match
 *   2. configs[seg] for each seg in nameKey   single-word segment match
 *      (handles old "maria" config found by "maria_sunshine" lookup)
 *   3. configs[altKey]           exact alt match
 *   4. configs[seg] for each seg in altKey    segments of alt key
 *      (handles "zach_r" config found when canonical lookup is "zachary_robinson")
 */
GC.findAvatarCfg = function(configs, nameKey, altKey) {
  if (!configs || !nameKey) return null;
  var _tryKey = function(k) {
    if (!k) return null;
    if (configs[k]) return configs[k];
    var segs = k.split('_');
    for (var _i = 0; _i < segs.length; _i++) {
      if (configs[segs[_i]]) return configs[segs[_i]];
    }
    return null;
  };
  return _tryKey(nameKey) || (altKey && altKey !== nameKey ? _tryKey(altKey) : null) || null;
};

GC.lbAvaPuck = function(nameKey, avatarConfig, initials, clickable) {
  var esc      = GC.esc;
  var safeInit = esc(initials || '??');
  // data-ava-nav drives CSS cursor + hover scale.
  // Navigation is handled by the global document click handler (in router init)
  // which calls GC.navToAvatar(key) — encoding the current hash as &from= so
  // the back button always returns to the referring page, not Settings.
  var navAttr = clickable ? ' data-ava-nav="' + esc(nameKey) + '"' : '';

  if (avatarConfig) {
    var url = GC.buildAvatarUrl(avatarConfig, nameKey);
    var hat = avatarConfig.top === '_gchat'
      ? '<div class="ava-hat-overlay">' + GC.GC_HAT_SVG + '</div>'
      : '';
    return '<div class="lb-ava" data-initials="' + safeInit + '"' + navAttr + '>'
      + '<img src="' + esc(url) + '" alt="" onerror="GC.avaFallback(this)">'
      + hat
      + '</div>';
  }
  return '<div class="lb-ava initials" data-initials="' + safeInit + '"' + navAttr + '>'
    + safeInit
    + '</div>';
};

/**
 * Inner HTML for a .uc-avatar <span> (user chip in director/kiosk headers).
 * Handles the GC hat overlay the same way lbAvaPuck does.
 */
GC.ucAvatarHtml = function(cfg, nameKey, fallbackInitials) {
  var esc = GC.esc;
  var fi  = esc(fallbackInitials || '??');
  if (!cfg) return '<span class="uc-avatar">' + fi + '</span>';
  var url = GC.buildAvatarUrl(cfg, nameKey);
  var hat = cfg.top === '_gchat'
    ? '<div class="ava-hat-overlay">' + GC.GC_HAT_SVG + '</div>'
    : '';
  return '<span class="uc-avatar" style="overflow:hidden;padding:0;position:relative">'
    + '<img src="' + esc(url) + '" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent=\'' + fi + '\'">'
    + hat
    + '</span>';
};

// ── Toast ─────────────────────────────────────────────────
GC.toast = function(message, type, duration) {
  type     = type     || 'info';
  duration = duration || 3000;
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(function() {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(function() { el.remove(); }, 300);
  }, duration);
};

</script>
<script>
// ============================================================
//  Green Cross — Sales Dashboard
//  Auth — session handling (client side)
//
//  Server-side pattern mirrors greencross-inventory:
//    HMAC-SHA256 token: "user:exp:sig"
//    Validated on every request via ?token=... param
//
//  Client stores the session as JSON in localStorage under
//  GC_PERF_SESSION (distinct from inventory's GC_AUTH_SESSION
//  to avoid cross-app collisions).
// ============================================================

window.GC = window.GC || {};

GC.auth = (function() {
  var SESSION_KEY = 'GC_PERF_SESSION';

  // ── Save session after successful login ────────────────
  function save(data) {
    // data: { token, user, role, storeId, storeName, expiresAt }
    try {
      localStorage.setItem(SESSION_KEY, JSON.stringify(data));
    } catch(e) {
      console.warn('[GC.auth] Could not save session:', e);
    }
  }

  // ── Load session from localStorage ────────────────────
  function load() {
    try {
      var raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      var s = JSON.parse(raw);
      if (!s || !s.token || !s.expiresAt) return null;
      if (new Date(s.expiresAt) < new Date()) {
        clear();
        return null;
      }
      return s;
    } catch(e) {
      return null;
    }
  }

  // ── Clear session (logout) ─────────────────────────────
  function clear() {
    localStorage.removeItem(SESSION_KEY);
  }

  // ── Check whether a valid session exists ──────────────
  function isAuthenticated() {
    return load() !== null;
  }

  // ── Redirect path based on role ───────────────────────
  function homeRoute() {
    var s = load();
    if (!s) return '#/login';
    switch (s.role) {
      case 'owner':
      case 'director':
        return '#/director';
      case 'store_manager':
      case 'asst_manager':
      case 'budtender':
        return '#/store/' + (s.storeSlug || 'baseline');
      default:
        return '#/director';
    }
  }

  return { save: save, load: load, clear: clear, isAuthenticated: isAuthenticated, homeRoute: homeRoute };
})();

</script>
<script>
// ============================================================
//  Green Cross — Sales Dashboard
//  API Client
//
//  USE_FIXTURES = true  → reads from src/fixtures/*.json
//                         (Phase 1: visual build, no backend)
//  USE_FIXTURES = false → calls GAS_URL via JSONP
//                         (Phase 2: real data)
//
//  To switch to real API:
//    1. Set GC.api.USE_FIXTURES = false
//    2. Set GC.api.GAS_URL to your deployed GAS web app URL
//    3. Ensure dutchie_proxy.gs is deployed and users are set
// ============================================================

window.GC = window.GC || {};

GC.api = (function() {

  var USE_FIXTURES = false;

  // Deployed GAS web app URL.
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxXqtL-rKjuzFQkyADWnHGEoM2ZSYp9g4t1J6vhyDTgHcfkEuQocYrN9DXV7_84Masuqg/exec';

  // Fixtures base path (relative to index.html)
  var FX = 'src/fixtures/';

  // ── Cache (two-tier: memory + localStorage) ───────────────
  // Serves stale data instantly while a background fetch updates the cache.
  var _mem = {};  // { key: { data, ts } }  — cleared on page reload

  function _getCached(key, ttlMs) {
    // 1. In-memory (fastest — same-session navigation)
    var m = _mem[key];
    if (m && (Date.now() - m.ts) < ttlMs) return m.data;
    // 2. localStorage (survives page reload / returning visit)
    try {
      var raw = localStorage.getItem('gc_cache_' + key);
      if (raw) {
        var entry = JSON.parse(raw);
        if (Date.now() - entry.ts < ttlMs) {
          _mem[key] = entry; // promote to memory
          return entry.data;
        }
      }
    } catch(e) {}
    return null;
  }

  function _setCache(key, data) {
    var entry = { data: data, ts: Date.now() };
    _mem[key] = entry;
    try { localStorage.setItem('gc_cache_' + key, JSON.stringify(entry)); } catch(e) {}
  }

  // Stale-while-revalidate wrapper.
  // Returns a Promise that resolves immediately with cached data (if fresh),
  // or with the network response if no cache. Either way a background network
  // request always runs; when it lands, onFresh(data) is called if provided.
  function _withCache(key, ttlMs, fetcher, onFresh) {
    var cached = _getCached(key, ttlMs);
    var networkPromise = fetcher().then(function(data) {
      _setCache(key, data);
      return data;
    });
    if (cached) {
      if (onFresh) networkPromise.then(onFresh).catch(function() {});
      return Promise.resolve(cached);
    }
    return networkPromise;
  }

  // ── JSONP helper (same pattern as greencross-inventory) ──
  var _cbIndex = 0;
  function jsonp(url, params) {
    return new Promise(function(resolve, reject) {
      var cbName = '__gc_cb_' + (++_cbIndex);
      var timeout = setTimeout(function() {
        delete window[cbName];
        reject(new Error('JSONP timeout: ' + url));
      }, 45000);

      window[cbName] = function(data) {
        clearTimeout(timeout);
        delete window[cbName];
        var s = document.getElementById('__gc_jsonp_' + cbName);
        if (s) s.remove();
        resolve(data);
      };

      var qs = Object.assign({ callback: cbName }, params || {});
      var qStr = Object.keys(qs).map(function(k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(qs[k]);
      }).join('&');

      var script = document.createElement('script');
      script.id  = '__gc_jsonp_' + cbName;
      script.src = url + '?' + qStr;
      script.onerror = function() {
        clearTimeout(timeout);
        delete window[cbName];
        script.remove();
        reject(new Error('JSONP script error: ' + url));
      };
      document.head.appendChild(script);
    });
  }

  // ── Auth-aware GAS call ────────────────────────────────
  function gasCall(action, extra) {
    var session = GC.auth.load();
    var params = Object.assign({ action: action }, extra || {});
    if (session && session.token) params.token = session.token;
    return jsonp(GAS_URL, params);
  }

  // ── Fixture fetch ──────────────────────────────────────
  function fetchFixture(filename) {
    return fetch(FX + filename + '.json', { cache: 'no-store' })
      .then(function(r) {
        if (!r.ok) throw new Error('Fixture not found: ' + filename);
        return r.json();
      });
  }

  // ── Fixture-mode login ─────────────────────────────────
  // Accepts hardcoded credentials so you can test routing
  // without a deployed GAS backend.
  //
  //  sky / gcadmin       → director
  //  sofia / gc123       → store_manager, baseline
  //  maya / gc123        → store_manager, river
  //  devon / gc123       → store_manager, portland
  //  priya / gc123       → store_manager, center
  //  marcus / gc123      → store_manager, commercial
  //  tyler / gc123       → store_manager, century
  var FIXTURE_USERS = {
    'sky':     { role: 'director',      storeSlug: null,         storeName: null,         initials: 'SP', displayName: 'Sky Pinnick' },
    'dean':    { role: 'store_manager', storeSlug: 'baseline',   storeName: 'Baseline',   initials: 'DD', displayName: 'Dean Deloof' },
    'tj':      { role: 'store_manager', storeSlug: 'river',      storeName: 'River',      initials: 'TP', displayName: 'TJ Peterson' },
    'scott':   { role: 'store_manager', storeSlug: 'portland',   storeName: 'Portland',   initials: 'SP', displayName: 'Scott Penner' },
    'tyson':   { role: 'store_manager', storeSlug: 'center',     storeName: 'Center',     initials: 'TF', displayName: 'Tyson Farris' },
    'mariana': { role: 'store_manager', storeSlug: 'commercial', storeName: 'Commercial', initials: 'MM', displayName: 'Mariana Moxie' },
    'chris':   { role: 'store_manager', storeSlug: 'century',    storeName: 'Century',    initials: 'CC', displayName: 'Chris Carney' },
  };
  var FIXTURE_PASSWORD = 'gc123';
  var DIRECTOR_PASSWORD = 'gcadmin';

  function fixtureLogin(user, pass) {
    return new Promise(function(resolve) {
      setTimeout(function() {
        var key = (user || '').toLowerCase().trim();
        var u = FIXTURE_USERS[key];
        if (!u) return resolve({ ok: false, error: 'Invalid username or password' });
        var expectedPass = (key === 'sky') ? DIRECTOR_PASSWORD : FIXTURE_PASSWORD;
        if (pass !== expectedPass) return resolve({ ok: false, error: 'Invalid username or password' });
        var exp = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString();
        resolve({
          ok: true,
          token: 'fixture-token-' + key,
          user: key,
          displayName: u.displayName,
          initials: u.initials,
          role: u.role,
          storeSlug: u.storeSlug,
          storeName: u.storeName,
          expiresAt: exp,
        });
      }, 300); // simulate network delay
    });
  }

  // ── Public: login ──────────────────────────────────────
  function login(user, pass) {
    if (USE_FIXTURES) return fixtureLogin(user, pass);
    return gasCall('login', { user: user, pass: pass });
  }

  // ── Public: Director endpoints ─────────────────────────

  function fetchDirectorSummary(period) {
    period = period || 'mtd';
    if (USE_FIXTURES) return fetchFixture('director-summary');
    return gasCall('directorsummary', { period: period });
  }

  function fetchDirectorStores(period) {
    period = period || 'mtd';
    if (USE_FIXTURES) return fetchFixture('director-stores');
    return gasCall('directorstores', { period: period });
  }

  function fetchDirectorStaff(period) {
    period = period || 'mtd';
    if (USE_FIXTURES) return fetchFixture('director-staff');
    return gasCall('directorstaff', { period: period });
  }

  function fetchDirectorAlerts() {
    if (USE_FIXTURES) return fetchFixture('director-alerts');
    return gasCall('directoralerts');
  }

  function fetchSettings() {
    return gasCall('getsettings', {});
  }

  // Lightweight avatar data — employees list + avatarConfigs, no goals.
  // Accessible to all authenticated roles (not director-only).
  function fetchAvatarData() {
    return gasCall('getavatardata', {});
  }

  function saveSettings(plans, nicknames, excluded, roles) {
    var params = {};
    if (plans)                  params.plans     = JSON.stringify(plans);
    if (nicknames)              params.nicknames = JSON.stringify(nicknames);
    if (excluded !== undefined) params.excluded  = JSON.stringify(excluded);
    if (roles)                  params.roles     = JSON.stringify(roles);
    return gasCall('savesettings', params);
  }

  // Convenience: single GAS round-trip returning all four director payloads.
  // onFresh(data) — optional callback fired when background network refresh lands.
  function fetchDirectorAll(period, onFresh) {
    period = period || 'mtd';
    if (USE_FIXTURES) {
      return Promise.all([
        fetchFixture('director-summary'),
        fetchFixture('director-stores'),
        fetchFixture('director-staff'),
        fetchFixture('director-alerts'),
      ]).then(function(results) {
        return { summary: results[0], stores: results[1], staff: results[2], alerts: results[3] };
      });
    }
    var cacheKey = 'director_' + period;
    var TTL = 5 * 60 * 1000; // 5 minutes
    return _withCache(cacheKey, TTL, function() {
      return gasCall('directorall', { period: period });
    }, onFresh);
  }

  // ── Public: Store / Kiosk endpoints ───────────────────
  // (stubs for Phase 2)

  function fetchStoreToday(storeSlug, opts) {
    opts = opts || {};
    if (USE_FIXTURES) return fetchFixture('store-today-' + storeSlug);
    var extra = { store: storeSlug };
    if (opts.sinceTs) extra.sinceTs = opts.sinceTs;
    return gasCall('storetoday', extra);
  }

  function fetchStoreLeaderboard(storeSlug) {
    if (USE_FIXTURES) return fetchFixture('store-leaderboard-' + storeSlug);
    return gasCall('storeleaderboard', { store: storeSlug });
  }

  function fetchStoreBadges(storeSlug, period) {
    period = period || 'week';
    if (USE_FIXTURES) return fetchFixture('store-badges-' + storeSlug);
    return gasCall('storebadges', { store: storeSlug, period: period });
  }

  function fetchLeaderboardStaff(period) {
    if (USE_FIXTURES) return fetchFixture('leaderboard-staff');
    return gasCall('leaderboardstaff', { period: period || 'mtd' });
  }

  // onFresh(data) — optional callback fired when background network refresh lands.
  function fetchKioskAll(storeSlug, onFresh) {
    var cacheKey = 'kiosk_' + storeSlug;
    var TTL = 3 * 60 * 1000; // 3 minutes (kiosk data changes more frequently)
    if (USE_FIXTURES) {
      return Promise.all([
        fetchStoreToday(storeSlug),
        fetchStoreLeaderboard(storeSlug),
        fetchStoreBadges(storeSlug, 'week'),
      ]).then(function(results) {
        return { today: results[0], leaderboard: results[1], badges: results[2] };
      });
    }
    return _withCache(cacheKey, TTL, function() {
      return Promise.all([
        fetchStoreToday(storeSlug),
        fetchStoreLeaderboard(storeSlug),
        fetchStoreBadges(storeSlug, 'week'),
      ]).then(function(results) {
        return { today: results[0], leaderboard: results[1], badges: results[2] };
      });
    }, onFresh);
  }

  return {
    USE_FIXTURES: USE_FIXTURES,
    GAS_URL: GAS_URL,
    login: login,
    fetchDirectorSummary: fetchDirectorSummary,
    fetchDirectorStores:  fetchDirectorStores,
    fetchDirectorStaff:   fetchDirectorStaff,
    fetchDirectorAlerts:  fetchDirectorAlerts,
    fetchDirectorAll:     fetchDirectorAll,
    fetchStoreToday:      fetchStoreToday,
    fetchStoreLeaderboard:fetchStoreLeaderboard,
    fetchStoreBadges:     fetchStoreBadges,
    fetchKioskAll:        fetchKioskAll,
    hasKioskCache: function(slug) {
      return !!_getCached('kiosk_' + slug, 3 * 60 * 1000);
    },
    prefetchKiosk: function(slug) {
      // Fire-and-forget: warms memory cache so next renderKiosk is instant
      fetchKioskAll(slug).catch(function() {});
    },
    // Clear all kiosk + director caches (called after avatar save so stale
    // avatarConfigs don't linger in localStorage across page loads).
    clearAvatarCaches: function() {
      // Bust in-memory cache
      Object.keys(_mem).forEach(function(k) {
        if (k.indexOf('kiosk_') === 0 || k.indexOf('director_') === 0) {
          delete _mem[k];
        }
      });
      // Bust localStorage cache
      try {
        Object.keys(localStorage).forEach(function(k) {
          if (k.indexOf('gc_cache_kiosk_') === 0 || k.indexOf('gc_cache_director_') === 0) {
            localStorage.removeItem(k);
          }
        });
      } catch(e) {}
    },
    fetchLeaderboardStaff: fetchLeaderboardStaff,
    fetchSettings:    fetchSettings,
    fetchAvatarData:  fetchAvatarData,
    saveSettings:     saveSettings,
    gasCall:          gasCall,
    // Historical snapshots — no caching (data is static once snapshotted)
    fetchHistoricalDirector: function(dateStr) {
      return gasCall('historicaldir', { date: dateStr });
    },
  };
})();

</script>
<script>
// ============================================================
//  Green Cross — Sales Dashboard
//  Hash-based Router
//
//  Routes:
//    #/login              → login form (unauthenticated default)
//    #/director           → director view (owner, director)
//    #/store/:slug        → kiosk view (store_manager, asst_manager, budtender)
//    #/leaderboard        → cross-store staff table (director+)
//
//  Auth guard: any route other than /login redirects to /login
//  if there's no valid session. After login, router.navigate()
//  sends the user to their role-appropriate home.
// ============================================================

window.GC = window.GC || {};

GC.router = (function() {

  var _currentRoute = null;
  var _app = null;

  // ── Route definitions ──────────────────────────────────
  // Each entry: { pattern: RegExp, roles: string[]|null, render: fn(params) }
  // roles: null means unauthenticated allowed (login page only)
  var routes = [
    {
      id: 'login',
      pattern: /^\/login$/,
      roles: null,   // public
      render: function() { GC.views.renderLogin(); },
    },
    {
      id: 'director',
      pattern: /^\/director$/,
      roles: ['owner','director'],
      render: function() { GC.views.renderDirector(); },
    },
    {
      id: 'store',
      pattern: /^\/store\/([a-z]+)$/,
      roles: ['owner','director','store_manager','asst_manager','budtender'],
      render: function(params) { GC.views.renderKiosk(params[1]); },
    },
    {
      id: 'leaderboard',
      pattern: /^\/leaderboard$/,
      roles: ['owner','director'],
      render: function() { GC.views.renderLeaderboard(); },
    },
    {
      id: 'settings',
      pattern: /^\/settings$/,
      roles: ['owner','director'],
      render: function() { GC.views.renderSettings(); },
    },
    {
      id: 'avatar',
      pattern: /^\/avatar$/,
      roles: ['owner','director','store_manager','asst_manager','budtender'],
      render: function(params, queryParams) { GC.views.renderAvatar(queryParams); },
    },
  ];

  // ── Dispatch ───────────────────────────────────────────
  function dispatch(hash) {
    // Normalise: strip leading #, ensure leading /
    var raw = (hash || '').replace(/^#/, '') || '/login';
    if (raw === '' || raw === '/') raw = '/login';

    // Split path from query string (e.g. /avatar?employee=john_doe)
    var qIdx   = raw.indexOf('?');
    var path   = qIdx >= 0 ? raw.slice(0, qIdx) : raw;
    var qs     = qIdx >= 0 ? raw.slice(qIdx + 1) : '';

    // Parse query params into a plain object
    var queryParams = {};
    if (qs) {
      qs.split('&').forEach(function(pair) {
        var eq = pair.indexOf('=');
        if (eq > 0) {
          queryParams[decodeURIComponent(pair.slice(0, eq))] =
            decodeURIComponent(pair.slice(eq + 1));
        }
      });
    }

    // Find matching route
    var matched = null;
    var params  = null;
    for (var i = 0; i < routes.length; i++) {
      var m = path.match(routes[i].pattern);
      if (m) { matched = routes[i]; params = m; break; }
    }

    if (!matched) {
      // Unknown path → send home (respects auth)
      navigate(GC.auth.isAuthenticated() ? GC.auth.homeRoute() : '#/login');
      return;
    }

    // Auth guard
    if (matched.roles !== null) {
      // Route requires auth
      if (!GC.auth.isAuthenticated()) {
        navigate('#/login');
        return;
      }
      var session = GC.auth.load();
      if (matched.roles.indexOf(session.role) === -1) {
        // Authenticated but wrong role → send to own home
        navigate(GC.auth.homeRoute());
        return;
      }
    } else {
      // Public route: if already authenticated, redirect home
      if (GC.auth.isAuthenticated()) {
        navigate(GC.auth.homeRoute());
        return;
      }
    }

    _currentRoute = matched.id;
    matched.render(params, queryParams);
  }

  // ── Navigate ───────────────────────────────────────────
  function navigate(hash) {
    if (window.location.hash !== hash) {
      window.location.hash = hash;
    } else {
      // Already at this hash — trigger render manually
      dispatch(hash);
    }
  }

  // ── Init ───────────────────────────────────────────────
  function init() {
    _app = document.getElementById('app');
    if (!_app) {
      console.error('[GC.router] #app element not found');
      return;
    }
    window.addEventListener('hashchange', function() {
      dispatch(window.location.hash);
    });

    // Global click handler for .lb-ava chips with data-ava-nav attribute.
    // Handles clicks anywhere inside the puck (e.g. on the img child).
    document.addEventListener('click', function(e) {
      var puck = e.target.closest('[data-ava-nav]');
      if (!puck) return;
      var key = puck.getAttribute('data-ava-nav');
      if (key) GC.navToAvatar(key); // encodes current hash as &from= so back button returns here
    });

    // Dispatch on initial load
    dispatch(window.location.hash);
  }

  return {
    init: init,
    navigate: navigate,
    currentRoute: function() { return _currentRoute; },
  };
})();

// ============================================================
//  Views registry — each view module registers itself here.
//  The router calls these methods; stubs prevent errors if a
//  view file hasn't loaded yet.
// ============================================================
GC.views = {
  renderLogin:       function() { console.warn('[GC.views] renderLogin not registered'); },
  renderDirector:    function() { console.warn('[GC.views] renderDirector not registered'); },
  renderKiosk:       function(slug) { console.warn('[GC.views] renderKiosk not registered:', slug); },
  renderLeaderboard: function() { console.warn('[GC.views] renderLeaderboard not registered'); },
  renderSettings:    function() { console.warn('[GC.views] renderSettings not registered'); },
  renderAvatar:      function(qp) { console.warn('[GC.views] renderAvatar not registered', qp); },
};

</script>

<!-- ── View modules ───────────────────────────────────────── -->
<script>
// ============================================================
//  Green Cross — Director View
//  Renders /director — all-stores command centre
//
//  Data flow:
//    GC.views.renderDirector()
//      → GC.api.fetchDirectorAll()
//      → director.render(data)     injects HTML into #app
//      → director.init(data)       wires interactivity
//
//  All render* functions return HTML strings.
//  init* functions attach event listeners after injection.
// ============================================================

window.GC = window.GC || {};

GC.views.renderDirector = function() {
  var app = document.getElementById('app');
  if (!app) return;

  // Reset period tabs to MTD on each fresh navigation
  director.resetPeriods();

  // Show loading shell while data fetches
  app.innerHTML = director.renderLoading();

  // Start clock immediately (doesn't need data)
  director.startClock();

  // Fetch MTD data. If cache is warm, renders instantly and fires onFresh
  // when the background network response lands (updates label + re-renders quietly).
  GC.api.fetchDirectorAll('mtd', function(freshData) {
    // Background refresh landed — update view quietly (no loading flash)
    var currentApp = document.getElementById('app');
    if (!currentApp) return;
    if (window.location.hash !== '#/director') return;
    currentApp.innerHTML = director.render(freshData);
    director.init(freshData);
  })
    .then(function(data) {
      app.innerHTML = director.render(data);
      director.init(data);

      // Pre-warm all kiosk caches so navigating to any store view is instant.
      // Fire after director renders so it doesn't compete with the director fetch.
      setTimeout(function() {
        GC.STORE_SLUGS.forEach(function(slug) {
          GC.api.prefetchKiosk(slug);
        });
      }, 500);
    })
    .catch(function(err) {
      console.error('[director] fetch failed:', err);
      app.innerHTML = director.renderError(err.message);
    });
};

/** Load and render a historical EOD snapshot for the given date string (YYYY-MM-DD). */
GC.views.renderDirectorHistorical = function(dateStr) {
  var app = document.getElementById('app');
  if (!app) return;

  app.innerHTML = director.renderLoading();
  director.startClock();

  GC.api.fetchHistoricalDirector(dateStr)
    .then(function(data) {
      if (!data.ok) {
        app.innerHTML = director.renderError(
          'No snapshot for ' + dateStr + '. '
          + (data.error || 'The nightly trigger runs at ~11pm PT.')
        );
        // Wire back-to-live from error state
        var btnSettings2 = document.getElementById('btnSettings');
        if (btnSettings2) btnSettings2.addEventListener('click', function() { GC.router.navigate('#/settings'); });
        return;
      }
      app.innerHTML = director.renderHistorical(data, dateStr);
      director.initHistorical(data, dateStr);
    })
    .catch(function(err) {
      app.innerHTML = director.renderError('Could not load snapshot for ' + dateStr + ': ' + err.message);
    });
};

// ── Private module ─────────────────────────────────────────
var director = (function() {

  // ── State ──────────────────────────────────────────────
  var _data          = null;
  var _avatarConfigs = {};
  var _storeFilter   = 'all';
  var _tagFilter     = null;
  var _clockTimer    = null;
  var _staffSortKey  = 'sales';
  var _staffSortDir  = -1;  // -1 = desc, 1 = asc
  var _staffPeriod   = 'mtd'; // 'mtd' | 'pp'
  var _staffPpData   = null;  // lazy-loaded pay-period staff, cached after first fetch
  var _staffPpRange  = null;  // human-readable PP date range, set when PP data first arrives
  var _storePeriod   = 'mtd'; // 'mtd' | 'pp'
  var _storeSortKey  = 'vsplan';
  var _storeSortDir  = -1;    // -1 = desc, 1 = asc
  var _storePpRange  = null;  // human-readable PP date range for stores
  var _storeMtdData  = null;  // preserved MTD store array for tab switching back
  var _storePpStores = null;  // cached PP store array for re-apply after refresh

  // ── Helpers ────────────────────────────────────────────

  function e(s) { return GC.esc(s); }

  function sparklineSvg(data, trendPct) {
    var cls    = GC.trendClass(trendPct);
    var stroke = GC.trendStroke(cls);
    var pts    = GC.sparklinePoints(data, 80, 22);
    var label  = GC.trendLabel(trendPct);
    return '<div class="sparkline-cell">'
      + '<svg width="80" height="22" viewBox="0 0 80 22" style="overflow:visible">'
      + '<polyline pathLength="1" fill="none" stroke="' + stroke + '" stroke-width="1.5" points="' + pts + '"/>'
      + '</svg>'
      + '<span class="spark-delta ' + cls + '">' + e(label) + '</span>'
      + '</div>';
  }

  function discountCell(rate) {
    var cls = GC.discountSeverity(rate);
    var pct = GC.fmtPct(rate);
    var w   = Math.min(Math.round((rate / 0.12) * 100), 100);
    return '<span class="disc ' + cls + '">'
      + '<span class="disc-bar"><span style="width:' + w + '%"></span></span>'
      + pct
      + '</span>';
  }

  function rankPillHtml(rank, total) {
    var cls = GC.rankPillClass(rank, total);
    return '<span class="rank-pill ' + cls + '">#' + rank + '</span>';
  }

  function storeDotHtml(slug) {
    return '<span class="store-dot ' + e(slug) + '"></span>';
  }

  function tagsHtml(tags, tagLabels, tagTooltips) {
    if (!tags || !tags.length) return '';
    var labels = tagLabels || tags;
    return '<span class="tags">'
      + tags.map(function(t, i) {
          var tip = tagTooltips && tagTooltips[i] ? ' data-tip="' + e(tagTooltips[i]) + '"' : '';
          return '<span class="tag ' + e(t) + '"' + tip + '>' + e(labels[i] || t) + '</span>';
        }).join('')
      + '</span>';
  }

  // Segment-matching avatar lookup: tries exact nameKey, then each _ segment,
  // then altKey and its segments (handles nickname-format saves like "zach_r").
  // Delegate to the shared GC utility.
  function findDirAvatarCfg_(nameKey, altKey) { return GC.findAvatarCfg(_avatarConfigs, nameKey, altKey); }

  function avatarHtml(initials, size, name, nameKeyOverride) {
    if (name) {
      // nameKeyOverride = canonical pre-nickname key (e.g. "zachary_robinson")
      // name = post-nickname display name (e.g. "Zach R") — used as altKey so
      // configs saved under the old nickname format are also found.
      var nameKey  = nameKeyOverride || GC.nameToKey(name);
      var altKey   = GC.nameToKey(name);  // nickname-derived fallback
      var config   = findDirAvatarCfg_(nameKey, altKey);
      var dispInit = GC.nickInitials(name, nameKey, initials);
      return GC.lbAvaPuck(nameKey, config, dispInit, true);
    }
    var cls = size === 'lg' ? 'avatar lg' : 'avatar';
    return '<div class="' + cls + '">' + e(initials) + '</div>';
  }

  function vsPlanHtml(vsplan) {
    var cls   = vsplan >= 0.005 ? 'up' : vsplan <= -0.005 ? 'down' : 'flat';
    var arrow = vsplan >= 0.005 ? '▲' : vsplan <= -0.005 ? '▼' : '';
    var pct   = (vsplan >= 0 ? '+' : '−') + Math.abs(vsplan * 100).toFixed(1) + '%';
    return '<span class="vs-plan ' + cls + '">'
      + (arrow ? '<span class="vp-arrow">' + arrow + '</span>' : '')
      + e(pct) + '</span>';
  }

  // Kiosk-style bar: shows % of plan target, animates on render,
  // glows green when over target (same logic + CSS as emp-bar in kiosk).
  function salesBarHtml(sales, vsplan) {
    // Derive the plan from actual sales + vsplan delta.
    // vsplan = (actual - plan) / plan  →  plan = actual / (1 + vsplan)
    var hasPlan = vsplan !== null && vsplan !== undefined && (1 + vsplan) > 0;
    var plan    = hasPlan ? sales / (1 + vsplan) : sales;
    var rawPct  = plan > 0 ? Math.round((sales / plan) * 100) : 0;
    var barOver = rawPct > 100;
    var fillPct = barOver ? 100 : rawPct;
    var markPct = barOver ? Math.round(100 / rawPct * 100) : null;
    var pctLbl  = rawPct + '%';
    var fillStyle = barOver
      ? 'width:0%;--mark-pct:' + markPct + '%'
      : 'width:0%';
    return '<div class="sales-cell">'
      + '<div class="sales-row">'
      +   '<span class="sales-amt num">' + e(GC.fmtCurrency(sales)) + '</span>'
      +   (hasPlan ? '<span class="sales-pct' + (barOver ? ' over' : '') + '">' + pctLbl + '</span>' : '')
      + '</div>'
      + '<div class="emp-bar-wrap dir-bar' + (barOver ? ' bar-over' : '') + '">'
      +   '<div class="emp-bar">'
      +     '<span style="' + fillStyle + '" data-final="' + fillPct + '%"></span>'
      +   '</div>'
      +   (markPct !== null ? '<div class="emp-bar-mark" style="left:' + markPct + '%"></div>' : '')
      + '</div>'
      + '</div>';
  }

  function animateBars() {
    setTimeout(function() {
      document.querySelectorAll('.emp-bar span[data-final]').forEach(function(s) {
        s.style.width = s.getAttribute('data-final');
      });
      document.querySelectorAll('.emp-bar-tick[data-final]').forEach(function(t) {
        t.style.left = t.getAttribute('data-final');
      });
    }, 400);
  }

  // ── AOV zone: ±5% vs. group average ─────────────────────
  var AOV_TOLERANCE = 0.05;
  function avgOf(arr, key) {
    var vals = arr.map(function(x) { return x[key] || 0; }).filter(Boolean);
    return vals.length ? vals.reduce(function(a, b) { return a + b; }, 0) / vals.length : 0;
  }
  function aovClass(aov, avg) {
    if (!avg || !aov) return '';
    if (aov > avg * (1 + AOV_TOLERANCE)) return ' v-green';
    if (aov < avg * (1 - AOV_TOLERANCE)) return ' v-red';
    return '';
  }

  // ── Render: Loading ────────────────────────────────────
  function renderLoading() {
    return '<div class="app-page">'
      + renderHeader(null)
      + '<div class="status-strip" style="height:54px"></div>'
      + '<div class="kpi-row large">'
      + '<div class="kpi loading-shimmer" style="height:80px"></div>'.repeat(3)
      + '</div>'
      + '<div class="kpi-row small">'
      + '<div class="kpi small loading-shimmer" style="height:68px"></div>'.repeat(6)
      + '</div>'

  // ── Render: Store Status Strip ─────────────────────────
  function renderStatusStrip(stores) {
    var html = '<div class="status-strip">'
      + '<div class="ss-label">Today</div>';
    // Sort by projected pace when available, fall back to pace
    var sorted = stores.slice().sort(function(a, b) {
      var aVal = a.today.projectedPace != null ? a.today.projectedPace : (a.today.pace || 0);
      var bVal = b.today.projectedPace != null ? b.today.projectedPace : (b.today.pace || 0);
      return bVal - aVal;
    });
    sorted.forEach(function(s) {
      var td      = s.today;
      var hasProj = td.projectedPace != null;
      var pctNum  = hasProj ? td.projectedPace : td.pace;
      var dotCls  = GC.paceDotClass(pctNum);
      var pctCls  = pctNum >= 0.005 ? 'up' : pctNum <= -0.005 ? 'down' : 'flat';
      var pctStr  = hasProj
        ? (pctNum >= 0 ? '+' : '−') + Math.abs(Math.round(pctNum * 100)) + '%'
        : '—';
      var revenue = GC.fmtCurrency(td.revenue);
      var subLbl  = hasProj
        ? e(revenue) + ' · proj ' + e(GC.fmtCurrency(td.projected))
        : e(revenue) + ' / ' + e(GC.fmtCurrency(td.goal));
      html += '<div class="ss-store" data-slug="' + e(s.slug) + '">'
        + '<span class="ss-dot ' + dotCls + '"></span>'
        + '<div class="ss-info">'
        + '<span class="ss-name">' + e(s.name) + '</span>'
        + '<span class="ss-sub">' + subLbl + '</span>'
        + '</div>'
        + '<span class="ss-pct ' + pctCls + '">' + e(pctStr) + '</span>'
        + '</div>';
    });
    html += '</div>';
    return html;
  }

  // ── Render: KPI rows ───────────────────────────────────
  function renderKPIs(summary) {
    var d = summary.deltas;

    function bigKpi(label, value, deltaHtml, colorClass) {
      return '<div class="kpi">'
        + '<div class="kpi-label">' + e(label) + '</div>'
        + '<div class="kpi-value' + (colorClass ? ' ' + colorClass : '') + '">' + value + '</div>'
        + (deltaHtml ? '<div class="kpi-delta ' + (deltaHtml.startsWith('▲') ? 'up' : deltaHtml.startsWith('▼') ? 'down' : '') + '">' + deltaHtml + '</div>' : '')
        + '</div>';
    }

    function smallKpi(label, value, deltaHtml, colorClass) {
      return '<div class="kpi small">'
        + '<div class="kpi-label">' + e(label) + '</div>'
        + '<div class="kpi-value' + (colorClass ? ' ' + colorClass : '') + '">' + value + '</div>'
        + (deltaHtml ? '<div class="kpi-delta">' + deltaHtml + '</div>' : '')
        + '</div>';
    }

    var bigRow = '<div class="kpi-row large">'
      + bigKpi('Total Sales · MTD',    GC.fmtCurrency(summary.totalSales),   GC.fmtDeltaPct(d.totalSalesPct))
      + bigKpi('Transactions',         GC.fmtNum(summary.transactions),       GC.fmtDeltaNum(d.transactions, '') + ' vs. last month')
      + bigKpi('Avg Order Value',      GC.fmtCurrency(summary.avgOrderValue), GC.fmtDeltaCurrency(d.avgOrderValue), 'v-green')
      + '</div>';

    var discDelta = d.discountRatePts
      ? '▲ +' + (d.discountRatePts * 100).toFixed(1) + ' pts'
      : '';
    var flagSub  = summary.flaggedStaffBreakdown
      ? summary.flaggedStaffBreakdown.repeat + ' repeat · ' + summary.flaggedStaffBreakdown.new + ' new'
      : '';

    var smallRow = '<div class="kpi-row small">'
      + smallKpi('Avg UPT',         GC.fmtDecimal(summary.avgUPT),         '▲ +' + GC.fmtDecimal(d.avgUPT))
      + smallKpi('Total Discounts', GC.fmtCurrency(summary.totalDiscounts), '▲ +' + GC.fmtCurrency(d.totalDiscounts), 'v-amber')
      + smallKpi('Discount Rate',   GC.fmtPct(summary.discountRate),        discDelta, 'v-amber')
      + smallKpi('Flagged Staff',   String(summary.flaggedStaff),            flagSub, 'v-red')
      + smallKpi('Active Staff',    String(summary.activeStaff),             'across ' + summary.storeCount + ' stores')
      + smallKpi('Sales / Hour',    '$' + GC.fmtNum(summary.salesPerHour),  GC.fmtDeltaNum(d.salesPerHour, '$'))
      + '</div>';

    return bigRow + smallRow;
  }

  // ── Render: Today Aggregate Row ───────────────────────
  // Three widgets matching the kiosk hero cards — Goal arc, Pace gauge, Hourly chart.
  // SVG math identical to kiosk so the visuals are recognisable cross-view.

  var DIR_ARC_LEN = 308; // π × 98 ≈ 308  (same arc as kiosk)
  var DIR_PACE_RANGE = 80;

  function renderDirGoalCard(today) {
    var pct     = today.pctToGoal || 0;
    var pctDisp = Math.round(pct * 100) + '%';
    var capped  = Math.min(pct, 1);
    var offset  = Math.round(DIR_ARC_LEN * (1 - capped));
    var closed  = today.timeRemainingLabel === 'Closed';

    var soldStr = GC.fmtCurrency(today.revenue || 0);
    var toGoStr = GC.fmtCurrency(today.toGo   || 0);
    var goalStr = GC.fmtCurrency(today.goal   || 0);
    var remStr  = today.timeRemainingLabel || '—';

    // Time remaining label with zone colour
    var remMins = (function() {
      var m = remStr.match(/^(\d+):(\d+)$/);
      return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : null;
    })();
    var remColor = closed ? 'var(--text-dim)'
      : remMins !== null && remMins <= 30 ? 'var(--red)'
      : remMins !== null && remMins <= 60 ? 'var(--amber)'
      : '';
    var remLabel = closed ? 'Closed' : (e(remStr) + ' remain');
    var remSpan  = remStr && remStr !== '—'
      ? ' · <span style="font-weight:700' + (remColor ? ';color:' + remColor : '') + '">' + remLabel + '</span>'
      : '';

    return '<div class="dir-today-card">'
      + '<div class="kcard-label">Daily Goal' + remSpan + '</div>'
      + '<div class="dir-gauge-wrap">'
      +   '<svg width="200" height="108" viewBox="0 0 240 130" style="overflow:visible">'
      +     '<path d="M 22 122 A 98 98 0 0 1 218 122" stroke="#232a27" stroke-width="14" fill="none" stroke-linecap="butt"/>'
      +     '<path d="M 22 122 A 98 98 0 0 1 218 122" stroke="#4ade80" stroke-width="14" fill="none"'
      +       ' stroke-linecap="round" stroke-dasharray="308" stroke-dashoffset="' + offset + '"'
      +       ' style="transition:stroke-dashoffset 1.4s cubic-bezier(.2,.7,.3,1)"/>'
      +   '</svg>'
      +   '<div class="dir-gauge-pct">' + e(pctDisp) + '</div>'
      +   '<div class="dir-gauge-sub">to goal</div>'
      + '</div>'
      + '<div class="kcard-stats">'
      +   '<div class="kstat"><div class="kstat-v num">' + e(soldStr) + '</div><div class="kstat-l">Sold</div></div>'
      +   '<div class="kstat"><div class="kstat-v num">' + e(toGoStr) + '</div><div class="kstat-l">To go</div></div>'
      +   '<div class="kstat"><div class="kstat-v num">' + e(goalStr) + '</div><div class="kstat-l">Goal</div></div>'
      + '</div>'
      + '</div>';
  }

  function renderDirPaceCard(today) {
    // Use projected EOD vs goal when enough data exists (2+ hours), else fall back to pace
    var proj          = today.projectedRevenue || 0;
    var goal          = today.goal || 0;
    var hasProj       = proj > 0 && goal > 0;
    var projectedPace = hasProj ? (proj - goal) / goal : null;
    var pace          = today.pace || 0;
    var displayPace   = projectedPace != null ? projectedPace : pace;

    var clamped  = Math.max(-DIR_PACE_RANGE, Math.min(DIR_PACE_RANGE, displayPace * 100));
    var deg      = (clamped / DIR_PACE_RANGE) * 90;
    var zone     = deg <= -30 ? 'red' : deg >= 30 ? 'green' : 'amber';
    var zoneColor = zone === 'red' ? 'var(--red)' : zone === 'green' ? 'var(--green)' : 'var(--amber)';
    var pctStr   = projectedPace != null
      ? (displayPace >= 0 ? '+' : '−') + Math.abs(Math.round(displayPace * 100)) + '%'
      : '—';
    var subLabel = projectedPace != null
      ? (zone === 'red' ? 'Proj. behind plan' : zone === 'green' ? 'Proj. ahead of plan' : 'Proj. near plan')
      : (zone === 'red' ? 'Behind plan' : zone === 'green' ? 'Ahead of plan' : 'Near plan');

    var paceGap  = today.paceGap || 0;
    var gapAmt   = GC.fmtCurrency(Math.abs(paceGap));
    var gapLabel = paceGap >= 0 ? 'Ahead of pace' : 'Behind pace';

    return '<div class="dir-today-card">'
      + '<div class="kcard-label">Projected · vs. Plan</div>'
      + '<div class="dir-gauge-wrap">'
      +   '<svg width="200" height="108" viewBox="0 0 240 130" style="overflow:visible">'
      +     '<path d="M 22 122 A 98 98 0 0 1 218 122" stroke="#232a27" stroke-width="10" fill="none" stroke-linecap="butt"/>'
      +     '<path d="M 22 122 A 98 98 0 0 1 71 37"   stroke="var(--red)"   stroke-width="10" fill="none" stroke-linecap="butt" opacity="0.62"/>'
      +     '<path d="M 71 37  A 98 98 0 0 1 169 37"  stroke="var(--amber)" stroke-width="10" fill="none" stroke-linecap="butt" opacity="0.62"/>'
      +     '<path d="M 169 37 A 98 98 0 0 1 218 122" stroke="var(--green)" stroke-width="10" fill="none" stroke-linecap="butt" opacity="0.62"/>'
      +     '<line x1="120" y1="18" x2="120" y2="26" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>'
      +     '<g id="dirPaceTick" style="transform-origin:120px 122px;transform:rotate(' + deg + 'deg);transition:transform 1.4s cubic-bezier(.2,.7,.3,1)">'
      +       '<rect x="113" y="11" width="14" height="26" rx="7" fill="#0a0e0d" opacity="0.55"/>'
      +       '<rect x="115" y="13" width="10" height="22" rx="5" fill="#e6ece9" stroke="#0a0e0d" stroke-width="1.5"/>'
      +     '</g>'
      +   '</svg>'
      +   '<div class="dir-gauge-pct zone-' + zone + '">' + e(pctStr) + '</div>'
      +   '<div class="dir-gauge-sub" style="color:' + zoneColor + '">' + e(subLabel) + '</div>'
      + '</div>'
      + '<div class="kcard-stats">'
      +   '<div class="kstat"><div class="kstat-v num">' + e(GC.fmtCurrency(proj)) + '</div><div class="kstat-l">Projected</div></div>'
      +   '<div class="kstat"><div class="kstat-v num" style="color:' + zoneColor + '">' + e(gapAmt) + '</div><div class="kstat-l">' + e(gapLabel) + '</div></div>'
      + '</div>'
      + '</div>';
  }

  function renderDirHourlyCard(today) {
    var hourly  = today.hourly  || [];
    var targets = (today.hourlyTargets && today.hourlyTargets.length === hourly.length)
      ? today.hourlyTargets : null;

    // Scale bars so the tallest target is never clipped off the chart
    var maxRevenue  = Math.max.apply(null, hourly.map(function(h) { return h.revenue || 0; })) || 1;
    var maxTarget   = targets ? Math.max.apply(null, targets) : 0;
    var effectiveMax = Math.max(maxRevenue, maxTarget) || 1;

    var bars = hourly.map(function(h, i) {
      var cls       = h.current ? ' current' : h.projected ? ' proj' : '';
      var scaledPct = Math.min(100, ((h.revenue || 0) / effectiveMax) * 100);
      var tipVal    = h.revenue > 0 ? GC.fmtCurrency(h.revenue) : '—';

      // Per-bar target notch — placed in bar-wrap (fixed 80px height) so it's
      // always chart-relative. Works for future hours that have 0 revenue.
      var notchHtml = '';
      if (targets && targets[i] > 0) {
        var tgt         = targets[i];
        var tgtChartPct = Math.min(100, (tgt / effectiveMax) * 100);
        var miss        = (h.revenue || 0) < tgt;
        notchHtml = '<div class="hm-notch' + (miss ? ' hm-notch--miss' : '') + '"'
          + ' style="bottom:' + tgtChartPct.toFixed(1) + '%"></div>';
      }

      // Stacked tooltip: revenue + goal
      var tipGoal = (targets && targets[i] > 0)
        ? '<span class="hm-tip-goal">goal $' + e(Math.round(targets[i]).toLocaleString('en-US')) + '</span>'
        : '';
      var tipHtml = h.projected
        ? '<div class="dir-hour-tip proj-tip"><span class="tip-hour">' + e(h.hour) + '</span><span class="tip-val">projected</span>' + tipGoal + '</div>'
        : '<div class="dir-hour-tip"><span class="tip-hour">' + e(h.hour) + '</span><span class="tip-val">' + e(tipVal) + '</span>' + tipGoal + '</div>';

      return '<div class="dir-hour-col' + cls + '">'
        +   tipHtml
        +   '<div class="dir-hour-bar-wrap">'
        +     notchHtml
        +     '<div class="dir-hour-bar" style="height:' + scaledPct.toFixed(1) + '%"></div>'
        +   '</div>'
        +   '<div class="dir-hour-lbl">' + e(h.hour) + '</div>'
        + '</div>';
    }).join('');

    return '<div class="dir-today-card dir-hourly-card">'
      + '<div class="kcard-label">Today by Hour</div>'
      + '<div class="dir-hourly-chart">' + bars + '</div>'
      + '</div>';
  }

  // ── Render: Full Director Page ─────────────────────────
  // ── EOM prompt banner ────────────────────────────────────
  var EOM_PROMPT_KEY_PREFIX = 'gc_eom_prompt_dismissed_';

  function eomPromptDismissKey() {
    var now  = new Date();
    return EOM_PROMPT_KEY_PREFIX + now.getFullYear() + '-' + (now.getMonth() + 1);
  }

  function shouldShowEomPrompt() {
    var now = new Date();
    if (now.getDate() !== 1) return false;           // only on the 1st
    try {
      return !localStorage.getItem(eomPromptDismissKey());
    } catch(e) { return true; }
  }

  function dismissEomPrompt() {
    try { localStorage.setItem(eomPromptDismissKey(), '1'); } catch(e) {}
    var el = document.getElementById('eomPrompt');
    if (el) {
      el.style.transition = 'opacity 0.25s ease, max-height 0.3s ease, margin 0.3s ease';
      el.style.opacity    = '0';
      el.style.maxHeight  = '0';
      el.style.marginBottom = '0';
      el.style.overflow   = 'hidden';
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 320);
    }
  }

  function renderEomPrompt() {
    if (!shouldShowEomPrompt()) return '';
    var now      = new Date();
    var months   = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    var monthName = months[now.getMonth()];
    return '<div class="eom-prompt" id="eomPrompt">'
      + '<div class="eom-prompt-icon">★</div>'
      + '<div class="eom-prompt-body">'
      + '  <div class="eom-prompt-title">Set Employee of the Month for ' + monthName + '</div>'
      + '  <div class="eom-prompt-sub">It\'s the 1st — don\'t forget to recognise your top performer.</div>'
      + '</div>'
      + '<button class="eom-prompt-link" id="eomPromptGoBtn">Go to Settings →</button>'
      + '<button class="eom-prompt-dismiss" id="eomPromptDismiss" title="Dismiss">✕</button>'
      + '</div>';
  }

  function render(data) {
    _data          = data;
    _avatarConfigs = data.avatarConfigs || {};
    _storeMtdData  = (data.stores && data.stores.stores) || [];

    var stores = data.stores.stores;
    var staff  = data.staff.staff;
    var sum    = data.summary;
    var alerts = data.alerts;
    var today  = data.today || {};
    var range  = sum && sum.dateRange
      ? GC.fmtDateRange(sum.dateRange.from, sum.dateRange.to) : '';

    return '<div class="app-page">'
      + renderHeader(data)
      + renderEomPrompt()
      + renderStatusStrip(stores)
      + (today.goal
          ? '<div class="dir-today-row">'
              + renderDirGoalCard(today)
              + renderDirPaceCard(today)
              + renderDirHourlyCard(today)
            + '</div>'
          : '')
      + renderKPIs(sum)
      + renderStoreTable(stores, range)
      + renderFilterPills()
      + renderStaffTable(staff, range)
      + '<div class="director-lower">'
      + renderAlerts(alerts)
      + renderDiscountWatch(alerts)
      + '</div>'
      + '<div class="footer-note director-footer">'
      + (window.GC && GC.VERSION ? GC.VERSION : 'v1') + ' · Director Mode · '
      + '<span id="lastRefreshed">Last refresh —</span>'
      + '</div>'
      + '</div>';
  }

  // ── Filtering / sorting ────────────────────────────────
  function applyStaffFilters(staff) {
    var result = staff.slice();

    // Store filter
    if (_storeFilter !== 'all') {
      result = result.filter(function(s) { return s.storeSlug === _storeFilter; });
    }

    // Tag filter
    if (_tagFilter && _tagFilter !== 'top10') {
      result = result.filter(function(s) { return s.tags && s.tags.indexOf(_tagFilter) !== -1; });
    }
    if (_tagFilter === 'top10') {
      result = result.slice(0, 10);
    }

    result.sort(function(a, b) {
      var av = a[_staffSortKey] != null ? a[_staffSortKey] : '';
      var bv = b[_staffSortKey] != null ? b[_staffSortKey] : '';
      if (typeof av === 'string' || typeof bv === 'string') {
        return _staffSortDir * String(av).localeCompare(String(bv));
      }
      return _staffSortDir * ((Number(av) || 0) - (Number(bv) || 0));
    });

    return result;
  }

  // ── Re-render just the staff table body ───────────────
  function refreshStaffTable() {
    if (!_data) return;
    var tbody = document.getElementById('staffTableBody');
    if (!tbody) return;

    var staff    = _data.staff.staff;
    var filtered = applyStaffFilters(staff);

    filtered.forEach(function(s, i) {
      var isNew = GC.isNewHire(s.hireDate);
      var tags  = s.tags.slice();
      if (isNew && tags.indexOf('new') === -1) tags.push('new');
      var row = tbody.children[i];
      // Rather than fine-grained diffing, just replace all rows
    });

    // Full replace (simple and safe for this data size)
    var maxSales = filtered.length ? filtered[0].sales : 1;
    var total    = staff.length;
    var avgAov   = avgOf(filtered, 'avgOrderValue');
    tbody.innerHTML = filtered.map(function(s) {
      var isNew  = GC.isNewHire(s.hireDate);
      var tags   = s.tags.slice();
      var sTips  = (s.tagTooltips || []).slice();
      if (isNew && tags.indexOf('new') === -1) { tags.push('new'); sTips.push('Recently hired'); }
      return '<tr data-employee="' + e(s.id) + '">'
        + '<td>' + rankPillHtml(s.rank, total) + '</td>'
        + '<td><div class="who">'
          + avatarHtml(s.initials, null, s.name, s.nameKey)
          + '<div><div class="who-name">' + e(s.name) + tagsHtml(tags, null, sTips) + '</div>'
          + '<div class="who-sub">' + e(s.hoursWorked) + 'h this PP</div>'
          + '</div></div></td>'
        + '<td><div class="store-cell">' + storeDotHtml(s.storeSlug) + '<span>' + e(s.storeName) + '</span></div></td>'
        + '<td>' + e(s.roleLabel) + '</td>'
        + '<td class="num">' + e(GC.fmtCurrency(s.sales)) + '</td>'
        + '<td class="num">' + e(GC.fmtNum(s.transactions)) + '</td>'
        + '<td class="num' + aovClass(s.avgOrderValue, avgAov) + '">' + e(GC.fmtCurrency(s.avgOrderValue)) + '</td>'
        + '<td class="num' + (s.avgUPT >= 2.6 ? ' v-green' : '') + '">' + e(GC.fmtDecimal(s.avgUPT)) + '</td>'
        + '<td>' + discountCell(s.discountRate) + '</td>'
        + '<td>' + sparklineSvg(s.trend30d, s.trendPct) + '</td>'
        + '</tr>';
    }).join('');
  }

  // ── Clock ──────────────────────────────────────────────
  function startClock() {
    function tick() {
      var now = new Date();
      var ct  = document.getElementById('directorClock');
      var cd  = document.getElementById('directorDate');
      if (ct) ct.textContent = GC.fmtTime(now);
      if (cd) cd.textContent = GC.fmtDateShort(now);
    }
    tick();
    if (_clockTimer) clearInterval(_clockTimer);
    _clockTimer = setInterval(tick, 1000);
  }

  // ── Auto-refresh ───────────────────────────────────────
  var _refreshTimer = null;

  function scheduleRefresh() {
    if (_refreshTimer) clearInterval(_refreshTimer);
    _refreshTimer = setInterval(function() {
      doRefresh(false);
    }, 30000); // every 30s — matches kiosk polling interval
  }

  function doRefresh(showToast) {
    // If we've navigated away from the director view, stop refreshing
    var hash = window.location.hash || '#/director';
    if (hash !== '#/director' && hash !== '#/' && hash !== '') {
      if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
      return;
    }

    var btn = null; // refresh button removed; kept for catch handler below

    GC.api.fetchDirectorAll('mtd')
      .then(function(data) {
        // Guard again in case route changed while the fetch was in-flight
        var currentHash = window.location.hash || '#/director';
        if (currentHash !== '#/director' && currentHash !== '#/' && currentHash !== '') {
          if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
          return;
        }
        _data = data;
        // Capture active periods before render() resets state
        var prevStorePeriod = _storePeriod;
        // Re-render dynamic sections only (avoid full page flash)
        var app = document.getElementById('app');
        if (app) {
          var scrollY = window.scrollY; // preserve scroll position across re-render
          app.innerHTML = render(data);
          init(data);
          window.scrollTo(0, scrollY);
        }
        if (showToast) GC.toast('Dashboard refreshed', 'success');
        // Re-apply the active staff period after refresh
        if (_staffPeriod === 'pp' && _staffPpData) {
          updateStaffTable(_staffPpData);
        }
        // Re-apply the active store period after refresh
        if (prevStorePeriod === 'pp' && _storePpStores) {
          _storePeriod = 'pp';
          if (_data.stores) _data.stores.stores = _storePpStores;
          refreshStoreTable();
          syncStorePeriodTabs();
        }
      })
      .catch(function(err) {
        if (showToast) GC.toast('Refresh failed: ' + err.message, 'error');
        if (btn) btn.classList.remove('spinning');
      });
  }

  // ── Wire Interactivity ─────────────────────────────────
  function init(data) {
    _data = data;
    startClock();
    scheduleRefresh();
    animateBars();
    animateStoreSparklines();
    animateStaffSparklines();

    // Update last-refreshed label
    var lr = document.getElementById('lastRefreshed');
    if (lr) lr.textContent = 'Last refresh ' + GC.fmtTime(new Date());

    // Slideshow button
    var btnSlideshow = document.getElementById('btnSlideshow');
    if (btnSlideshow) btnSlideshow.addEventListener('click', function() {
      GC.slideshow.start(0);
    });

    // History date picker
    wireHistoryControls();

    // EOM prompt banner — "Go to Settings" + dismiss
    var eomGoBtn = document.getElementById('eomPromptGoBtn');
    if (eomGoBtn) eomGoBtn.addEventListener('click', function() {
      dismissEomPrompt();
      GC.router.navigate('#/settings');
    });
    var eomDismiss = document.getElementById('eomPromptDismiss');
    if (eomDismiss) eomDismiss.addEventListener('click', dismissEomPrompt);

    // Settings gear
    var btnSettings = document.getElementById('btnSettings');
    if (btnSettings) btnSettings.addEventListener('click', function() {
      GC.router.navigate('#/settings');
    });

    // User chip → logout
    var chip = document.getElementById('userChip');
    if (chip) chip.addEventListener('click', function() {
      if (confirm('Sign out?')) {
        GC.auth.clear();
        GC.router.navigate('#/login');
      }
    });

    // Store filter pills
    var filterRow = document.getElementById('filterRow');
    if (filterRow) {
      filterRow.addEventListener('click', function(ev) {
        var pill = ev.target.closest('.pill[data-store]');
        var tag  = ev.target.closest('.pill[data-tag]');

        if (pill) {
          _storeFilter = pill.dataset.store;
          filterRow.querySelectorAll('.pill[data-store]').forEach(function(p) {
            p.classList.toggle('active', p.dataset.store === _storeFilter);
          });
          refreshStaffTable();
        }

        if (tag) {
