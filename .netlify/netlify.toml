[build]
  publish = "."

# No server-side routing needed — app uses hash routing (#/director, #/store/:slug).
# All routes are handled client-side by src/router.js.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Serve fixture JSON with the right content type
[[headers]]
  for = "/src/fixtures/*.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "no-cache"
